<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Just Scan Manager - Pro Edition 🛡️</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #1a1a1a; border-bottom: 2px solid #007bff; padding-bottom: 10px; margin-bottom: 20px; }
        
        /* شريط البحث */
        .search-box { margin-bottom: 20px; display: flex; gap: 10px; }
        .search-box input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 1em; }

        table { width: 100%; border-collapse: collapse; background: white; overflow: hidden; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: center; }
        th { background: #007bff; color: white; font-weight: bold; }
        tr:hover { background-color: #f8f9fa; }

        .btn-activate { background: #28a745; color: white; border: none; padding: 6px 12px; cursor: pointer; border-radius: 5px; font-size: 0.85em; margin: 2px; }
        .input-edit { width: 60px; padding: 5px; text-align: center; border: 1px solid #ddd; border-radius: 4px; font-weight: bold; color: #007bff; }
        
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 0.85em; font-weight: bold; }
        .active { background: #e8f5e9; color: #2e7d32; }
        .expired { background: #ffebee; color: #c62828; }
        .grace { background: #fff3e0; color: #ef6c00; }
    </style>
</head>
<body>

<div class="container">
    <h2>لوحة تحكم المشتركين - نظام VOLTIR</h2>
    
    <div class="search-box">
        <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="🔍 ابحث برقم الموبايل...">
        <button onclick="loadUsers()" style="padding:10px 20px; background:#6c757d; color:white; border:none; border-radius:8px; cursor:pointer;">تحديث القائمة 🔄</button>
    </div>

    <div id="loading">جاري جلب بيانات المشتركين...</div>
    
    <table id="userTable" style="display:none;">
        <thead>
            <tr>
                <th>رقم الموبايل</th>
                <th>تاريخ التسجيل</th>
                <th>حالة الاشتراك</th>
                <th>الأيام المتبقية</th>
                <th>فترة السماح (يوم)</th>
                <th>إجراءات سريعة</th>
            </tr>
        </thead>
        <tbody id="userList">
            </tbody>
    </table>
</div>

<script>
    const API_URL = "/.netlify/functions/index"; 

    // دالة لجلب البيانات
    async function loadUsers() {
        document.getElementById('loading').style.display = 'block';
        document.getElementById('userTable').style.display = 'none';
        try {
            const res = await fetch(`${API_URL}?action=getUsers`);
            const users = await res.json();
            renderUsers(users);
        } catch (e) { alert("خطأ في الاتصال بالسيرفر"); }
    }

    function renderUsers(users) {
        const list = document.getElementById('userList');
        list.innerHTML = '';
        
        users.forEach(user => {
            const now = new Date();
            const expiry = new Date(user.expiryDate || 0);
            const diffTime = expiry - now;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            const isExpired = diffDays <= 0;
            const statusClass = isExpired ? 'expired' : 'active';
            const statusText = isExpired ? `منتهي (${diffDays})` : `نشط (باقي ${diffDays})`;

            list.innerHTML += `
                <tr>
                    <td style="font-weight:bold;">${user.phone}</td>
                    <td>${new Date(user.timestamp || Date.now()).toLocaleDateString('en-GB')}</td>
                    <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                    <td>
                        <input type="number" class="input-edit" value="${diffDays}" 
                               onchange="updateField('${user.phone}', 'days', this.value)">
                    </td>
                    <td>
                        <input type="number" class="input-edit" style="color:#ef6c00;" value="${user.gracePeriod || 0}" 
                               onchange="updateField('${user.phone}', 'grace', this.value)">
