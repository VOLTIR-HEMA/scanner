<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم VOLTIR - الإدارة 🛡️</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; padding: 20px; text-align: center; }
        .container { max-width: 900px; margin: auto; background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #334155; padding: 12px; text-align: center; }
        th { background: #334155; color: #38bdf8; }
        input { background: #0f172a; color: #22c55e; border: 1px solid #475569; padding: 5px; border-radius: 4px; text-align: center; }
        .btn { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin: 2px; }
        .btn-update { background: #22c55e; color: white; }
        .btn-delete { background: #ef4444; color: white; }
        .btn-load { background: #3b82f6; color: white; padding: 10px 20px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🛡️ مدير حسابات Just Scan</h2>
    <button class="btn btn-load" onclick="loadUsers()">🔄 تحديث قائمة المشتركين</button>
    
    <table>
        <thead>
            <tr>
                <th>رقم الموبايل</th>
                <th>كلمة السر (تعديل)</th>
                <th>إجراءات</th>
            </tr>
        </thead>
        <tbody id="userList">
            </tbody>
    </table>
</div>

<script>
    // ⚠️ حط رابط الوركر بتاعك هنا
    const SERVER_URL = "https://round-resonance-b6f1.voltir-f.workers.dev";

    async function loadUsers() {
        const list = document.getElementById('userList');
        list.innerHTML = '<tr><td colspan="3">جاري التحميل...</td></tr>';
        
        try {
            const res = await fetch(SERVER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'admin-data', phone: 'admin', password: 'admin' }) 
            });
            const users = await res.json();
            
            list.innerHTML = '';
            users.forEach(user => {
                list.innerHTML += `
                    <tr>
                        <td><b>${user.phone}</b></td>
                        <td><input type="text" id="pass-${user.phone}" value="${user.password}"></td>
                        <td>
                            <button class="btn btn-update" onclick="manage('${user.phone}', 'update')">حفظ التعديل</button>
                            <button class="btn btn-delete" onclick="manage('${user.phone}', 'delete')">حذف</button>
                        </td>
                    </tr>`;
            });
        } catch (e) {
            list.innerHTML = '<tr><td colspan="3">فشل جلب البيانات. تأكد من الـ Deploy في كلاود فلير</td></tr>';
        }
    }

    async function manage(phone, subAction) {
        const newPass = document.getElementById('pass-' + phone).value;
        if(subAction === 'delete' && !confirm('هل أنت متأكد من حذف هذا الحساب؟')) return;

        try {
            const res = await fetch(SERVER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    action: 'admin-action', 
                    subAction: subAction,
                    targetPhone: phone, 
                    newPass: newPass,
                    phone: 'admin', // بيانات وهمية لتخطي فحص الوركر الحالي
                    password: 'admin'
                })
            });
            const result = await res.json();
            alert(result.success || result.error);
            loadUsers(); // تحديث الجدول
        } catch (e) {
            alert("حدث خطأ في الاتصال");
        }
    }

    // تحميل البيانات أول ما تفتح الصفحة
    loadUsers();
</script>

</body>
</html>
