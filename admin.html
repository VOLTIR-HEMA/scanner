<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة Voltir Pro - لوحة التحكم</title>
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 15px; }
        .container { max-width: 1000px; margin: auto; }
        .user-row { background: var(--card); border: 1px solid #334155; margin-bottom: 10px; padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; }
        .user-info-brief { text-align: right; }
        .user-info-brief b { font-size: 1.1em; color: var(--primary); display: block; }
        .status-pill { padding: 4px 10px; border-radius: 20px; font-size: 0.8em; font-weight: bold; }
        #userModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:100; }
        .modal-content { background: var(--card); width: 90%; max-width: 500px; margin: 40px auto; padding: 20px; border-radius: 15px; border: 1px solid var(--primary); }
        .modal-content h3 { color: var(--primary); border-bottom: 1px solid #334155; padding-bottom: 10px; }
        input, select { width: 100%; padding: 10px; margin: 8px 0; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 6px; box-sizing: border-box; }
        .grid-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .btn { padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-save { background: #22c55e; color: white; }
        .btn-close { background: #64748b; color: white; }
        .btn-action { background: #3b82f6; color: white; font-size: 0.8em; }
    </style>
</head>
<body>

<div class="container">
   <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
    <h2 style="margin: 0;">🛡️ إدارة المشتركين</h2>
    <div style="display: flex; gap: 10px;">
        <button id="refreshBtn" onclick="loadUsers()" class="btn btn-action" style="background: #28a745; padding: 8px 15px;">🔄 تحديث البيانات</button>
    </div>
</div>
    <input type="text" id="searchInput" onkeyup="filterUsers()" placeholder="🔍 ابحث بالاسم أو الرقم..." style="margin-bottom: 20px;">
    <div id="userList"></div>
</div>

<div id="userModal">
    <div class="modal-content" id="modalData"></div>
</div>

<script>
    const DB_URL = "https://just-scan-19ce1-default-rtdb.firebaseio.com/users";
    let users = [];

    async function loadUsers() {
        const listDiv = document.getElementById('userList');
        const refreshBtn = document.getElementById('refreshBtn');
        if(listDiv) listDiv.innerHTML = "⏳ جاري سحب البيانات...";
        refreshBtn.disabled = true;
        
        try {
            const res = await fetch(`${DB_URL}.json?t=${Date.now()}`);
            if (res.ok) {
                const data = await res.json();
                users = data ? Object.keys(data).map(key => ({ ...data[key], phone: key })) : [];
                renderUsers(users);
            } else { alert("خطأ في جلب البيانات"); }
        } catch (e) { alert("خطأ في الشبكة: " + e.message); }
        refreshBtn.disabled = false;
    }

    // دالة التحديث الذكية (تعديل جزء فقط)
    async function updateSingleUser(phone, updatedData, btnElement) {
        const originalText = btnElement ? btnElement.innerText : "";
        if(btnElement) { btnElement.innerText = "⏳ جاري الحفظ..."; btnElement.disabled = true; }

        try {
            const res = await fetch(`${DB_URL}/${phone}.json`, {
                method: 'PATCH',
                body: JSON.stringify(updatedData)
            });

            if (res.ok) {
                alert("✅ تم التحديث بنجاح");
                closeCard();
                loadUsers();
            } else { alert("❌ فشل الحفظ: " + res.status); }
        } catch (e) { alert("❌ خطأ فني: " + e.message); }
        
        if(btnElement) { btnElement.innerText = originalText; btnElement.disabled = false; }
    }

    function renderUsers(data) {
        const container = document.getElementById('userList');
        if(!container) return;
        container.innerHTML = '';
        data.forEach(user => {
            const expiry = new Date(parseInt(user.expiryDate));
            const daysLeft = Math.ceil((expiry - Date.now()) / (1000 * 60 * 60 * 24));
            const statusColor = daysLeft > 0 ? '#22c55e' : '#ef4444';

            container.innerHTML += `
                <div class="user-row">
                    <div class="user-info-brief">
                        <b>${user.name}</b>
                        <span>📱 ${user.phone} | 🏢 ${user.activity || 'بدون نشاط'}</span>
                    </div>
                    <div style="text-align: left;">
                        <span class="status-pill" style="border: 1px solid ${statusColor}; color: ${statusColor}">
                            ${daysLeft > 0 ? 'باقي ' + daysLeft + ' يوم' : 'منتهي'}
                        </span>
                        <button class="btn btn-action" style="margin-right:10px;" onclick="openCard('${user.phone}')">تعديل البطاقة ⚙️</button>
                    </div>
                </div>`;
        });
    }

    function openCard(phone) {
        const user = users.find(u => u.phone === phone);
        const modal = document.getElementById('userModal');
        const content = document.getElementById('modalData');
        if(!modal || !content) return;
        
        content.innerHTML = `
            <h3>🪪 بطاقة: ${user.name}</h3>
            <label>الاسم:</label> <input type="text" id="m-name" value="${user.name}">
            <label>النشاط:</label> <input type="text" id="m-act" value="${user.activity || ''}">
            <label>الباسورد:</label> <input type="text" id="m-pass" value="${user.password}">
            <button class="btn btn-save" style="width:100%" onclick="saveFullUpdate(this, '${user.phone}')">حفظ التغييرات الأساسية</button>
            <hr style="border:0; border-top:1px solid #334155; margin:15px 0;">
            <label>➕ إضافة أيام محددة:</label>
            <div style="display:flex; gap:5px;">
                <input type="number" id="m-days" placeholder="عدد الأيام" style="margin:0;">
                <button class="btn btn-save" onclick="addCustomDays(this, '${user.phone}')">إضافة</button>
            </div>
            <div class="grid-btns">
                <button class="btn btn-action" onclick="setPreset(this, '${user.phone}', 30)">شهر جديد</button>
                <button class="btn btn-action" onclick="setPreset(this, '${user.phone}', 365)">سنة جديدة</button>
                <button class="btn btn-action" style="background:#ef4444" onclick="deleteUser(this, '${user.phone}')">حذف الحساب</button>
                <button class="btn btn-close" onclick="closeCard()">إغلاق</button>
            </div>
        `;
        modal.style.display = 'block';
    }

    function closeCard() { document.getElementById('userModal').style.display = 'none'; }

    async function saveFullUpdate(btn, phone) {
        const data = {
            name: document.getElementById('m-name').value,
            activity: document.getElementById('m-act').value,
            password: document.getElementById('m-pass').value
        };
        await updateSingleUser(phone, data, btn);
    }

    async function addCustomDays(btn, phone) {
        const daysInput = document.getElementById('m-days');
        const days = parseInt(daysInput.value);
        if(!days) return alert("اكتب عدد الأيام");
        
        const user = users.find(u => u.phone === phone);
        let currentExpiry = parseInt(user.expiryDate) || Date.now();
        const newExpiry = (Math.max(Date.now(), currentExpiry) + (days * 24 * 60 * 60 * 1000)).toString();
        
        await updateSingleUser(phone, { expiryDate: newExpiry }, btn);
    }

    async function setPreset(btn, phone, days) {
        const newExpiry = (Date.now() + (days * 24 * 60 * 60 * 1000)).toString();
        await updateSingleUser(phone, { expiryDate: newExpiry }, btn);
    }

    async function deleteUser(btn, phone) {
        if(confirm("حذف نهائي؟")) {
            btn.innerText = "⏳ جاري الحذف...";
            btn.disabled = true;
            try {
                const res = await fetch(`${DB_URL}/${phone}.json`, { method: 'DELETE' });
                if (res.ok) {
                    alert("✅ تم الحذف");
                    closeCard();
                    loadUsers();
                }
            } catch (e) { alert("خطأ: " + e.message); }
        }
    }

    function filterUsers() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const filtered = users.filter(u => u.name.toLowerCase().includes(term) || u.phone.includes(term));
        renderUsers(filtered);
    }

    window.onload = loadUsers;
</script>
</body>
</html>
