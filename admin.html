<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة Voltir Pro - لوحة التحكم</title>
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 15px; }
        .container { max-width: 1000px; margin: auto; }
        
        /* البطاقة التعريفية المصغرة في الجدول */
        .user-row { background: var(--card); border: 1px solid #334155; margin-bottom: 10px; padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; }
        .user-info-brief { text-align: right; }
        .user-info-brief b { font-size: 1.1em; color: var(--primary); display: block; }
        .status-pill { padding: 4px 10px; border-radius: 20px; font-size: 0.8em; font-weight: bold; }
        
        /* النافذة المنبثقة (بطاقة البيانات) */
        #userModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:100; }
        .modal-content { background: var(--card); width: 90%; max-width: 500px; margin: 40px auto; padding: 20px; border-radius: 15px; border: 1px solid var(--primary); }
        .modal-content h3 { color: var(--primary); border-bottom: 1px solid #334155; padding-bottom: 10px; }
        
        input, select { width: 100%; padding: 10px; margin: 8px 0; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 6px; box-sizing: border-box; }
        .grid-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .btn { padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-save { background: #22c55e; color: white; }
        .btn-close { background: #64748b; color: white; }
        .btn-action { background: #3b82f6; color: white; font-size: 0.8em; }
    </style>
</head>
<body>

<div class="container">
   <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
    <h2 style="margin: 0;">🛡️ إدارة المشتركين</h2>
    <button onclick="loadUsers()" class="btn btn-action" style="background: #28a745; padding: 8px 15px;">🔄 تحديث البيانات</button>
</div>
    <button onclick="loadUsers()" class="btn btn-action" style="background: #28a745; padding: 8px 15px;">🔄 تحديث البيانات</button>
    <input type="text" id="searchInput" onkeyup="filterUsers()" placeholder="🔍 ابحث بالاسم أو الرقم..." style="margin-bottom: 20px;">
    
    <div id="userList">
        </div>
</div>

<div id="userModal">
    <div class="modal-content" id="modalData">
        </div>
</div>

<script>
    // 1. إعدادات الخزنة (GitHub) - الضربة القاضية
    const GITHUB_TOKEN = localStorage.getItem('my_admin_token');
    const REPO_OWNER = "VOLTIR-HEMA";
    const REPO_NAME = "Just-Scan-DB";
    const FILE_PATH = "users.json";

    let users = [];

    async function loadUsers() {
    const listDiv = document.getElementById('userList');
    if(listDiv) listDiv.innerHTML = "⏳ جاري سحب البيانات...";
    try {
        // لازم نسحب من الـ API عشان ناخد الـ SHA المطلوب للحفظ
        const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}?t=${Date.now()}`;
        const res = await fetch(url, {
            headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
        });
        
        if (res.ok) {
            const data = await res.json();
            window.currentFileSha = data.sha; // ده اللي بيخلي الحفظ يشتغل
            // فك التشفير مع دعم العربي
            const content = decodeURIComponent(escape(atob(data.content))); 
            users = JSON.parse(content);
            renderUsers(users);
        } else {
            alert("خطأ: " + res.status + " - غالباً التوكن اتوقف من جيتهاب");
        }
    } catch (e) { alert("خطأ في الشبكة: " + e.message); }
}
    // 3. دالة الحفظ المركزية في جيتهاب
    async function syncToGitHub(updatedUsers, message) {
        const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`;
        const content = btoa(unescape(encodeURIComponent(JSON.stringify(updatedUsers, null, 2))));

        try {
            const res = await fetch(url, {
                method: 'PUT',
                headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: message,
                    content: content,
                    sha: window.currentFileSha
                })
            });

            if (res.ok) {
                const result = await res.json();
                window.currentFileSha = result.content.sha;
                alert("✅ تم الحفظ بنجاح");
                if(typeof closeCard === 'function') closeCard();
                loadUsers();
            } else {
                alert("❌ فشل الحفظ في جيتهاب: " + res.status);
            }
        } catch (e) { alert("❌ خطأ فني: " + e.message); }
    }

    // 4. عرض البيانات (نفس تصميمك)
    function renderUsers(data) {
        const container = document.getElementById('userList');
        if(!container) return;
        container.innerHTML = '';
        data.forEach(user => {
            const expiry = new Date(user.expiryDate);
            const daysLeft = Math.ceil((expiry - Date.now()) / (1000 * 60 * 60 * 24));
            const statusColor = daysLeft > 0 ? '#22c55e' : '#ef4444';

            container.innerHTML += `
                <div class="user-row">
                    <div class="user-info-brief">
                        <b>${user.name}</b>
                        <span>📱 ${user.phone} | 🏢 ${user.activity}</span>
                    </div>
                    <div style="text-align: left;">
                        <span class="status-pill" style="border: 1px solid ${statusColor}; color: ${statusColor}">
                            ${daysLeft > 0 ? 'باقي ' + daysLeft + ' يوم' : 'منتهي'}
                        </span>
                        <button class="btn btn-action" style="margin-right:10px;" onclick="openCard('${user.phone}')">تعديل البطاقة ⚙️</button>
                    </div>
                </div>`;
        });
    }

    // 5. فتح البطاقة (نفس تصميمك)
    function openCard(phone) {
        const user = users.find(u => u.phone === phone);
        const modal = document.getElementById('userModal');
        const content = document.getElementById('modalData');
        if(!modal || !content) return;
        
        content.innerHTML = `
            <h3>🪪 بطاقة: ${user.name}</h3>
            <label>الاسم:</label> <input type="text" id="m-name" value="${user.name}">
            <label>النشاط:</label> <input type="text" id="m-act" value="${user.activity}">
            <label>الباسورد:</label> <input type="text" id="m-pass" value="${user.password}">
            <button class="btn btn-save" style="width:100%" onclick="saveFullUpdate('${user.phone}')">حفظ التغييرات الأساسية</button>
            <hr style="border:0; border-top:1px solid #334155; margin:15px 0;">
            <label>➕ إضافة أيام محددة:</label>
            <div style="display:flex; gap:5px;">
                <input type="number" id="m-days" placeholder="عدد الأيام" style="margin:0;">
                <button class="btn btn-save" onclick="addCustomDays('${user.phone}')">إضافة</button>
            </div>
            <div class="grid-btns">
                <button class="btn btn-action" onclick="setPreset('${user.phone}', 30)">شهر جديد</button>
                <button class="btn btn-action" onclick="setPreset('${user.phone}', 365)">سنة جديدة</button>
                <button class="btn btn-action" style="background:#ef4444" onclick="deleteUser('${user.phone}')">حذف الحساب</button>
                <button class="btn btn-close" onclick="closeCard()">إغلاق</button>
            </div>
        `;
        modal.style.display = 'block';
    }

    function closeCard() { 
        const modal = document.getElementById('userModal');
        if(modal) modal.style.display = 'none'; 
    }

    async function saveFullUpdate(phone) {
        let usersList = [...users];
        let idx = usersList.findIndex(u => u.phone === phone);
        usersList[idx].name = document.getElementById('m-name').value;
        usersList[idx].activity = document.getElementById('m-act').value;
        usersList[idx].password = document.getElementById('m-pass').value;
        await syncToGitHub(usersList, `تحديث بيانات ${phone}`);
    }

    async function addCustomDays(phone) {
        const days = parseInt(document.getElementById('m-days').value);
        if(!days) return alert("اكتب عدد الأيام");
        let usersList = [...users];
        let idx = usersList.findIndex(u => u.phone === phone);
        let currentExpiry = usersList[idx].expiryDate || Date.now();
        usersList[idx].expiryDate = Math.max(Date.now(), currentExpiry) + (days * 24 * 60 * 60 * 1000);
        await syncToGitHub(usersList, `إضافة ${days} يوم لـ ${phone}`);
    }

    async function setPreset(phone, days) {
        let usersList = [...users];
        let idx = usersList.findIndex(u => u.phone === phone);
        usersList[idx].expiryDate = Date.now() + (days * 24 * 60 * 60 * 1000);
        await syncToGitHub(usersList, `تفعيل اشتراك ${days} يوم لـ ${phone}`);
    }

    async function deleteUser(phone) {
        if(confirm("حذف نهائي؟")) {
            let usersList = users.filter(u => u.phone !== phone);
            await syncToGitHub(usersList, `حذف المستخدم ${phone}`);
        }
    }

    function filterUsers() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const filtered = users.filter(u => u.name.toLowerCase().includes(term) || u.phone.includes(term));
        renderUsers(filtered);
    }

    // تشغيل الجلب عند البداية
    loadUsers();
</script>
</body>
</html>
