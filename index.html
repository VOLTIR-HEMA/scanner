<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سكانر إبراهيم</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: white; padding: 20px; }
        #reader { width: 100%; max-width: 400px; margin: auto; border-radius: 15px; overflow: hidden; border: 2px solid #007bff; }
        .status { margin-top: 20px; font-size: 1.2em; color: #00ff00; }
    </style>
</head>
<body>
    <h3>سكانر صيدلية إبراهيم 🚀</h3>
    <div id="reader"></div>
    <div id="result" class="status">جاهز للمسح...</div>

    <script>
        function onScanSuccess(decodedText) {
            document.getElementById('result').innerText = "تم الإرسال: " + decodedText;
            // إرسال الكود لخدمة ntfy المجانية
            fetch('https://ntfy.sh/ibrahim_pharmacy_2026', {
                method: 'POST',
                body: decodedText
            });
            if (navigator.vibrate) navigator.vibrate(100);
        }
        let html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 20, qrbox: {width: 250, height: 150} });
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
