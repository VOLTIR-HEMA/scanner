<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Just Scan - Professional Layout</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #000; color: white; margin: 0; padding: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        /* الحاوية الكبيرة */
        .app-wrapper { display: flex; flex-direction: column; height: 100vh; width: 100vw; }

        /* شريط الأدوات العلوي (للموبايل طولي) */
        .top-bar { display: flex; justify-content: space-around; padding: 5px; background: #1a1a1a; border-bottom: 1px solid #333; z-index: 10; }
        .top-bar button { background: #333; color: white; border: 1px solid #555; padding: 8px 4px; border-radius: 6px; font-size: 0.7em; flex: 1; margin: 0 2px; }
        .top-bar button.active { background: #ffcc00; color: #000; font-weight: bold; }

        /* منطقة المحتوى الأوسط */
        .main-content { flex: 1; display: flex; flex-direction: column; position: relative; overflow: hidden; }

        #reader { width: 100% !important; flex: 1; background: #000; }
        /* تحسين مظهر الكاميرا داخل المكتبة */
        #reader video { object-fit: cover !important; }

        #dynamic-buttons { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; padding: 8px; background: #000; }
        .custom-btn { padding: 12px 2px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.2); color: white; font-weight: bold; font-size: 0.75em; text-align: center; }

        .result-box { position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); width: 90%; background: rgba(0,0,0,0.7); padding: 8px; border-radius: 10px; color: #00ff00; border: 1px solid #00ff00; z-index: 5; font-size: 0.8em; }

        /* وضع العرض (Landscape) - التعديل السحري */
        @media (orientation: landscape) {
            .app-wrapper { flex-direction: row; }
            
            /* شريط الأدوات يروح يمين */
            .top-bar { flex-direction: column; width: 80px; height: 100%; border-bottom: none; border-left: 1px solid #333; order: 3; }
            .top-bar button { margin: 4px 0; font-size: 0.65em; flex: none; height: 18%; }

            /* الأزرار الملونة تروح شمال */
            #dynamic-buttons { grid-template-columns: 1fr; width: 90px; height: 100%; order: 1; overflow-y: auto; }
            .custom-btn { height: 60px; display: flex; align-items: center; justify-content: center; }

            /* الكاميرا في النص */
            .main-content { order: 2; flex: 1; }
            .result-box { bottom: 20px; width: 60%; }
        }

        #manual-input-container { display: none; padding: 10px; background: #222; position: absolute; top: 0; width: 100%; z-index: 20; }
        #manual-input-container input { width: 80%; padding: 10px; border-radius: 8px; background: #000; color: #00ff00; border: 1px solid #00ff00; }
        
        #settings-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; overflow-y: auto; }
        .modal-content { background: #222; width: 85%; margin: 20px auto; padding: 15px; border-radius: 15px; }
    </style>
</head>
<body>

<div class="app-wrapper">
    <div class="top-bar">
        <button onclick="toggleSettings(true)">⚙️ Sett</button>
        <button onclick="toggleFullscreen()">🔲 Full</button>
        <button id="kb-btn" onclick="toggleManualInput()">⌨️ Key</button>
        <button id="flash-btn" onclick="toggleFlash()">🔦 Flash</button>
        <button id="billModeBtn" onclick="toggleBillMode()">📑 Bill</button>
    </div>

    <div class="main-content">
        <div id="manual-input-container">
            <input type="text" id="manual-barcode" placeholder="Enter & Press Enter..." onkeypress="handleManualEntry(event)">
        </div>
        <div id="reader"></div>
        <div id="result" class="result-box">Ready...</div>
        <button id="sendAllBtn" style="display:none; position:absolute; top:50px; left:50%; transform:translateX(-50%); z-index:100; padding:15px; background:#28a745; color:white; border:none; border-radius:10px;" onclick="sendFullBill()">📤 Send Bill (<span id="count">0</span>)</button>
    </div>

    <div id="dynamic-buttons"></div>
</div>

<div id="settings-modal">
    <div class="modal-content">
        <h3>⚙️ Buttons Config</h3>
        <div id="settings-list"></div>
        <button onclick="addNewButtonSetting()" style="width:100%; padding:10px; margin:10px 0;">➕ Add New</button>
        <button onclick="saveSettings()" style="width:100%; padding:15px; background:#28a745; color:white; border:none;">Save & Close</button>
    </div>
</div>

<script>
    // نظام الصوت
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playBeep() {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = "sine"; osc.frequency.value = 800;
        gain.gain.setValueAtTime(0, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.start(); osc.stop(audioCtx.currentTime + 0.12);
    }

    let buttons = JSON.parse(localStorage.getItem('userButtons')) || [
        { name: "جديد", cmd: "f8", useEnter: true, color: "#007bff" },
        { name: "حفظ", cmd: "f9", useEnter: true, color: "#28a745" },
        { name: "Enter", cmd: "enter", useEnter: false, color: "#444" },
        { name: "Tab", cmd: "tab", useEnter: false, color: "#555" },
        { name: "F1", cmd: "f1", useEnter: false, color: "#333" }
    ];

    let isBillMode = false, billItems = [], lastScanTime = 0, isFlashOn = false;

    function renderButtons() {
        const container = document.getElementById('dynamic-buttons');
        container.innerHTML = '';
        buttons.forEach((btn, index) => {
            const b = document.createElement('button');
            b.className = 'custom-btn';
            b.style.backgroundColor = btn.color || '#444';
            b.innerText = btn.name;
            b.onclick = () => sendCommand(btn.cmd, btn.useEnter);
            container.appendChild(b);
        });
    }

    async function sendCommand(cmd, useEnter) {
        document.getElementById('result').innerText = `Sent: ${cmd}`;
        await fetch('https://ntfy.sh/ibrahim_pharmacy_2026', { method: 'POST', body: cmd });
        if (useEnter) {
            await new Promise(r => setTimeout(r, 600));
            await fetch('https://ntfy.sh/ibrahim_pharmacy_2026', { method: 'POST', body: 'enter' });
        }
    }

    function onScanSuccess(text) {
        if (Date.now() - lastScanTime < 2000) return;
        lastScanTime = Date.now();
        playBeep(); // تشغيل الصوت
        
        if (isBillMode) {
            billItems.push(text);
            document.getElementById('count').innerText = billItems.length;
            document.getElementById('result').innerText = "Stored: " + text;
        } else {
            document.getElementById('result').innerText = "Sent: " + text;
            fetch('https://ntfy.sh/ibrahim_pharmacy_2026', { method: 'POST', body: text + '_ent' });
        }
    }

    function toggleFullscreen() {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
    }

    function toggleManualInput() {
        const c = document.getElementById('manual-input-container');
        c.style.display = (c.style.display === 'block') ? 'none' : 'block';
        if(c.style.display === 'block') document.getElementById('manual-barcode').focus();
    }

    function handleManualEntry(e) {
        if (e.key === "Enter") {
            const val = e.target.value.trim();
            if (val) { onScanSuccess(val); e.target.value = ''; }
        }
    }

    async function toggleFlash() {
        try {
            const track = document.querySelector('video').srcObject.getVideoTracks()[0];
            isFlashOn = !isFlashOn;
            await track.applyConstraints({ advanced: [{ torch: isFlashOn }] });
        } catch (e) { alert("Camera not ready"); }
    }

    function toggleBillMode() {
        isBillMode = !isBillMode;
        document.getElementById('billModeBtn').classList.toggle('active', isBillMode);
        document.getElementById('sendAllBtn').style.display = (!isBillMode && billItems.length > 0) ? 'block' : 'none';
    }

    async function sendFullBill() {
        const btn = document.getElementById('sendAllBtn'); btn.disabled = true;
        for (let item of billItems) {
            await fetch('https://ntfy.sh/ibrahim_pharmacy_2026', { method: 'POST', body: item + '_ent' });
            await new Promise(r => setTimeout(r, 1000));
        }
        billItems = []; btn.style.display = 'none'; btn.disabled = false;
        document.getElementById('result').innerText = "Sent!";
    }

    function toggleSettings(show) { 
        document.getElementById('settings-modal').style.display = show ? 'block' : 'none'; 
        if(show) renderSettingsList(); 
    }

    function renderSettingsList() {
        const list = document.getElementById('settings-list');
        list.innerHTML = '';
        buttons.forEach((btn, index) => {
            list.innerHTML += `<div style="background:#333; padding:10px; margin-bottom:5px; border-radius:8px;">
                <input type="text" value="${btn.name}" oninput="buttons[${index}].name=this.value" style="width:40%">
                <input type="text" value="${btn.cmd}" oninput="buttons[${index}].cmd=this.value" style="width:30%">
                <button onclick="buttons.splice(${index},1); renderSettingsList()" style="color:red">X</button>
            </div>`;
        });
    }

    function addNewButtonSetting() { buttons.push({name:'New', cmd:'f1'}); renderSettingsList(); }
    function saveSettings() { localStorage.setItem('userButtons', JSON.stringify(buttons)); renderButtons(); toggleSettings(false); }

    window.onload = () => {
        const scanner = new Html5QrcodeScanner("reader", { 
            fps: 20, qrbox: { width: 250, height: 150 },
            aspectRatio: 1.0 // يخلي شكل السكانر مربع ومنضبط
        });
        scanner.render(onScanSuccess);
        renderButtons();
    };
</script>
</body>
</html>
