<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Just Scan - Ibrahim Edition</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #000; color: white; margin: 0; padding: 0; overflow-x: hidden; }
        .top-bar { display: flex; justify-content: space-around; align-items: center; padding: 8px; background: #1a1a1a; border-bottom: 1px solid #333; flex-wrap: wrap; gap: 5px; }
        .top-bar button { background: #333; color: white; border: 1px solid #555; padding: 6px 10px; border-radius: 6px; font-size: 0.75em; cursor: pointer; }
        #reader { width: 100% !important; max-width: 500px; margin: 5px auto; border: none !important; min-height: 250px; background: #000; }
        .result-box { margin: 5px 10px; padding: 8px; background: #111; border-radius: 8px; color: #00ff00; font-size: 0.85em; border: 1px solid #222; min-height: 20px; }
        #dynamic-buttons { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; padding: 8px; }
        .custom-btn { padding: 12px 2px; border-radius: 6px; border: 1px solid #444; color: white; font-weight: bold; font-size: 0.75em; text-align: center; cursor: pointer; }
        #settings-modal, #keyboard-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; overflow-y: auto; }
        .modal-content { background: #222; width: 85%; margin: 20px auto; padding: 15px; border-radius: 15px; text-align: left; border: 1px solid #444; }
    </style>
</head>
<body>

<div id="auth-overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 3000; display: flex; justify-content: center; align-items: center; flex-direction: column; text-align: center;">
    <h2 style="color: #00ffcc;">VoltIR 🛡️</h2>
    <p>يرجى تسجيل الدخول</p>
    <div style="background:#111; padding:20px; border-radius:15px; border:1px solid #444; width:80%;">
        <input type="tel" id="u-phone" placeholder="رقم الموبايل" style="width:100%; padding:12px; margin-bottom:10px; background:#000; color:#0f0; border:1px solid #333; border-radius:8px; box-sizing:border-box;">
        <input type="password" id="u-pass" placeholder="كلمة المرور" style="width:100%; padding:12px; margin-bottom:15px; background:#000; color:#0f0; border:1px solid #333; border-radius:8px; box-sizing:border-box;">
        <div style="display:flex; gap:10px;">
            <button onclick="handleAuth('login')" style="flex:1; padding:12px; background:#333; color:white; border:none; border-radius:8px; font-weight:bold;">دخول</button>
            <button onclick="handleAuth('register')" style="flex:1; padding:12px; background:#007bff; color:white; border:none; border-radius:8px; font-weight:bold;">تسجيل</button>
        </div>
    </div>
</div>

    <div class="top-bar">
        <button onclick="toggleSettings(true)">⚙️</button>
        <button onclick="toggleFlash()">🔦</button>
        <button onclick="toggleFullScreen()">📺</button>
        <button id="billModeBtn" onclick="toggleBillMode()">📑 Bill: OFF</button>
    </div>

    <div id="reader"></div>
    <div id="result" class="result-box">في انتظار تسجيل الدخول...</div>
    <div id="dynamic-buttons"></div>

    <script>
        const NTFY_URL = 'https://ntfy.sh/ibrahim_pharmacy_2026';
        const SERVER_URL = 'https://round-resonance-b6f1.voltir-f.workers.dev';
        let isBillMode = false, billItems = [], lastScanTime = 0, isFlashOn = false;
        let currentUser = localStorage.getItem('v_phone');

        let buttons = JSON.parse(localStorage.getItem('userButtons')) || [
            { name: "Add", cmd: "f8", useEnter: true, color: "#007bff" },
            { name: "Save", cmd: "f9", useEnter: true, color: "#28a745" }
        ];

        async function handleAuth(action) {
            const phone = document.getElementById('u-phone').value;
            const pass = document.getElementById('u-pass').value;
            if(!phone || !pass) return alert("اكمل البيانات");
            
            try {
                const res = await fetch(SERVER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action, phone, password: pass })
                });
                if(res.ok) {
                    localStorage.setItem('v_phone', phone);
                    location.reload();
                } else {
                    alert("خطأ في البيانات أو المستخدم موجود بالفعل");
                }
            } catch(e) { alert("تعذر الاتصال بالسيرفر"); }
        }

        function masterSend(text) {
            fetch(NTFY_URL, { method: 'POST', body: text });
            if(currentUser) {
                fetch(SERVER_URL, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'scan', phone: currentUser, code: text }) 
                });
            }
        }

        function onScanSuccess(text) {
            if (Date.now() - lastScanTime < 1500) return; 
            lastScanTime = Date.now();
            masterSend(text + '_ent');
            document.getElementById('result').innerText = "تم إرسال: " + text;
        }

        function renderButtons() {
            const container = document.getElementById('dynamic-buttons');
            container.innerHTML = '';
            buttons.forEach((btn) => {
                const b = document.createElement('button');
                b.className = 'custom-btn';
                b.style.backgroundColor = btn.color;
                b.innerText = btn.name;
                b.onclick = () => { masterSend(btn.cmd); if(btn.useEnter) setTimeout(()=>masterSend('enter'), 400); };
                container.appendChild(b);
            });
        }

        window.onload = () => {
            if (currentUser) {
                document.getElementById('auth-overlay').style.display = 'none';
                const scanner = new Html5QrcodeScanner("reader", { fps: 20, qrbox: 250 });
                scanner.render(onScanSuccess);
                renderButtons();
            }
        };

        function toggleFullScreen() { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }
        function toggleBillMode() { alert("وضع الفاتورة قيد التطوير"); }
    </script>
</body>
</html>
