<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Just Scan - Ibrahim Pro</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #000; color: white; margin: 0; padding: 0; overflow-x: hidden; }
        .top-bar { display: flex; justify-content: space-around; align-items: center; padding: 8px; background: #1a1a1a; border-bottom: 1px solid #333; flex-wrap: wrap; gap: 5px; }
        .top-bar button { background: #333; color: white; border: 1px solid #555; padding: 6px 10px; border-radius: 6px; font-size: 0.75em; cursor: pointer; }
        
        #reader { width: 100% !important; max-width: 500px; margin: 5px auto; border: none !important; min-height: 250px; background: #000; }
        
        /* كود تعديل الكاميرا السيلفي لو مقلوبة */
        video { transform: scaleX(1) !important; } 

        #reader button { background: #444 !important; color: white !important; border: 1px solid #666 !important; padding: 8px !important; border-radius: 5px !important; margin: 5px !important; }
        #reader select { background: #222 !important; color: white !important; padding: 5px !important; border-radius: 5px !important; color: #fff; }

        .result-box { margin: 5px 10px; padding: 8px; background: #111; border-radius: 8px; color: #00ff00; font-size: 0.85em; border: 1px solid #222; min-height: 20px; }
        
        #dynamic-buttons { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; padding: 8px; }
        .custom-btn { padding: 12px 2px; border-radius: 6px; border: 1px solid #444; color: white; font-weight: bold; font-size: 0.75em; text-align: center; cursor: pointer; }

        /* نافذة الكيبورد - تظهر فوق بشريط أحمر */
        #keyboard-modal { display: none; position: fixed; top: 10px; left: 0; width: 100%; z-index: 3000; justify-content: center; }
        .keyboard-content { background: #111; border: 2px solid #ff0000; border-radius: 12px; padding: 15px; width: 85%; max-width: 350px; box-shadow: 0 5px 25px rgba(255,0,0,0.5); }
        .keyboard-content input { width: 90%; padding: 12px; background: #000; border: 1px solid #444; color: #00ff00; border-radius: 8px; font-size: 1.1em; text-align: center; margin-bottom: 10px; outline: none; }
        .keyboard-btns { display: flex; gap: 10px; }
        .keyboard-btns button { flex: 1; padding: 10px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; color: white; }

        #settings-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; overflow-y: auto; }
        .modal-content { background: #222; width: 85%; margin: 20px auto; padding: 15px; border-radius: 15px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <button onclick="toggleSettings(true)">⚙️</button>
        <button id="flash-btn" onclick="toggleFlash()">🔦</button>
        <button id="full-screen-btn" onclick="toggleFullScreen()">📺 Full</button>
        <button onclick="openKeyboardModal()">⌨️ Keyboard</button>
        <button id="billModeBtn" onclick="toggleBillMode()">📑 Bill: OFF</button>
    </div>

    <div id="reader"></div>
    <div id="result" class="result-box">جاهز للمسح...</div>
    <div id="dynamic-buttons"></div>

    <div id="keyboard-modal">
        <div class="keyboard-content">
            <h4 style="margin: 0 0 10px 0; color: #ff0000;">إدخال مستمر للكمبيوتر</h4>
            <input type="text" id="manual-input" placeholder="اكتب الكود هنا..." onkeypress="handleKbdEnter(event)">
            <div class="keyboard-btns">
                <button onclick="submitManualInput()" style="background: #28a745;">إرسال</button>
                <button onclick="closeKeyboardModal()" style="background: #444;">إغلاق</button>
            </div>
        </div>
    </div>

    <script>
        const NTFY_URL = 'https://ntfy.sh/ibrahim_pharmacy_2026';
        let isBillMode = false, billItems = [], lastScanTime = 0, isFlashOn = false;
        let buttons = JSON.parse(localStorage.getItem('userButtons')) || [
            { name: "Add", cmd: "f8", useEnter: true, color: "#007bff" },
            { name: "Save", cmd: "f9", useEnter: true, color: "#28a745" }
        ];

        function doVibrate(ms = 100) { if (navigator.vibrate) navigator.vibrate(ms); }
        function playBeep() {
            try {
                const context = new (window.AudioContext || window.webkitAudioContext)();
                const osc = context.createOscillator();
                const gain = context.createGain();
                osc.type = 'sine'; osc.frequency.value = 800; gain.gain.value = 0.1;
                osc.connect(gain); gain.connect(context.destination);
                osc.start(); osc.stop(context.currentTime + 0.1);
            } catch (e) {}
        }

        // الكيبورد
        function openKeyboardModal() {
            document.getElementById('keyboard-modal').style.display = 'flex';
            setTimeout(() => document.getElementById('manual-input').focus(), 200);
        }
        function closeKeyboardModal() { document.getElementById('keyboard-modal').style.display = 'none'; }
        
        function handleKbdEnter(e) { if(e.key === 'Enter') submitManualInput(); }

        async function submitManualInput() {
            const input = document.getElementById('manual-input');
            const val = input.value.trim();
            if (val !== "") {
                // إرسال للكمبيوتر (بإضافة _ent لضمان التنفيذ)
                try {
                    await fetch(NTFY_URL, { method: 'POST', body: val + '_ent' });
                    document.getElementById('result').innerText = "تم إرسال: " + val;
                    playBeep();
                    doVibrate(50);
                    input.value = ''; // يمسح الخانة ويخليك تكتب تاني
                    input.focus();
                } catch(e) { alert("فشل الإرسال، تأكد من الإنترنت"); }
            }
        }

        function onScanSuccess(text) {
            if (Date.now() - lastScanTime < 2500) return;
            lastScanTime = Date.now();
            playBeep();
            doVibrate(100);
            fetch(NTFY_URL, { method: 'POST', body: text + '_ent' });
            document.getElementById('result').innerText = "تم مسح: " + text;
        }

        window.onload = () => {
            const scanner = new Html5QrcodeScanner("reader", { 
                fps: 20, 
                qrbox: { width: 250, height: 150 },
                rememberLastUsedCamera: true
            });
            scanner.render(onScanSuccess);
            renderButtons();
        };

        // الأزرار
        function renderButtons() {
            const container = document.getElementById('dynamic-buttons');
            container.innerHTML = '';
            buttons.forEach((btn, index) => {
                const b = document.createElement('button');
                b.className = 'custom-btn';
                b.style.backgroundColor = btn.color || '#444';
                b.innerText = btn.name;
                b.onclick = () => sendCommand(btn.cmd, btn.useEnter);
                container.appendChild(b);
            });
        }
        async function sendCommand(cmd, useEnter) {
            await fetch(NTFY_URL, { method: 'POST', body: cmd });
            if (useEnter) {
                await new Promise(r => setTimeout(r, 400));
                await fetch(NTFY_URL, { method: 'POST', body: 'enter' });
            }
            playBeep(); doVibrate(50);
        }
        function toggleSettings(show) { document.getElementById('settings-modal').style.display = show ? 'block' : 'none'; }
        function toggleFullScreen() { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }
        async function toggleFlash() {
            try {
                const track = document.querySelector('video').srcObject.getVideoTracks()[0];
                isFlashOn = !isFlashOn;
                await track.applyConstraints({ advanced: [{ torch: isFlashOn }] });
            } catch (e) { alert("الفلاش غير مدعوم"); }
        }
    </script>
</body>
</html>
