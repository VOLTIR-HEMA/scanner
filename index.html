<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سكانر إبراهيم</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: white; padding: 10px; }
        #reader { width: 100%; max-width: 450px; margin: auto; border-radius: 15px; border: 2px solid #007bff; background: #000; }
        .result-box { margin-top: 20px; padding: 15px; background: #1e1e1e; border-radius: 10px; color: #00ff00; font-weight: bold; }
    </style>
</head>
<body>
    <h3>سكانر صيدلية إبراهيم 🚀</h3>
    
    <div id="reader"></div>
    
    <div id="result" class="result-box">في انتظار المسح...</div>

    <script>
        function onScanSuccess(decodedText, decodedResult) {
            document.getElementById('result').innerText = "تم الإرسال: " + decodedText;
            
            // إرسال الكود فوراً
            fetch('https://ntfy.sh/ibrahim_pharmacy_2026', {
                method: 'POST',
                body: decodedText
            });

            if (navigator.vibrate) navigator.vibrate(100);
        }

        // إعدادات السكانر الأوتوماتيك
        let html5QrcodeScanner = new Html5QrcodeScanner(
            "reader", 
            { 
                fps: 20, 
                qrbox: {width: 250, height: 150},
                rememberLastUsedCamera: true,
                supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA]
            },
            /* verbose= */ false
        );

        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
