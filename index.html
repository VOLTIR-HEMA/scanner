<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Just Scan - Ibrahim Edition</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #000; color: white; margin: 0; padding: 0; overflow-x: hidden; }
        .top-bar { display: flex; justify-content: space-around; align-items: center; padding: 8px; background: #1a1a1a; border-bottom: 1px solid #333; flex-wrap: wrap; gap: 5px; }
        .top-bar button { background: #333; color: white; border: 1px solid #555; padding: 6px 10px; border-radius: 6px; font-size: 0.75em; cursor: pointer; }
        #reader { width: 100% !important; max-width: 500px; margin: 5px auto; border: none !important; min-height: 250px; background: #000; }
        #reader button { background: #444 !important; color: white !important; padding: 8px !important; border-radius: 5px !important; margin: 5px !important; border: 1px solid #666 !important; }
        #reader select { background: #222 !important; color: white !important; padding: 5px !important; border-radius: 5px !important; }
        .result-box { margin: 5px 10px; padding: 8px; background: #111; border-radius: 8px; color: #00ff00; font-size: 0.85em; border: 1px solid #222; min-height: 20px; }
        #dynamic-buttons { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; padding: 8px; }
        .custom-btn { padding: 12px 2px; border-radius: 6px; border: 1px solid #444; color: white; font-weight: bold; font-size: 0.75em; text-align: center; cursor: pointer; }
        #settings-modal, #keyboard-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; overflow-y: auto; }
        .modal-content { background: #222; width: 85%; margin: 20px auto; padding: 15px; border-radius: 15px; text-align: left; border: 1px solid #444; }
        .setting-row { background: #333; padding: 10px; margin-bottom: 10px; border-radius: 8px; display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
        
        /* شاشة القفل المستترة */
        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 3000; display: none; justify-content: center; align-items: center; flex-direction: column; text-align: center; padding: 20px; box-sizing: border-box; }
        .auth-box { border: 1px solid #444; padding: 15px; border-radius: 10px; margin-bottom: 15px; background: #1a1a1a; width: 100%; box-sizing: border-box; }
        .auth-box input { width: 100%; padding: 10px; margin: 5px 0; border-radius: 6px; border: 1px solid #555; background: #000; color: #0f0; box-sizing: border-box; text-align: center; }
        .auth-box button { width: 100%; padding: 10px; margin-top: 5px; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <h1 style="color: #00ffcc; margin-bottom: 10px;">VoltIR 🛡️</h1>
        <p style="color: #ccc; margin-bottom: 20px;">يجب تسجيل الدخول لاستخدام السكانر</p>
        <button onclick="toggleSettings(true)" style="padding: 15px 30px; background: #ffcc00; color: #000; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1.1em;">فتح الإعدادات للدخول ⚙️</button>
    </div>

    <div class="top-bar">
        <button onclick="toggleSettings(true)">⚙️</button>
        <button id="flash-btn" onclick="toggleFlash()">🔦</button>
        <button id="full-screen-btn" onclick="toggleFullScreen()">📺 Full</button>
        <button onclick="openKeyboardModal()">⌨️ Keyboard</button>
        <button id="billModeBtn" onclick="toggleBillMode()">📑 Bill: OFF</button>
    </div>

    <div id="reader"></div>
    <div id="result" class="result-box">جاري التحميل...</div>
    <div id="dynamic-buttons"></div>

    <div id="settings-modal">
        <div class="modal-content">
            <h3 style="color: #ffcc00;">⚙️ الإعدادات</h3>
            
            <div class="auth-box">
                <div id="auth-logged-in" style="display:none;">
                    <p style="margin:0; font-size:0.9em; color:#bbb;">الحساب النشط: <span id="display-phone" style="color:#0f0; font-weight:bold;"></span></p>
                    <button onclick="userLogout()" style="background:#800; color:white;">تسجيل خروج 🚪</button>
                </div>
                <div id="auth-logged-out">
                    <p style="margin:0 0 10px 0; font-size:0.8em; color:#00ffcc;">تسجيل الدخول / إنشاء حساب</p>
                    <input type="tel" id="login-phone" placeholder="رقم الموبايل">
                    <input type="password" id="login-pass" placeholder="كلمة المرور">
                    <div style="display:flex; gap:5px;">
                        <button onclick="userAuth('login')" style="background:#333; color:white; flex:1;">دخول</button>
                        <button onclick="userAuth('register')" style="background:#0055ff; color:white; flex:1;">تسجيل</button>
                    </div>
                </div>
            </div>

            <div id="settings-list"></div>
            <button onclick="addNewButtonSetting()" style="width:100%; padding:10px; background:#444; color:white; border-radius:8px; margin-top:10px;">➕ إضافة زر</button>
            <button onclick="saveSettings()" style="width:100%; padding:15px; background:#28a745; color:white; border-radius:10px; margin-top:15px; font-weight:bold;">حفظ وإغلاق</button>
        </div>
    </div>

    <div id="keyboard-modal">
        <div class="modal-content" style="text-align: center; margin-top: 50px;">
            <h4 style="color: #ff0000;">إدخال مستمر</h4>
            <input type="text" id="manual-input" style="width: 80%; padding: 15px; background: #000; color: #00ff00; border: 1px solid #444; border-radius: 8px; font-size: 1.2em;" onkeypress="if(event.key==='Enter') submitManualInput()">
            <br><br>
            <div style="display:flex; gap:5px; justify-content:center;">
                <button onclick="submitManualInput()" style="flex:1; padding:10px; background:#28a745; color:white; border:none; border-radius:8px;">إرسال</button>
                <button onclick="sendManualEnter()" style="flex:1; padding:10px; background:#007bff; color:white; border:none; border-radius:8px;">Enter ⏎</button>
                <button onclick="closeKeyboardModal()" style="flex:1; padding:10px; background:#444; color:white; border:none; border-radius:8px;">إغلاق</button>
            </div>
        </div>
    </div>

    <script>
        const NTFY_URL = 'https://ntfy.sh/ibrahim_pharmacy_2026';
        const SERVER_URL = '/.netlify/functions/index';
        let isBillMode = false, billItems = [], lastScanTime = 0, isFlashOn = false;

        ];

        // --- نظام الحماية ---
        function checkProtection() {
            const overlay = document.getElementById('auth-overlay');
            if (!currentUser) {
                overlay.style.display = 'flex';
                return false;
            } else {
                overlay.style.display = 'none';
                return true;
            }
        }

        function checkLoginStatus() {
            if(currentUser) {
                document.getElementById('auth-logged-in').style.display = 'block';
                document.getElementById('auth-logged-out').style.display = 'none';
                document.getElementById('display-phone').innerText = currentUser;
            } else {
                document.getElementById('auth-logged-in').style.display = 'none';
                document.getElementById('auth-logged-out').style.display = 'block';
            }
        }

        async function userAuth(action) {
            const phone = document.getElementById('login-phone').value;
            const pass = document.getElementById('login-pass').value;
            if(!phone || !pass) return alert("اكمل البيانات");
            const res = await fetch(SERVER_URL, {
                method: 'POST',
                body: JSON.stringify({ action, phone, password: pass })
            });
            if(res.ok) {
                localStorage.setItem('v_phone', phone);
                currentUser = phone;
                alert("تم بنجاح! سيتم إعادة تحميل التطبيق");
                location.reload();
            } else {
                const err = await res.json();
                alert(err.error || "خطأ في البيانات");
            }
        }

        function userLogout() {
            if(confirm("هل تريد تسجيل الخروج؟")) {
                localStorage.removeItem('v_phone');
                location.reload();
            }
        }
