<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Just Scan - Ibrahim Edition</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #000; color: white; margin: 0; padding: 0; overflow-x: hidden; }
        .top-bar { display: flex; justify-content: space-around; align-items: center; padding: 8px; background: #1a1a1a; border-bottom: 1px solid #333; flex-wrap: wrap; gap: 5px; }
        .top-bar button { background: #333; color: white; border: 1px solid #555; padding: 6px 10px; border-radius: 6px; font-size: 0.75em; cursor: pointer; }
        #reader { width: 100% !important; max-width: 500px; margin: 5px auto; border: none !important; min-height: 250px; background: #000; }
        .result-box { margin: 5px 10px; padding: 8px; background: #111; border-radius: 8px; color: #00ff00; font-size: 0.85em; border: 1px solid #222; min-height: 20px; }
        #dynamic-buttons { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; padding: 8px; }
        .custom-btn { padding: 12px 2px; border-radius: 6px; border: 1px solid #444; color: white; font-weight: bold; font-size: 0.75em; text-align: center; cursor: pointer; }
        
        /* شاشة الدخول */
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 5000; display: flex; justify-content: center; align-items: center; }
        .login-box { background: #1a1a1a; padding: 25px; border-radius: 15px; border: 1px solid #333; width: 85%; max-width: 320px; }
        .login-box input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #444; background: #000; color: #00ffcc; box-sizing: border-box; text-align: center; }
        .login-box button { width: 100%; padding: 12px; background: #00ffcc; color: #000; border: none; border-radius: 8px; font-weight: bold; margin-top: 10px; }
        #settings-modal, #keyboard-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; overflow-y: auto; }
        .modal-content { background: #222; width: 85%; margin: 20px auto; padding: 15px; border-radius: 15px; text-align: left; border: 1px solid #444; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="color: #00ffcc;">VoltIR 🛡️</h2>
            <div style="margin-bottom:10px;">
                <button id="t-login" onclick="setAuth(true)" style="width:45%; background:#333; color:white; font-size:12px;">دخول</button>
                <button id="t-reg" onclick="setAuth(false)" style="width:45%; background:transparent; color:#888; font-size:12px;">تسجيل</button>
            </div>
            <input type="tel" id="u-phone" placeholder="رقم الموبايل">
            <input type="password" id="u-pass" placeholder="كلمة المرور">
            <button onclick="handleAuth()" id="main-btn">دخول</button>
        </div>
    </div>

    <div class="top-bar">
        <button onclick="toggleSettings(true)">⚙️</button>
        <button id="flash-btn" onclick="toggleFlash()">🔦</button>
        <button onclick="openKeyboardModal()">⌨️ Keyboard</button>
        <button onclick="logout()" style="background:#600;">🚪 خروج</button>
        <button id="billModeBtn" onclick="toggleBillMode()">📑 Bill: OFF</button>
    </div>

    <div id="reader"></div>
    <div id="result" class="result-box">جاهز للمسح...</div>
    <div id="dynamic-buttons"></div>

    <script>
        const SERVER_URL = '/.netlify/functions/index';
        const NTFY_URL = 'https://ntfy.sh/ibrahim_pharmacy_2026';
        let isLogin = true;
        let currentUser = localStorage.getItem('v_phone');

        if(currentUser) document.getElementById('login-screen').style.display = 'none';

        function setAuth(val) {
            isLogin = val;
            document.getElementById('main-btn').innerText = val ? "دخول" : "إنشاء حساب";
            document.getElementById('t-login').style.background = val ? "#333" : "transparent";
            document.getElementById('t-reg').style.background = !val ? "#333" : "transparent";
        }

        async function handleAuth() {
            const phone = document.getElementById('u-phone').value;
            const pass = document.getElementById('u-pass').value;
            if(!phone || !pass) return alert("اكمل البيانات");
            
            const res = await fetch(SERVER_URL, {
                method: 'POST',
                body: JSON.stringify({ action: isLogin ? 'login' : 'register', phone, password: pass })
            });
            if(res.ok) {
                localStorage.setItem('v_phone', phone);
                location.reload();
            } else {
                const err = await res.json();
                alert(err.error || "فشل الطلب");
            }
        }

        function logout() {
            if(confirm("خروج؟")) { localStorage.removeItem('v_phone'); location.reload(); }
        }

        // باقي دوال السكانر والأزرار (onScanSuccess, toggleFlash, etc.) توضع هنا كما هي في كودك الأصلي
        // ... (تكملة الكود الخاص بك) ...
    </script>
</body>
</html>
