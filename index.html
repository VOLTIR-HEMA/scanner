<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Ibrahim</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        #video { width: 100vw; height: 100vh; object-fit: cover; }
        .scan-region { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 250px; height: 150px; border: 2px solid #fff; border-radius: 10px; box-shadow: 0 0 0 5000px rgba(0,0,0,0.5); pointer-events: none; }
        .controls { position: absolute; width: 100%; display: flex; justify-content: space-around; z-index: 10; padding: 15px 0; }
        .top-bar { top: 0; background: rgba(0,0,0,0.4); }
        .bottom-bar { bottom: 0; background: rgba(0,0,0,0.4); padding-bottom: 30px; }
        .btn { background: #444; color: white; border: 1px solid #666; padding: 10px; border-radius: 8px; min-width: 50px; cursor: pointer; }
        .hidden { display: none; }
        #batch-container { position: absolute; top: 120px; width: 90%; left: 5%; z-index: 20; }
        #batch-input { width: 100%; padding: 15px; border-radius: 10px; border: none; font-size: 18px; }
    </style>
</head>
<body>

    <video id="video" autoplay playsinline></video>
    <div class="scan-region"></div>

    <div class="controls top-bar">
        <button class="btn" onclick="alert('قريباً الضبط')">⚙️</button>
        <button class="btn" onclick="toggleFlash()">⚡</button>
        <button class="btn" id="t1" onclick="sendToPC('F5')">+</button> <button class="btn" id="t2" onclick="sendToPC('Delete')">🗑️</button>
        <button class="btn" onclick="sendToPC('Enter')">⏎</button>
    </div>

    <div id="batch-container" class="hidden">
        <input type="text" id="batch-input" placeholder="اكتب هنا وادوس انتر...">
    </div>

    <div class="controls bottom-bar">
        <button class="btn" onclick="document.getElementById('batch-container').classList.toggle('hidden')">📄</button>
        <button class="btn" onclick="document.getElementById('batch-input').focus()">⌨️</button>
        <button class="btn">B3</button>
        <button class="btn">B4</button>
        <button class="btn">B5</button>
    </div>

    <audio id="beep" src="https://www.soundjay.com/buttons/beep-07.wav" preload="auto"></audio>

    <script>
        const pc_ip = "192.168.1.5"; // غير الـ IP بتاعك هنا مؤقتاً
        const codeReader = new ZXing.BrowserMultiFormatReader();
        const beep = document.getElementById('beep');

        // دالة الإرسال اللي الجافا بيفهمها
        function sendToPC(data) {
            fetch(`http://${pc_ip}:8080/send?cmd=${encodeURIComponent(data)}`, {mode: 'no-cors'})
            .catch(e => console.log("خطأ في الاتصال"));
        }

        // تشغيل الكاميرا والسكانر (القديم الشغال)
        codeReader.decodeFromVideoDevice(null, 'video', (result, err) => {
            if (result) {
                beep.play(); // الصوت اشتغل
                sendToPC(result.text); // بعت للجافا
                console.log(result.text);
            }
        });

        // تشغيل الفلاش
        function toggleFlash() {
            const track = document.getElementById('video').srcObject.getVideoTracks()[0];
            const settings = track.getSettings();
            track.applyConstraints({advanced: [{torch: !settings.torch}]});
        }

        // مود الفاتورة (الكيبورد)
        document.getElementById('batch-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendToPC(e.target.value);
                setTimeout(() => sendToPC('Enter'), 200);
                e.target.value = '';
            }
        });
    </script>
</body>
</html>
