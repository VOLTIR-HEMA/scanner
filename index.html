<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Just Scan Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@zxing/library@latest"></script>
</head>
<body>

    <video id="video" autoplay playsinline></video>
    <div class="scan-region" id="scanner-box">
        <div class="laser"></div>
    </div>

    <div class="controls top-bar">
        <button class="btn" onclick="ui.openSettings()">⚙️</button>
        <button class="btn" id="flash-btn" onclick="scanner.toggleFlash()">⚡</button>
        <button class="btn main-btn" id="btn-plus" onclick="logic.execBtn('plus')">+</button>
        <button class="btn main-btn" id="btn-del" onclick="logic.execBtn('del')">🗑️</button>
        <button class="btn" id="btn-smart-enter" onclick="logic.execSmartEnter()">⏎</button>
    </div>

    <div id="batch-container" class="hidden">
        <input type="text" id="batch-input" placeholder="ادخل البيانات هنا...">
        <button class="close-btn" onclick="ui.toggleBatch(false)">✕</button>
    </div>

    <div class="controls bottom-bar">
        <button class="btn wide-btn" onclick="ui.toggleBatch(true)">📄 مود الفاتورة المجمعة</button>
        <button class="btn" onclick="ui.focusKeyboard()">⌨️</button>
    </div>

    <div id="settings-page" class="overlay hidden">
        <div class="settings-content">
            <h2>إعدادات التحكم</h2>
            <div id="config-list"></div>
            <button class="save-btn" onclick="ui.saveSettings()">حفظ وإغلاق</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
