<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Just Scan - Final Stable</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; background: #000; color: white; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* شريط الأدوات العلوي */
        .top-nav { height: 45px; display: flex; background: #1a1a1a; border-bottom: 1px solid #333; padding: 4px; gap: 4px; flex-shrink: 0; }
        .top-nav button { flex: 1; background: #333; color: white; border: 1px solid #444; border-radius: 6px; font-size: 10px; cursor: pointer; }

        /* منطقة الكاميرا - مصغرة جداً عشان متغطيش */
        .cam-container { height: 250px; width: 100%; background: #000; position: relative; border-bottom: 2px solid #222; overflow: hidden; flex-shrink: 0; display: flex; justify-content: center; }
        #reader { width: 100% !important; max-width: 350px; border: none !important; }

        /* شبكة الأزرار - بتملأ باقي الشاشة */
        .btns-container { flex: 1; overflow-y: auto; padding: 10px; background: #000; }
        #btns-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        .btn-item { padding: 15px 2px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); color: white; font-weight: bold; font-size: 11px; cursor: pointer; text-align: center; }

        .result-bar { height: 35px; background: #111; color: #0f0; display: flex; align-items: center; justify-content: center; font-size: 12px; border-top: 1px solid #333; }

        /* الإعدادات */
        #settings-view { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 2000; padding: 15px; overflow-y: auto; }
        .modal-card { background: #222; padding: 15px; border-radius: 15px; max-width: 400px; margin: auto; }
        .edit-row { display: flex; gap: 4px; margin-bottom: 6px; background: #333; padding: 6px; border-radius: 8px; }
        .edit-row input { background: #000; color: #fff; border: 1px solid #555; padding: 5px; width: 30%; font-size: 11px; }

        @media (orientation: landscape) {
            body { flex-direction: row; }
            .top-nav { width: 70px; height: 100vh; flex-direction: column; border-right: 1px solid #333; }
            .cam-container { height: 100%; width: 40%; border-bottom: none; border-right: 2px solid #222; }
            .btns-container { height: 100%; width: 50%; }
            #btns-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

    <div class="top-nav">
        <button onclick="openSet()">⚙️ ضبط</button>
        <button onclick="toggleFS()">🔲 كامل</button>
        <button id="flBtn" onclick="doFlash()">🔦 فلاش</button>
        <button onclick="location.reload()">🔄 تحديث</button>
    </div>

    <div class="cam-container">
        <div id="reader"></div>
    </div>

    <div class="result-bar" id="res">جاهز...</div>

    <div class="btns-container">
        <div id="btns-grid"></div>
    </div>

    <div id="settings-view">
        <div class="modal-card">
            <h3 style="color:#ffcc00; margin-top:0;">⚙️ الضبط والأزرار</h3>
            <div style="background:#333; padding:10px; border-radius:10px; margin-bottom:10px;">
