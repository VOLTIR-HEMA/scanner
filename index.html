<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>سكانر إبراهيم الذكي</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #000; color: white; margin: 0; padding: 0; }
        
        /* شريط الأدوات العلوي */
        .top-bar { 
            display: flex; justify-content: space-around; align-items: center; 
            background: #1a1a1a; padding: 10px; border-bottom: 1px solid #333;
            position: sticky; top: 0; z-index: 1000;
        }
        .top-bar button { 
            background: #333; color: white; border: 1px solid #555; 
            padding: 8px 12px; border-radius: 8px; font-size: 0.8em; 
        }
        .top-bar button.active { background: #ffcc00; color: #000; border-color: #ffcc00; }

        /* منطقة السكانر */
        #reader-container { position: relative; width: 100%; max-width: 500px; margin: 10px auto; border-radius: 15px; overflow: hidden; border: 2px solid #28a745; }
        
        /* منطقة الزراير المضافة */
        .dynamic-section { 
            padding: 15px; background: #0f0f0f; border-top: 2px dashed #333; margin-top: 10px;
        }
        .dynamic-section h5 { margin: 0 0 10px 0; color: #888; font-size: 0.9em; }
        #dynamic-buttons { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        
        .custom-btn { padding: 12px 18px; border-radius: 10px; border: 1px solid #fff; color: white; font-weight: bold; min-width: 90px; }
        
        .result-box { margin: 15px; padding: 15px; background: #1e1e1e; border-radius: 10px; color: #00ff00; font-size: 1.1em; min-height: 40px; }

        /* مودال الإعدادات */
        #settings-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; overflow-y: auto; }
        .modal-content { background: #222; width: 90%; margin: 20px auto; padding: 20px; border-radius: 15px; text-align: right; }
        .setting-row { background: #333; padding: 15px; margin-bottom: 10px; border-radius: 10px; display: flex; flex-direction: column; gap: 8px; }
        input { padding: 10px; border-radius: 5px; border: none; font-size: 1em; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <button onclick="toggleSettings(true)">⚙️ إعدادات</button>
        <button id="flash-btn" onclick="toggleFlash()">🔦 كشاف</button>
        <button id="billModeBtn" onclick="toggleBillMode()">📑 فاتورة: ❌</button>
    </div>

    <div id="reader-container">
        <div id="reader"></div>
    </div>

    <div id="result" class="result-box">في انتظار الأوامر...</div>

    <div class="dynamic-section">
        <h5>الوصول السريع للأوامر 👇</h5>
        <div id="dynamic-buttons"></div>
    </div>

    <div id="settings-modal">
        <div class="modal-content">
            <h3>⚙️ تخصيص الأزرار</h3>
            <div id="settings-list"></div>
            <button onclick="addNewButtonSetting()" style="background:#007bff; color:white; width:100%; padding:12px; border-radius:10px; margin-top:10px; border:none;">➕ إضافة زر جديد</button>
            <div class="btn-group">
                <button onclick="saveSettings()" style="background:#28a745; color:white; flex:2; padding:15px; border-radius:10px; border:none; font-weight:bold;">💾 حفظ التغييرات</button>
                <button onclick="toggleSettings(false)" style="background:#555; color:white; flex:1; padding:15px; border-radius:10px; border:none;">إلغاء</button>
            </div>
        </div>
    </div>

    <script>
        // نظام تخزين البيانات
        let buttons = JSON.parse(localStorage.getItem('userButtons')) || [
            { name: "إضافة", cmd: "f8", useEnter: true, color: "#007bff" },
            { name: "حفظ", cmd: "f9", useEnter: true, color: "#28a745" }
        ];

        let isBillMode = false;
        let isFlashOn = false;
        let html5QrCode = null;

        // وظيفة رسم الزراير في الواجهة
        function renderButtons() {
            const container = document.getElementById('dynamic-buttons');
            container.innerHTML = '';
            buttons.forEach((btn, index) => {
                const b = document.createElement('button');
                b.className = 'custom-btn';
                b.style.backgroundColor = btn.color || '#444';
                b.innerText = btn.name;
                b.onclick = () => sendCommand(btn.cmd, btn.useEnter);
                container.appendChild(b);
            });
        }

        // إرسال الأمر للكمبيوتر
        async function sendCommand(cmd, useEnter) {
            const res = document.getElementById('result');
            res.innerText = `🚀 إرسال: ${cmd}...`;
            try {
                await fetch('https://ntfy.sh/ibrahim_pharmacy_2026', { method: 'POST', body: cmd });
                if (useEnter) {
                    await new Promise(r => setTimeout(r, 1000));
                    res.innerText = "⏎ إرسال: Enter...";
                    await fetch('https://ntfy.sh/ibrahim_pharmacy_2026', { method: 'POST', body: 'enter' });
                }
                res.innerText = "✅ تم التنفيذ بنجاح";
            } catch (e) { res.innerText = "❌ خطأ في الاتصال"; }
        }

        // تبديل وضع الفاتورة
        function toggleBillMode() {
            isBillMode = !isBillMode;
            const btn = document.getElementById('billModeBtn');
            btn.innerText = isBillMode ? "📑 فاتورة: ✅" : "📑 فاتورة: ❌";
            btn.classList.toggle('active', isBillMode);
        }

        // تشغيل/إطفاء الكشاف (النسخة المحسنة)
        async function toggleFlash() {
            try {
                const video = document.querySelector('video');
                if (!video) return;
                const track = video.srcObject.getVideoTracks()[0];
                const capabilities = track.getCapabilities();
                if (!capabilities.torch) {
                    alert("الكشاف غير مدعوم على هذا الجهاز");
                    return;
                }
                isFlashOn = !isFlashOn;
                await track.applyConstraints({ advanced: [{ torch: isFlashOn }] });
                document.getElementById('flash-btn').innerText = isFlashOn ? "❌ إطفاء" : "🔦 كشاف";
            } catch (e) { console.error(e); }
        }

        // إعدادات المودال
        function toggleSettings(show) {
            document.getElementById('settings-modal').style.display = show ? 'block' : 'none';
            if (show) renderSettingsList();
        }

        function renderSettingsList() {
            const list = document.getElementById('settings-list');
            list.innerHTML = '';
            buttons.forEach((btn, index) => {
                list.innerHTML += `
                    <div class="setting-row">
                        <input type="text" placeholder="اسم الزر" value="${btn.name}" oninput="updateBtn(${index}, 'name', this.value)">
                        <input type="text" placeholder="الأمر (مثلاً: f8)" value="${btn.cmd}" oninput="updateBtn(${index}, 'cmd', this.value)">
                        <label style="font-size:0.8em;"><input type="checkbox" ${btn.useEnter ? 'checked' : ''} onchange="updateBtn(${index}, 'useEnter', this.checked)"> ضغط Enter بعده؟</label>
                        <button onclick="removeBtn(${index})" style="background:#ff4444; color:white; border:none; padding:5px; border-radius:5px;">حذف الزر</button>
                    </div>
                `;
            });
        }

        function updateBtn(index, key, value) { buttons[index][key] = value; }
        function addNewButtonSetting() { buttons.push({ name: "جديد", cmd: "f1", useEnter: false, color: "#444" }); renderSettingsList(); }
        function removeBtn(index) { buttons.splice(index, 1); renderSettingsList(); }
        
        function saveSettings() {
            localStorage.setItem('userButtons', JSON.stringify(buttons));
            renderButtons();
            toggleSettings(false);
        }

        // بدء السكانر
        function startScanner() {
            const scanner = new Html5QrcodeScanner("reader", { fps: 15, qrbox: {width: 250, height: 150} });
            scanner.render((text) => {
                document.getElementById('result').innerText = "✅ مسح: " + text;
                fetch('https://ntfy.sh/ibrahim_pharmacy_2026', { method: 'POST', body: text });
            });
        }

        window.onload = () => {
            startScanner();
            renderButtons();
        };
    </script>
</body>
</html>
