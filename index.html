<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Just Scan - Ibrahim Edition</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #000; color: white; margin: 0; padding: 0; overflow-x: hidden; }
        .top-bar { display: flex; justify-content: space-around; align-items: center; padding: 8px; background: #1a1a1a; border-bottom: 1px solid #333; flex-wrap: wrap; gap: 5px; }
        .top-bar button { background: #333; color: white; border: 1px solid #555; padding: 6px 10px; border-radius: 6px; font-size: 0.75em; cursor: pointer; }
        #reader { width: 100% !important; max-width: 500px; margin: 5px auto; border: none !important; min-height: 250px; background: #000; }
        #reader button { background: #444 !important; color: white !important; padding: 8px !important; border-radius: 5px !important; margin: 5px !important; border: 1px solid #666 !important; }
        #reader select { background: #222 !important; color: white !important; padding: 5px !important; border-radius: 5px !important; }
        .result-box { margin: 5px 10px; padding: 8px; background: #111; border-radius: 8px; color: #00ff00; font-size: 0.85em; border: 1px solid #222; min-height: 20px; }
        #dynamic-buttons { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; padding: 8px; }
        .custom-btn { padding: 12px 2px; border-radius: 6px; border: 1px solid #444; color: white; font-weight: bold; font-size: 0.75em; text-align: center; cursor: pointer; }
        #settings-modal, #keyboard-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; overflow-y: auto; }
        .modal-content { background: #222; width: 85%; margin: 20px auto; padding: 15px; border-radius: 15px; text-align: left; border: 1px solid #444; }
        .setting-row { background: #333; padding: 10px; margin-bottom: 10px; border-radius: 8px; display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
    
    </style>
</head>
<body>

<div id="auth-overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 3000; display: none; justify-content: center; align-items: center; flex-direction: column; text-align: center;">
    <h2 style="color: #00ffcc;">VoltIR 🛡️</h2>
    <p>يرجى تسجيل الدخول من الإعدادات</p>
    <button onclick="document.getElementById('auth-overlay').style.display='none'; toggleSettings(true);" style="padding: 15px 30px; background: #ffcc00; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; color: black;">فتح الإعدادات ⚙️</button>
</div>

    <div class="top-bar">
        
        <button onclick="toggleSettings(true)">⚙️</button>
        <button id="flash-btn" onclick="toggleFlash()">🔦</button>
        <button id="full-screen-btn" onclick="toggleFullScreen()">📺 Full</button>
        <button onclick="openKeyboardModal()">⌨️ Keyboard</button>
        <button id="billModeBtn" onclick="toggleBillMode()">📑 Bill: OFF</button>
    </div>
    <button onclick="toggleBillPanel()" style="width: 95%; margin: 10px auto; display: block; padding: 12px; background: #ff4500; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">
    📑 إدارة الفواتير المحفوظة (10 Slots)
</button>

<div id="bill-panel" style="display: none; background: #111; padding: 10px; border: 1px solid #444; margin: 0 10px 10px 10px; border-radius: 10px;">
    <div id="slots-container">
        </div>
</div>

    <div id="reader"></div>
    <div id="result" class="result-box">جاري تشغيل الكاميرا...</div>
    <div id="dynamic-buttons"></div>

    <div id="settings-modal">
        <div class="modal-content">
            <h3 style="color: #ffcc00; margin-bottom: 15px;">⚙️ الإعدادات</h3>
            
            <div id="auth-section" style="background:#111; padding:15px; border-radius:10px; border:1px solid #444; margin-bottom:20px;">
                <div id="logged-in-view" style="display:none;">
                    <p style="color:#00ffcc; font-size:0.9em; margin-bottom:10px;">✅ مسجل دخول برقم: <span id="user-display"></span></p>
                    <button onclick="userLogout()" style="width:100%; padding:10px; background:#800; color:white; border:none; border-radius:6px; font-weight:bold; cursor:pointer;">تسجيل خروج 🚪</button>
                </div>
                
                <div id="logged-out-view">
                    <input type="tel" id="u-phone" placeholder="رقم الموبايل" style="width:100%; padding:10px; margin-bottom:8px; background:#000; color:#0f0; border:1px solid #333; border-radius:5px; box-sizing:border-box;">
                    <input type="password" id="u-pass" placeholder="كلمة المرور" style="width:100%; padding:10px; margin-bottom:10px; background:#000; color:#0f0; border:1px solid #333; border-radius:5px; box-sizing:border-box;">
                    <div style="display:flex; gap:5px;">
                        <button onclick="handleAuth('login')" style="flex:1; padding:10px; background:#333; color:white; border:none; border-radius:6px; font-weight:bold; cursor:pointer;">دخول</button>
                        <button onclick="handleAuth('register')" style="flex:1; padding:10px; background:#007bff; color:white; border:none; border-radius:6px; font-weight:bold; cursor:pointer;">تسجيل</button>
                    </div>
                </div>
            </div>

            <div id="settings-list"></div>
            <button onclick="addNewButtonSetting()" style="width:100%; padding:10px; background:#444; color:white; border:none; border-radius:8px; margin-top:10px; cursor:pointer;">➕ إضافة زر جديد</button>
            <button onclick="saveSettings()" style="width:100%; padding:15px; background:#28a745; color:white; border:none; border-radius:10px; margin-top:15px; font-weight:bold; cursor:pointer;">حفظ وإغلاق</button>
        </div>
    </div>

    <div id="keyboard-modal">
        <div class="modal-content" style="text-align: center; margin-top: 50px;">
            <h4 style="color: #ff0000;">إدخال مستمر</h4>
            <input type="text" id="manual-input" style="width: 80%; padding: 15px; background: #000; color: #00ff00; border: 1px solid #444; border-radius: 8px; font-size: 1.2em;" onkeypress="if(event.key==='Enter') submitManualInput()">
            <br><br>
            <div style="display: flex; gap: 5px; justify-content: center;">
                <button onclick="submitManualInput()" style="flex: 1; padding: 10px; background: #28a745; color: white; border: none; border-radius: 8px;">إرسال</button>
                <button onclick="sendManualEnter()" style="flex: 1; padding: 10px; background: #007bff; color: white; border: none; border-radius: 8px;">Enter ⏎</button>
                <button onclick="closeKeyboardModal()" style="flex: 1; padding: 10px; background: #444; color: white; border: none; border-radius: 8px;">إغلاق</button>
            </div>
        </div>
    </div>

    <script>
        let NTFY_URL = '';
        const SERVER_URL = 'https://round-resonance-b6f1.voltir-f.workers.dev';
        let isBillMode = false, billItems = [], lastScanTime = 0, isFlashOn = false;
        let activeSlot = null; // ده عشان نعرف أي خانة بنسجل فيها حالياً
let slotsData = JSON.parse(localStorage.getItem('v_slots')) || Array(10).fill().map(() => []); // ده مخزن الـ 10 خانات
        let currentUser = localStorage.getItem('v_phone');

        let buttons = JSON.parse(localStorage.getItem('userButtons')) || [
            { name: "Add", cmd: "f8", useEnter: true, color: "#007bff" },
            { name: "Save", cmd: "f9", useEnter: true, color: "#28a745" }
        ];

        // --- وظائف الحسابات النظيفة ---
        function updateAuthUI() {
    const phone = localStorage.getItem('v_phone');
    if(phone) {
        // السطر الجديد ده هو اللي بيظبط الرابط بناءً على رقمك
        NTFY_URL = `https://ntfy.sh/voltir_${phone}`; 
        
        document.getElementById('logged-in-view').style.display = 'block';
        document.getElementById('logged-out-view').style.display = 'none';
        document.getElementById('user-display').innerText = phone;
    } else {
        document.getElementById('logged-in-view').style.display = 'none';
        document.getElementById('logged-out-view').style.display = 'block';
    }
}
       async function handleAuth(action) {
            const phone = document.getElementById('u-phone').value;
            const pass = document.getElementById('u-pass').value;
            if(!phone || !pass) return alert("اكمل البيانات");
            
            try {
                const res = await fetch(SERVER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action, phone, password: pass })
                });

                const result = await res.json();

                if(res.ok) {
                    localStorage.setItem('v_phone', phone);
                    location.reload();
                } else {
                    alert(result.error || "بيانات الدخول غير صحيحة");
                }
            } catch(e) { 
                alert("تعذر الاتصال بالسيرفر"); 
            }
        }

        function userLogout() {
            if(confirm("هل تريد تسجيل الخروج؟")) {
                localStorage.removeItem('v_phone');
                location.reload();
            }
        }

        // --- وظيفة الإرسال ---
       function masterSend(text) {
    // 1. نجيب الرقم اللي المستخدم دخل بيه
    const phone = localStorage.getItem('v_phone');

    if (phone) {
        // 2. نجهز الرابط الخاص برقمك عشان الجسر يشوفه
        const dynamicNtfy = `https://ntfy.sh/voltir_${phone}`;

        // 3. نبعت للجسر (البايثون)
        fetch(dynamicNtfy, { method: 'POST', body: text });

        // 4. نبعت للسيرفر بتاعنا (Cloudflare Worker) للتخزين
        fetch(SERVER_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'scan', phone: phone, code: text })
        });
    } else {
        alert("برجاء تسجيل الدخول أولاً لربط السكانر بالكمبيوتر");
    }
}
       function onScanSuccess(text) {
    if (Date.now() - lastScanTime < 1500) return; 
    lastScanTime = Date.now();

    // نظام الـ 10 خانات الجديد
    if (activeSlot !== null) {
        if (slotsData[activeSlot].length < 15) {
            slotsData[activeSlot].push(text);
            localStorage.setItem('v_slots', JSON.stringify(slotsData));
            renderSlots(); // عشان يحدث الأرقام فوراً
            document.getElementById('result').innerText = `تم الحفظ في خانة ${activeSlot + 1}: ${text}`;
        } else {
            alert("الخانة دي اتملت خلاص (15 صنف)!");
            activeSlot = null;
            renderSlots();
        }
    } else {
        // لو مفيش خانة تسجيل شغالة، يبعت مباشر زي زمان
        masterSend(text + '_ent');
        document.getElementById('result').innerText = "إرسال مباشر: " + text;
    }
}

        function renderButtons() {
            const container = document.getElementById('dynamic-buttons'); container.innerHTML = '';
            buttons.forEach((btn) => {
                const b = document.createElement('button'); b.className = 'custom-btn'; b.style.backgroundColor = btn.color || '#444';
                b.innerText = btn.name; b.onclick = () => sendCommand(btn.cmd, btn.useEnter); container.appendChild(b);
            });
        }

        function sendCommand(cmd, useEnter) {
            masterSend(cmd);
            if (useEnter) setTimeout(() => masterSend('enter'), 400);
        }

        function toggleSettings(show) { 
            document.getElementById('settings-modal').style.display = show ? 'block' : 'none'; 
            if(show) { renderSettingsList(); updateAuthUI(); } 
        }

        function renderSettingsList() {
            const list = document.getElementById('settings-list'); list.innerHTML = '';
            buttons.forEach((btn, index) => {
                const div = document.createElement('div'); div.className = 'setting-row';
                div.innerHTML = `<input type="text" value="${btn.name}" oninput="buttons[${index}].name=this.value" style="width:25%">
                    <input type="text" value="${btn.cmd}" oninput="buttons[${index}].cmd=this.value" style="width:25%">
                    <label style="font-size:12px">Enter: <input type="checkbox" ${btn.useEnter ? 'checked' : ''} onchange="buttons[${index}].useEnter=this.checked"></label>
                    <button onclick="buttons.splice(${index},1);renderSettingsList()" style="background:red; color:white; border:none; border-radius:4px; padding:5px;">حذف</button>`;
                list.appendChild(div);
            });
        }

        function addNewButtonSetting() { buttons.push({name:"جديد", cmd:"f1", useEnter: true}); renderSettingsList(); }
        function saveSettings() { localStorage.setItem('userButtons', JSON.stringify(buttons)); renderButtons(); toggleSettings(false); }

        window.onload = () => {
            renderSlots();
            if (!localStorage.getItem('v_phone')) {
                document.getElementById('auth-overlay').style.display = 'flex';
                renderButtons();
                return;
            }
            const scanner = new Html5QrcodeScanner("reader", { 
                fps: 25, qrbox: { width: 250, height: 150 }, aspectRatio: 1.0,
                showTorchButtonIfSupported: true, showZoomSliderIfSupported: true, defaultZoomValueIfSupported: 2
            });
            scanner.render(onScanSuccess);
            renderButtons();
        };

        function openKeyboardModal() { document.getElementById('keyboard-modal').style.display = 'block'; document.getElementById('manual-input').focus(); }
        function closeKeyboardModal() { document.getElementById('keyboard-modal').style.display = 'none'; }
        function submitManualInput() {
            const input = document.getElementById('manual-input');
            if (input.value.trim() !== "") { masterSend(input.value.trim()); input.value = ''; input.focus(); }
        }
        function sendManualEnter() { masterSend('enter'); document.getElementById('manual-input').focus(); }
        function toggleFullScreen() { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }
        async function toggleFlash() {
            try {
                const track = document.querySelector('video').srcObject.getVideoTracks()[0];
                isFlashOn = !isFlashOn;
                await track.applyConstraints({ advanced: [{ torch: isFlashOn }] });
            } catch (e) { alert("الفلاش غير مدعوم"); }
        }
        function toggleBillMode() {
            isBillMode = !isBillMode;
            const btn = document.getElementById('billModeBtn');
            btn.style.background = isBillMode ? "#ff0000" : "#333";
            btn.innerText = isBillMode ? "📑 Bill: ON" : "📑 Bill: OFF";
            if (!isBillMode) sendBillItems();
        }
        async function sendBillItems() {
            if (billItems.length === 0) return;
            for (let item of billItems) { masterSend(item + '_ent'); await new Promise(r => setTimeout(r, 1000)); }
            billItems = [];
        }
        // 1. دالة فتح وإغلاق لوحة الفواتير
function toggleBillPanel() {
    const panel = document.getElementById('bill-panel');
    if(!panel) return;
    panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
    if(panel.style.display === 'block') renderSlots();
}

// 2. دالة رسم الـ 10 خانات بالزراير بتاعتهم
function renderSlots() {
    const container = document.getElementById('slots-container');
    if(!container) return;
    container.innerHTML = '';
    
    slotsData.forEach((items, index) => {
        const div = document.createElement('div');
        div.style = "background:#222; border:1px solid #333; padding:10px; border-radius:8px; margin-bottom:8px; display:flex; flex-direction:column; gap:8px;";
        div.innerHTML = `
            <div style="display:flex; justify-content:space-between; color:#00ffcc; font-size:12px;">
                <span>📦 فاتورة رقم ${index + 1}</span>
                <span>المحتوى: (${items.length}/15)</span>
            </div>
            <div style="display:flex; gap:5px;">
                <button onclick="activeSlot=(activeSlot===${index}?null:${index}); renderSlots();" 
                        style="flex:1; padding:10px; border:none; border-radius:5px; color:white; font-weight:bold; background:${activeSlot===index?'#ff0000':'#444'}">
                    ${activeSlot===index?'🔴 يسجل الآن':'🎤 ابدأ تسجيل'}
                </button>
                <button onclick="sendSlot(${index})" style="flex:1; padding:10px; border:none; border-radius:5px; background:#28a745; color:white; font-weight:bold;">📤 إرسال</button>
                <button onclick="clearSlot(${index})" style="flex:0.4; padding:10px; border:none; border-radius:5px; background:#800; color:white;">🗑️</button>
            </div>
        `;
        container.appendChild(div);
    });
}

// 3. دالة إرسال الفاتورة للكمبيوتر (واحد ورا التاني بفاصل ثانية)
async function sendSlot(index) {
    const items = slotsData[index];
    if (items.length === 0) return alert("الخانة دي فاضية يا إبراهيم!");
    
    if(confirm(`هل تريد إرسال ${items.length} صنف للكمبيوتر؟`)) {
        for (let item of items) {
            masterSend(item + '_ent');
            document.getElementById('result').innerText = `جاري إرسال: ${item}`;
            await new Promise(r => setTimeout(r, 1000)); 
        }
        alert("✅ الفاتورة وصلت الكمبيوتر بنجاح");
    }
}

// 4. دالة مسح الفاتورة
function clearSlot(index) {
    if(confirm("متأكد إنك عاوز تمسح الفاتورة دي؟")) {
        slotsData[index] = [];
        localStorage.setItem('v_slots', JSON.stringify(slotsData));
        if(activeSlot === index) activeSlot = null;
        renderSlots();
    }
}
    </script>
</body>
</html>
