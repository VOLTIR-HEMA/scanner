<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Just Scan Pro - Custom Audio & Haptic</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #000; color: white; margin: 0; padding: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        .app-wrapper { display: flex; flex-direction: column; height: 100vh; width: 100vw; overflow: hidden; }

        /* شريط الأدوات */
        .top-bar { display: flex; justify-content: space-around; padding: 5px; background: #1a1a1a; border-bottom: 1px solid #333; z-index: 10; flex-shrink: 0; gap: 2px; }
        .top-bar button { background: #333; color: white; border: 1px solid #555; padding: 8px 2px; border-radius: 6px; font-size: 0.65em; flex: 1; }
        .top-bar button.active { background: #ffcc00; color: #000; font-weight: bold; }

        /* منطقة المحتوى */
        .main-content { flex: 1; display: flex; flex-direction: column; position: relative; overflow: hidden; }
        
        /* ضبط الكاميرا لتملأ المساحة المتاحة فقط */
        #reader { width: 100% !important; flex: 1; background: #000; border: none !important; }
        #reader video { object-fit: cover !important; }

        #dynamic-buttons { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; padding: 8px; background: #000; flex-shrink: 0; }
        .custom-btn { padding: 12px 2px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.2); color: white; font-weight: bold; font-size: 0.7em; }

        .result-box { margin: 5px auto; width: 95%; padding: 8px; background: rgba(20,20,20,0.9); border-radius: 8px; color: #00ff00; border: 1px solid #333; font-size: 0.8em; z-index: 5; }

        @media (orientation: landscape) {
            .app-wrapper { flex-direction: row; }
            .top-bar { flex-direction: column; width: 70px; height: 100%; border-left: 1px solid #333; order: 3; padding: 5px; }
            #dynamic-buttons { grid-template-columns: 1fr; width: 80px; height: 100%; order: 1; overflow-y: auto; padding: 5px; }
            .main-content { order: 2; flex: 1; }
            .custom-btn { height: 55px; }
        }

        /* Modal الإعدادات المطور */
        #settings-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; overflow-y: auto; }
        .modal-content { background: #222; width: 90%; max-width: 400px; margin: 10px auto; padding: 15px; border-radius: 15px; text-align: left; font-size: 0.9em; }
        .setting-group { background: #333; padding: 12px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #444; }
        .setting-group label { display: block; margin-bottom: 8px; color: #ffcc00; font-weight: bold; }
        input[type="range"] { width: 100%; margin: 10px 0; }
        .chk-row { display: flex; align-items: center; gap: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-wrapper">
    <div class="top-bar">
        <button onclick="toggleSettings(true)">⚙️ Sett</button>
        <button onclick="toggleFullscreen()">🔲 Full</button>
        <button id="kb-btn" onclick="toggleManualInput()">⌨️ Key</button>
        <button id="flash-btn" onclick="toggleFlash()">🔦 Flash</button>
        <button id="billModeBtn" onclick="toggleBillMode()">📑 Bill</button>
    </div>

    <div class="main-content">
        <div id="reader"></div>
        <div id="result" class="result-box">Ready...</div>
        <div id="dynamic-buttons"></div>
    </div>
</div>

<div id="settings-modal">
    <div class="modal-content">
        <h3 style="text-align:center; color:#ffcc00;">⚙️ System Settings</h3>
        
        <div class="setting-group">
            <label>🔊 Audio Volume</label>
            <input type="range" id="vol-range" min="0" max="1" step="0.1" value="0.5">
            <label>🎼 Pitch (Frequency)</label>
            <input type="range" id="pitch-range" min="400" max="2000" step="100" value="800">
        </div>

        <div class="setting-group">
            <label class="chk-row">
                <input type="checkbox" id="vibrate-chk" checked> 📱 Enable Vibration
            </label>
        </div>

        <div class="setting-group">
            <label>🔘 Button Shortcuts</label>
            <div id="settings-list"></div>
            <button onclick="addNewButtonSetting()" style="width:100%; padding:8px; margin-top:5px;">➕ Add Button</button>
        </div>

        <div style="display:flex; gap:10px;">
            <button onclick="saveSettings()" style="flex:2; padding:12px; background:#28a745; color:white; border:none; border-radius:8px; font-weight:bold;">SAVE</button>
            <button onclick="toggleSettings(false)" style="flex:1; padding:12px; background:#555; color:white; border:none; border-radius:8px;">CLOSE</button>
        </div>
    </div>
</div>

<script>
    // الحفاظ على الإعدادات
    let config = JSON.parse(localStorage.getItem('appConfig')) || {
        vol: 0.5,
        pitch: 800,
        vibrate: true
    };

    let buttons = JSON.parse(localStorage.getItem('userButtons')) || [
        { name: "جديد", cmd: "f8", useEnter: true, color: "#007bff" },
        { name: "حفظ", cmd: "f9", useEnter: true, color: "#28a745" },
        { name: "Enter", cmd: "enter", useEnter: false, color: "#444" }
    ];

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playBeep() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.type = 'sine'; // Sine أهدى على السماعة من الـ Square
        osc.frequency.setValueAtTime(config.pitch, audioCtx.currentTime);
        gain.gain.setValueAtTime(config.vol, audioCtx.currentTime);
        
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);

        // الهزاز
        if (config.vibrate && navigator.vibrate) {
            navigator.vibrate(50); 
        }
    }

    function onScanSuccess(text) {
        if (Date.now() - lastScanTime < 2500) return;
        lastScanTime = Date.now();
        playBeep();
        
        // إرسال البيانات (نفس الكود السابق لـ ntfy)
        document.getElementById('result').innerText = "Sent: " + text;
        fetch('https://ntfy.sh/ibrahim_pharmacy_2026', { method: 'POST', body: text + '_ent' });
    }

    // إدارة الإعدادات
    function saveSettings() {
        config.vol = parseFloat(document.getElementById('vol-range').value);
        config.pitch = parseInt(document.getElementById('pitch-range').value);
        config.vibrate = document.getElementById('vibrate-chk').checked;
        
        localStorage.setItem('appConfig', JSON.stringify(config));
        localStorage.setItem('userButtons', JSON.stringify(buttons));
        renderButtons();
        toggleSettings(false);
    }

    function toggleSettings(show) {
        document.getElementById('settings-modal').style.display = show ? 'block' : 'none';
        if (show) {
            document.getElementById('vol-range').value = config.vol;
            document.getElementById('pitch-range').value = config.pitch;
            document.getElementById('vibrate-chk').checked = config.vibrate;
            renderSettingsList();
        }
    }

    // باقي دوال الأزرار والكاميرا (نفس المنطق القوي السابق)
    let lastScanTime = 0;
    function renderButtons() {
        const container = document.getElementById('dynamic-buttons');
        container.innerHTML = '';
        buttons.forEach(btn => {
            const b = document.createElement('button');
            b.className = 'custom-btn';
            b.style.backgroundColor = btn.color;
            b.innerText = btn.name;
            b.onclick = () => sendCommand(btn.cmd, btn.useEnter);
            container.appendChild(b);
        });
    }

    async function sendCommand(cmd, useEnter) {
        fetch('https://ntfy.sh/ibrahim_pharmacy_2026', { method: 'POST', body: cmd });
        if (useEnter) {
            await new Promise(r => setTimeout(r, 500));
            fetch('https://ntfy.sh/ibrahim_pharmacy_2026', { method: 'POST', body: 'enter' });
        }
    }

    window.onload = () => {
        const scanner = new Html5QrcodeScanner("reader", { 
            fps: 25, 
            qrbox: (viewWidth, viewHeight) => {
                // يخلي مربع السكان الصغير دايماً مناسب مهما تغير حجم الشاشة
                let size = Math.min(viewWidth, viewHeight) * 0.7;
                return { width: size, height: size * 0.6 };
            },
            rememberLastUsedCamera: true
        });
        scanner.render(onScanSuccess);
        renderButtons();
    };

    // دوال إضافية للشاشة والفلاش
    function toggleFullscreen() { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }
    function toggleManualInput() { /* نفس كود الـ Key السابق */ }
    async function toggleFlash() { /* نفس كود الـ Flash السابق */ }
</script>
</body>
</html>
