<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ibrahim Pro Scanner - 5 Buttons</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #000; color: white; margin: 0; padding: 0; overflow-x: hidden; }
        .top-bar { display: flex; justify-content: space-around; align-items: center; padding: 8px; background: #1a1a1a; border-bottom: 1px solid #333; }
        .top-bar button { background: #333; color: white; border: 1px solid #555; padding: 6px 10px; border-radius: 6px; font-size: 0.75em; }
        .top-bar button.active { background: #ffcc00; color: #000; font-weight: bold; }
        
        #reader { width: 100% !important; max-width: 500px; margin: 5px auto; border: none !important; min-height: 250px; background: #000; }
        
        .result-box { margin: 5px 10px; padding: 8px; background: #111; border-radius: 8px; color: #00ff00; font-size: 0.85em; border: 1px solid #222; }
        
        /* تنسيق الـ 5 زراير في الصف */
        #dynamic-buttons { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 5px; 
            padding: 8px; 
        }
        .custom-btn { 
            padding: 10px 2px; 
            border-radius: 6px; 
            border: 1px solid #fff; 
            color: white; 
            font-weight: bold; 
            font-size: 0.7em; 
            text-align: center;
            min-width: 0; /* يسمح للزرار بالانكماش */
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .send-all-btn { background: #28a745; color: white; padding: 12px; width: 90%; margin: 10px auto; border-radius: 10px; display: none; font-weight: bold; border: none; }
        
        #settings-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; overflow-y: auto; }
        .modal-content { background: #222; width: 85%; margin: 20px auto; padding: 15px; border-radius: 15px; text-align: left; }
        .setting-row { background: #333; padding: 8px; margin-bottom: 8px; border-radius: 8px; display: flex; flex-direction: column; }
        input { padding: 8px; border-radius: 5px; border: none; margin-bottom: 5px; font-size: 0.9em; }
    </style>
</head>
<body>

    <div class="top-bar">
        <button onclick="toggleSettings(true)">⚙️ Settings</button>
        <button id="flash-btn" onclick="toggleFlash()">🔦 Flash</button>
        <button id="billModeBtn" onclick="toggleBillMode()">📑 Bill: OFF</button>
    </div>

    <div id="reader"></div>
    <div id="result" class="result-box">Ready...</div>
    <button id="sendAllBtn" class="send-all-btn" onclick="sendFullBill()">📤 Send Bill (<span id="count">0</span>)</button>
    
    <div id="dynamic-buttons"></div>

    <div id="settings-modal">
        <div class="modal-content">
            <h3 style="margin-top:0;">⚙️ Buttons Config</h3>
            <div id="settings-list"></div>
            <button onclick="addNewButtonSetting()" style="background:#444; color:white; width:100%; padding:10px; border-radius:8px; margin-top:5px; border: 1px dashed #777;">➕ Add New</button>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button onclick="saveSettings()" style="background:#28a745; color:white; flex:2; padding:15px; border-radius:10px; border:none; font-weight:bold;">Save</button>
                <button onclick="toggleSettings(false)" style="background:#555; color:white; flex:1; padding:15px; border-radius:10px; border:none;">Close</button>
            </div>
        </div>
    </div>

    <script>
        let buttons = JSON.parse(localStorage.getItem('userButtons')) || [
            { name: "Add", cmd: "f8", useEnter: true, color: "#007bff" },
            { name: "Save", cmd: "f9", useEnter: true, color: "#28a745" },
            { name: "F1", cmd: "f1", useEnter: false, color: "#555" },
            { name: "F2", cmd: "f2", useEnter: false, color: "#555" },
            { name: "Tab", cmd: "tab", useEnter: false, color: "#666" }
        ];

        let isBillMode = false, billItems = [], lastScanTime = 0, isFlashOn = false;

        function renderButtons() {
            const container = document.getElementById('dynamic-buttons');
            container.innerHTML = '';
            buttons.forEach((btn, index) => {
                const b = document.createElement('button');
                b.className = 'custom-btn';
                b.style.backgroundColor = btn.color || '#444';
                b.innerText = btn.name;
                b.onclick = () => sendCommand(btn.cmd, btn.useEnter);
                container.appendChild(b);
            });
        }

        async function sendCommand(cmd, useEnter) {
            document.getElementById('result').innerText = `Sent: ${cmd}`;
            await fetch('https://ntfy.sh/ibrahim_pharmacy_2026', { method: 'POST', body: cmd });
            if (useEnter) {
                await new Promise(r => setTimeout(r, 600));
                await fetch('https://ntfy.sh/ibrahim_pharmacy_2026', { method: 'POST', body: 'enter' });
            }
        }

        function onScanSuccess(text) {
            if (Date.now() - lastScanTime < 2500) return;
            lastScanTime = Date.now();
            if (isBillMode) {
                billItems.push(text);
                document.getElementById('count').innerText = billItems.length;
                document.getElementById('result').innerText = "Stored: " + text;
            } else {
                document.getElementById('result').innerText = "Sent: " + text;
                fetch('https://ntfy.sh/ibrahim_pharmacy_2026', { method: 'POST', body: text + '_ent' });
            }
        }

        function toggleBillMode() {
            isBillMode = !isBillMode;
            const btn = document.getElementById('billModeBtn'), sendBtn = document.getElementById('sendAllBtn');
            btn.innerText = isBillMode ? "📑 Bill: ON" : "📑 Bill: OFF";
            btn.classList.toggle('active', isBillMode);
            if (isBillMode) { billItems = []; document.getElementById('count').innerText = "0"; sendBtn.style.display = 'none'; }
            else if (billItems.length > 0) { sendBtn.style.display = 'block'; }
        }

        async function sendFullBill() {
            const btn = document.getElementById('sendAllBtn');
            btn.disabled = true;
            for (let i = 0; i < billItems.length; i++) {
                document.getElementById('result').innerText = `Sending ${i+1}/${billItems.length}`;
                await fetch('https://ntfy.sh/ibrahim_pharmacy_2026', { method: 'POST', body: billItems[i] + '_ent' });
                await new Promise(r => setTimeout(r, 1200));
            }
            btn.style.display = 'none'; btn.disabled = false;
            document.getElementById('result').innerText = "Bill Sent!";
            billItems = [];
        }

        async function toggleFlash() {
            try {
                const video = document.querySelector('video');
                const track = video.srcObject.getVideoTracks()[0];
                isFlashOn = !isFlashOn;
                await track.applyConstraints({ advanced: [{ torch: isFlashOn }] });
                document.getElementById('flash-btn').innerText = isFlashOn ? "❌ Off" : "🔦 Flash";
            } catch (e) { alert("Start Camera First!"); }
        }

        function toggleSettings(show) { document.getElementById('settings-modal').style.display = show ? 'block' : 'none'; if(show) renderSettingsList(); }
        function renderSettingsList() {
            const list = document.getElementById('settings-list');
            list.innerHTML = '';
            buttons.forEach((btn, index) => {
                list.innerHTML += `<div class="setting-row">
                    <input type="text" value="${btn.name}" oninput="updateBtn(${index}, 'name', this.value)">
                    <input type="text" value="${btn.cmd}" oninput="updateBtn(${index}, 'cmd', this.value)">
                    <label style="font-size:0.75em;"><input type="checkbox" ${btn.useEnter ? 'checked' : ''} onchange="updateBtn(${index}, 'useEnter', this.checked)"> + Enter?</label>
                    <button onclick="removeBtn(${index})" style="background:red; color:white; border:none; padding:4px; border-radius:5px; margin-top:3px; font-size:0.8em;">Remove</button>
                </div>`;
            });
        }
        function updateBtn(i, k, v) { buttons[i][k] = v; }
        function addNewButtonSetting() { buttons.push({ name: "New", cmd: "f1", useEnter: false }); renderSettingsList(); }
        function removeBtn(i) { buttons.splice(i, 1); renderSettingsList(); }
        function saveSettings() { localStorage.setItem('userButtons', JSON.stringify(buttons)); renderButtons(); toggleSettings(false); }

        window.onload = () => {
            const scanner = new Html5QrcodeScanner("reader", { 
                fps: 30, 
                qrbox: { width: 280, height: 200 },
                videoConstraints: { facingMode: "environment" }
            });
            scanner.render(onScanSuccess);
            renderButtons();
        };
    </script>
</body>
</html>
