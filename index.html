<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ibrahim Scanner Stable</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #000; color: white; margin: 0; padding: 0; }
        .top-bar { display: flex; justify-content: space-around; padding: 10px; background: #1a1a1a; border-bottom: 1px solid #333; }
        .top-bar button { background: #444; color: white; border: 1px solid #666; padding: 8px 12px; border-radius: 8px; }
        .top-bar button.active { background: #ffcc00; color: #000; }
        
        /* الكاميرا بحجمها الطبيعي المستقر */
        #reader { width: 100%; max-width: 500px; margin: 10px auto; border: 2px solid #28a745 !important; border-radius: 15px; overflow: hidden; }
        
        .result-box { margin: 10px; padding: 15px; background: #1e1e1e; border-radius: 10px; color: #00ff00; font-size: 1.1em; }
        #dynamic-buttons { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; padding: 10px; }
        .custom-btn { padding: 15px 20px; border-radius: 10px; border: 1px solid #fff; color: white; font-weight: bold; min-width: 100px; }
        .send-all-btn { background: #28a745; color: white; padding: 15px; width: 90%; margin: 10px auto; border-radius: 10px; display: none; font-weight: bold; border: none; }

        #settings-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; overflow-y: auto; }
        .modal-content { background: #222; width: 90%; margin: 20px auto; padding: 20px; border-radius: 15px; text-align: left; }
        .setting-row { background: #333; padding: 15px; margin-bottom: 10px; border-radius: 10px; display: flex; flex-direction: column; gap: 10px; }
        input { padding: 10px; border-radius: 5px; border: none; font-size: 1em; }
    </style>
</head>
<body>

    <div class="top-bar">
        <button onclick="toggleSettings(true)">⚙️ Settings</button>
        <button id="flash-btn" onclick="toggleFlash()">🔦 Flash</button>
        <button id="billModeBtn" onclick="toggleBillMode()">📑 Bill: OFF</button>
    </div>

    <div id="reader"></div>

    <div id="result" class="result-box">Ready...</div>
    
    <button id="sendAllBtn" class="send-all-btn" onclick="sendFullBill()">📤 Send Full Bill (<span id="count">0</span>)</button>

    <div id="dynamic-buttons"></div>

    <div id="settings-modal">
        <div class="modal-content">
            <h3>⚙️ Button Config</h3>
            <div id="settings-list"></div>
            <button onclick="addNewButtonSetting()" style="background:#007bff; color:white; width:100%; padding:15px; border-radius:10px; margin-top:10px; border:none;">➕ Add New Button</button>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button onclick="saveSettings()" style="background:#28a745; color:white; flex:2; padding:15px; border-radius:10px; border:none; font-weight:bold;">Save</button>
                <button onclick="toggleSettings(false)" style="background:#555; color:white; flex:1; padding:15px; border-radius:10px; border:none;">Close</button>
            </div>
        </div>
    </div>

    <script>
        let buttons = JSON.parse(localStorage.getItem('userButtons')) || [
            { name: "Add", cmd: "f8", useEnter: true, color: "#007bff" },
            { name: "Save", cmd: "f9", useEnter: true, color: "#28a745" }
        ];

        let isBillMode = false;
        let billItems = [];
        let lastScanTime = 0;
        let isFlashOn = false;

        function renderButtons() {
            const container = document.getElementById('dynamic-buttons');
            container.innerHTML = '';
            buttons.forEach((btn, index) => {
                const b = document.createElement('button');
                b.className = 'custom-btn';
                b.style.backgroundColor = btn.color || '#444';
                b.innerText = btn.name;
                b.onclick = () => sendCommand(btn.cmd, btn.useEnter);
                container.appendChild(b);
            });
        }

        async function sendCommand(cmd, useEnter) {
            document.getElementById('result').innerText = "Sending: " + cmd;
            try {
                await fetch('https://ntfy.sh/ibrahim_pharmacy_2026', { method: 'POST', body: cmd });
                if (useEnter) {
                    await new Promise(r => setTimeout(r, 800));
                    await fetch('https://ntfy.sh/ibrahim_pharmacy_2026', { method: 'POST', body: 'enter' });
                }
            } catch(e) { alert("Connection Error"); }
        }

        function onScanSuccess(text) {
            if (Date.now() - lastScanTime < 2500) return;
            lastScanTime = Date.now();
            if (isBillMode) {
                billItems.push(text);
                document.getElementById('count').innerText = billItems.length;
                document.getElementById('result').innerText = "Stored: " + text;
            } else {
                document.getElementById('result').innerText = "Sent: " + text;
                fetch('https://ntfy.sh/ibrahim_pharmacy_2026', { method: 'POST', body: text });
            }
        }

        function toggleBillMode() {
            isBillMode = !isBillMode;
            const btn = document.getElementById('billModeBtn');
            const sendBtn = document.getElementById('sendAllBtn');
            btn.innerText = isBillMode ? "📑 Bill: ON" : "📑 Bill: OFF";
            btn.classList.toggle('active', isBillMode);
            if (isBillMode) { billItems = []; document.getElementById('count').innerText = "0"; sendBtn.style.display = 'none'; }
            else if (billItems.length > 0) { sendBtn.style.display = 'block'; }
        }

        async function sendFullBill() {
            const btn = document.getElementById('sendAllBtn');
            btn.disabled = true;
            for (let i = 0; i < billItems.length; i++) {
                document.getElementById('result').innerText = `Sending ${i+1}/${billItems.length}`;
                await fetch('https://ntfy.sh/ibrahim_pharmacy_2026', { method: 'POST', body: billItems[i] });
                await new Promise(r => setTimeout(r, 1200));
            }
            btn.style.display = 'none'; btn.disabled = false;
            billItems = [];
        }

        async function toggleFlash() {
            try {
                const video = document.querySelector('video');
                const track = video.srcObject.getVideoTracks()[0];
                isFlashOn = !isFlashOn;
                await track.applyConstraints({ advanced: [{ torch: isFlashOn }] });
            } catch (e) { alert("Flash: Make sure camera is ON"); }
        }

        function toggleSettings(show) { document.getElementById('settings-modal').style.display = show ? 'block' : 'none'; if(show) renderSettingsList(); }
        function renderSettingsList() {
            const list = document.getElementById('settings-list');
            list.innerHTML = '';
            buttons.forEach((btn, index) => {
                list.innerHTML += `<div class="setting-row">
                    <input type="text" value="${btn.name}" oninput="updateBtn(${index}, 'name', this.value)">
                    <input type="text" value="${btn.cmd}" oninput="updateBtn(${index}, 'cmd', this.value)">
                    <label><input type="checkbox" ${btn.useEnter ? 'checked' : ''} onchange="updateBtn(${index}, 'useEnter', this.checked)"> + Enter Key</label>
                    <button onclick="removeBtn(${index})" style="background:red; color:white; border:none; padding:10px; border-radius:8px;">Delete</button>
                </div>`;
            });
        }
        function updateBtn(i, k, v) { buttons[i][k] = v; }
        function addNewButtonSetting() { buttons.push({ name: "New", cmd: "f1", useEnter: false }); renderSettingsList(); }
        function removeBtn(i) { buttons.splice(i, 1); renderSettingsList(); }
        function saveSettings() { localStorage.setItem('userButtons', JSON.stringify(buttons)); renderButtons(); toggleSettings(false); }

        window.onload = () => {
            // استخدام المحرك الأصلي اللي بيطلع زرار اختيار الكاميرا (ده أضمن حاجة)
            const scanner = new Html5QrcodeScanner("reader", { fps: 20, qrbox: 250 });
            scanner.render(onScanSuccess);
            renderButtons();
        };
    </script>
</body>
</html>
