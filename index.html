<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Just Scan - Pro Edition</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #000; color: white; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* شريط علوي بـ 5 أزرار */
        .top-bar { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 3px; 
            padding: 8px 4px; 
            background: #1a1a1a; 
            border-bottom: 1px solid #333; 
        }
        .top-bar button { 
            background: #333; color: white; border: 1px solid #555; 
            padding: 10px 2px; border-radius: 6px; font-size: 0.65em; 
            cursor: pointer; white-space: nowrap;
        }
        .top-bar button.active { background: #ffcc00; color: #000; font-weight: bold; }
        
        #reader { width: 100% !important; max-width: 500px; margin: 5px auto; border: none !important; min-height: 250px; background: #000; }
        .result-box { margin: 5px 10px; padding: 8px; background: #111; border-radius: 8px; color: #00ff00; font-size: 0.85em; border: 1px solid #222; min-height: 20px; }
        
        #dynamic-buttons { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; padding: 8px; }
        .custom-btn { padding: 12px 2px; border-radius: 6px; border: 1px solid #444; color: white; font-weight: bold; font-size: 0.75em; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; }

        .send-all-btn { background: #28a745; color: white; padding: 12px; width: 90%; margin: 10px auto; border-radius: 10px; display: none; font-weight: bold; border: none; cursor: pointer; }
        
        /* المودال (الإعدادات) */
        #settings-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; overflow-y: auto; }
        .modal-content { background: #222; width: 90%; margin: 15px auto; padding: 15px; border-radius: 15px; text-align: left; box-sizing: border-box; }
        .setting-row { background: #333; padding: 10px; margin-bottom: 10px; border-radius: 8px; display: flex; flex-direction: column; border: 1px solid #444; }
        input[type="text"], input[type="range"] { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #555; margin-bottom: 5px; font-size: 0.9em; background: #111; color: #fff; box-sizing: border-box; }
        .pref-row { display: flex; justify-content: space-between; align-items: center; background: #2a2a2a; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <button onclick="toggleSettings(true)">⚙️ إعدادات</button>
        <button onclick="openKeyboard()">⌨️ كيبورد</button>
        <button onclick="toggleFullScreen()">📺 شاشة</button>
        <button id="flash-btn" onclick="toggleFlash()">🔦 Flash</button>
        <button onclick="switchCamera()">🔄 كاميرا</button>
    </div>

    <div id="reader"></div>
    <div id="result" class="result-box">جاهز يا إبراهيم...</div>
    
    <div style="padding: 5px;">
        <button id="billModeBtn" onclick="toggleBillMode()" style="width: 100%; padding: 10px; border-radius: 8px; background: #333; color: white; border: 1px solid #555;">📑 وضع الفاتورة: OFF</button>
    </div>

    <button id="sendAllBtn" class="send-all-btn" onclick="sendFullBill()">📤 إرسال الفاتورة كاملة (<span id="count">0</span>)</button>
    
    <div id="dynamic-buttons"></div>

    <div id="settings-modal">
        <div class="modal-content">
            <h3 style="margin-top:0; color: #ffcc00; text-align: center;">⚙️ الإعدادات والتخصيص</h3>
            
            <div class="pref-row">
                <span>📳 الاهتزاز عند المسح</span>
                <input type="checkbox" id="vibrate-toggle" style="width:20px; height:20px;">
            </div>
            <div class="pref-row" style="flex-direction: column;
