<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Just Scan Pro - Total Edition</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --primary: #3d60cc;
            --primary-hover: #2e49a3;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --border: #334155;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #000;
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.5;
            overflow-x: hidden;
        }

        /* التصميم العلوي - بار التنقل */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .brand-logo {
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .action-btns {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .icon-btn:active { transform: scale(0.9); background: var(--border); }
        .icon-btn.active { background: var(--primary); border-color: var(--primary); }

        /* منطقة الماسح الضوئي */
        .scanner-section {
            width: 100%;
            max-width: 600px;
            margin: 10px auto;
            position: relative;
            padding: 0 10px;
        }

       #reader {
    width: 100% !important;
    max-width: 380px !important; 
    height: 250px !important; /* زودنا الارتفاع شوية عشان مربع السكان يظهر */
    border: 2px solid var(--border) !important;
    border-radius: 20px !important;
    margin: 5px auto !important; 
    overflow: hidden;
    background: #000 !important;
}

/* السطر ده مهم جداً عشان يخلي الفيديو يملا المربع اللي حددناه */
#reader video {
    object-fit: cover !important;
    height: 250px !important;
}

        /* عرض النتائج */
        .result-container {
            margin: 15px;
            padding: 15px;
            background: var(--card-bg);
            border-radius: 15px;
            border: 1px solid var(--border);
            text-align: center;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .status-online { background: rgba(34, 197, 94, 0.2); color: var(--success); }
        .status-offline { background: rgba(245, 158, 11, 0.2); color: var(--warning); }

        #result-text {
            font-family: 'Courier New', monospace;
            font-size: 1.1rem;
            color: var(--success);
            word-break: break-all;
            min-height: 1.5em;
        }

        /* شبكة الأزرار التفاعلية */
        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            padding: 10px 15px;
            max-width: 600px;
            margin: 0 auto 80px;
        }

        .custom-btn {
            aspect-ratio: 1/1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 15px;
            color: white;
            font-weight: 600;
            font-size: 0.8rem;
            gap: 5px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .custom-btn:active { transform: translateY(2px); box-shadow: none; }

        /* لوحة الفواتير */
        #bill-panel {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 70vh;
            background: var(--bg-dark);
            border-top: 2px solid var(--primary);
            z-index: 1500;
            border-radius: 30px 30px 0 0;
            padding: 20px;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.8);
            overflow-y: auto;
        }

        .bill-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .slot-item {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 10px;
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* النوافذ المنبثقة (Modals) */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            padding: 20px;
            overflow-y: auto;
        }

        .modal-body {
            background: var(--card-bg);
            border-radius: 25px;
            padding: 25px;
            max-width: 500px;
            margin: 40px auto;
            border: 1px solid var(--border);
        }

        input[type="text"], input[type="tel"], input[type="password"], input[type="number"] {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            background: #000;
            border: 1px solid var(--border);
            color: white;
            border-radius: 12px;
            font-size: 1rem;
        }

        .save-btn {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            margin-top: 15px;
            cursor: pointer;
        }

        /* شاشة القفل */
        #lock-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark);
            z-index: 9999;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .lock-icon { font-size: 80px; color: var(--danger); margin-bottom: 20px; }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .pulse { animation: pulse 2s infinite; }

    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="lock-icon pulse">⚠️</div>
        <h1 style="color: var(--danger);">عذراً، انتهى الاشتراك</h1>
        <p id="lock-message" style="color: var(--text-dim); max-width: 300px; margin-bottom: 30px;"></p>
        <a id="whatsapp-renewal" href="#" style="background: var(--success); color: white; padding: 15px 40px; border-radius: 15px; text-decoration: none; font-weight: bold; width: 80%;">تجديد الاشتراك الآن 💬</a>
        <button onclick="location.reload()" style="background: none; border: 1px solid var(--border); color: var(--text-dim); margin-top: 20px; padding: 10px; border-radius: 10px;">إعادة محاولة الاتصال</button>
    </div>

    <div id="welcome-screen" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9000; display: none; flex-direction: column; align-items: center; justify-content: center;">
        <h1 style="color: var(--primary); font-size: 3rem; margin-bottom: 0;">Just Scan</h1>
        <p style="color: var(--text-dim); margin-bottom: 40px;">Pro Dashboard v4.0</p>
        <button onclick="document.getElementById('welcome-screen').style.display='none'; openSettings();" style="background: var(--primary); color: white; border: none; padding: 18px 50px; border-radius: 15px; font-weight: bold; font-size: 1.1rem; cursor: pointer;">بدء تسجيل الدخول 🚀</button>
    </div>

    <div class="top-bar">
        <a href="#" class="brand-logo">
            <span style="background: var(--primary); color: white; padding: 2px 8px; border-radius: 6px;">JS</span>
            Just Scan
        </a>
        <div class="action-btns">
            <button class="icon-btn" onclick="toggleFlash()" id="flash-toggle">🔦</button>
            <button class="icon-btn" onclick="switchCamera()" title="تبديل الكاميرا">🔄📷</button>
            <button class="icon-btn" onclick="openKeyboard()">⌨️</button>
            <button class="icon-btn" onclick="syncData(true)" style="color: var(--success);">🔄</button>
            <button class="icon-btn" onclick="openSettings()">⚙️</button>
        </div>
    </div>

    <div class="scanner-section">
        <div id="reader"></div>
    </div>

    <div class="result-container">
        <div id="connection-status" class="status-badge status-online">متصل بالسحابة ●</div>
        <div id="result-text">في انتظار المسح...</div>
    </div>

    <div style="padding: 0 15px; margin-bottom: 10px;">
        <button id="bill-mode-btn" onclick="toggleBillPanel()" style="width: 100%; padding: 15px; background: var(--primary); border: none; border-radius: 15px; color: white; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px;">
            📑 نظام الفواتير (أوفلاين)
        </button>
    </div>

    <div id="dynamic-buttons" class="buttons-grid">
        </div>

    <div id="bill-panel">
        <div class="bill-header">
            <h2 style="margin: 0;">📋 قائمة الفواتير</h2>
            <button onclick="toggleBillPanel()" style="background: var(--danger); border: none; color: white; padding: 5px 15px; border-radius: 8px;">إغلاق</button>
        </div>
        <div id="slots-list"></div>
    </div>

    <div id="settings-modal" class="modal-overlay">
        <div class="modal-body">
            <h2 style="color: var(--primary); margin-top: 0;">⚙️ الإعدادات</h2>
            
            <div id="auth-info" style="background: #000; padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1px solid var(--border);">
                </div>

            <h4 style="margin-bottom: 10px;">🎮 تخصيص الأزرار</h4>
            <div id="buttons-config-list" style="max-height: 200px; overflow-y: auto; margin-bottom: 10px;"></div>
            <button onclick="addNewButtonRow()" style="width: 100%; padding: 8px; background: none; border: 1px dashed var(--text-dim); color: var(--text-dim); border-radius: 8px; margin-bottom: 20px;">+ إضافة زر جديد</button>

            <button onclick="saveAllAndClose()" class="save-btn">حفظ جميع التغييرات</button>
            <button onclick="closeSettings()" style="width: 100%; background: none; border: none; color: var(--text-dim); margin-top: 10px;">إلغاء</button>
        </div>
    </div>

    <div id="keyboard-modal" class="modal-overlay">
        <div class="modal-body" style="text-align: center;">
            <h2 style="color: var(--warning);">⌨️ إدخال يدوي</h2>
            <input type="text" id="manual-data" placeholder="اكتب الكود أو النص هنا..." style="font-size: 1.2rem; text-align: center; border-color: var(--primary);">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button onclick="sendManualData()" style="padding: 15px; background: var(--success); border: none; border-radius: 12px; color: white; font-weight: bold;">إرسال للكمبيوتر</button>
                <button onclick="closeKeyboard()" style="padding: 15px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; color: white;">إلغاء</button>
            </div>
        </div>
    </div>

    <script>
        // --- الثوابت والبيانات ---
        const WHATSAPP_RENEW = "201147534998";
        let lastScanTime = 0;
        let isFlashOn = false;
        let activeSlotIndex = null;
        let html5Scanner = null;

        // استعادة البيانات من التخزين
        let slots = JSON.parse(localStorage.getItem('v_slots')) || Array(10).fill().map(() => []);
        let slotNames = JSON.parse(localStorage.getItem('v_slot_names')) || Array(10).fill().map((_, i) => `فاتورة ${i + 1}`);
        let configButtons = JSON.parse(localStorage.getItem('userButtons')) || [
            { name: "جديد", cmd: "f8", useEnter: true, color: "#3d60cc" },
            { name: "حفظ", cmd: "f9", useEnter: true, color: "#3d60cc" },
            { name: "بحث", cmd: "f10", useEnter: false, color: "#166534" },
            { name: "خروج", cmd: "esc", useEnter: false, color: "#991b1b" }
        ];

        // --- نظام التحقق من الاشتراك (The Core Fix) ---
        function isSubscribed(expiry) {
            if (!expiry) return false;
            const expiryDate = new Date(isNaN(expiry) ? expiry : parseInt(expiry));
            return expiryDate.getTime() > Date.now();
        }

        async function syncData(manual = false) {
            const phone = localStorage.getItem('v_phone');
            if (!phone) return;

            try {
                const res = await fetch(`users.json?t=${Date.now()}`);
                const data = await res.json();
                const user = data.find(u => u.phone === phone);

                if (user) {
                    localStorage.setItem('v_expiry', user.expiryDate);
                    localStorage.setItem('v_name', user.name);
                    localStorage.setItem('v_activity', user.activity);

                    if (!isSubscribed(user.expiryDate)) {
                        showLockScreen(user.name, phone);
                    } else {
                        document.getElementById('lock-screen').style.display = 'none';
                        if (manual) alert("✅ تم تحديث بيانات الاشتراك بنجاح");
                    }
                    renderAuthStatus();
                }
            } catch (err) {
                console.error("Sync failed", err);
                if (manual) alert("❌ فشل الاتصال بالسيرفر");
            }
        }

        function showLockScreen(name, phone) {
            const lock = document.getElementById('lock-screen');
            lock.style.display = 'flex';
            document.getElementById('lock-message').innerText = `يا ${name}، انتهت صلاحية اشتراكك لهذا الرقم (${phone}). يرجى التواصل مع الإدارة للتجديد.`;
            document.getElementById('whatsapp-renewal').href = `https://wa.me/${WHATSAPP_RENEW}?text=${encodeURIComponent('تجديد اشتراك رقم: ' + phone)}`;
        }

        // --- نظام الإرسال NTFY ---
        function masterSend(message) {
            const phone = localStorage.getItem('v_phone');
            const expiry = localStorage.getItem('v_expiry');

            if (!phone) { openSettings(); return; }
            if (!isSubscribed(expiry)) { showLockScreen(localStorage.getItem('v_name'), phone); return; }

            fetch(`https://ntfy.sh/voltir_${phone}`, {
                method: 'POST',
                body: message
            }).catch(e => console.log("Network error"));
        }

        // --- نظام الماسح ---
        function onScanSuccess(text) {
            if (Date.now() - lastScanTime < 2000) return;
            lastScanTime = Date.now();

            if (activeSlotIndex !== null) {
                // وضع الفواتير (أوفلاين)
                if (slots[activeSlotIndex].length >= 30) return alert("الفاتورة ممتلئة!");
                slots[activeSlotIndex].push(text);
                localStorage.setItem('v_slots', JSON.stringify(slots));
                renderSlots();
                document.getElementById('result-text').innerText = `✅ تم الحفظ في ${slotNames[activeSlotIndex]}`;
            } else {
                // وضع الإرسال المباشر
                masterSend(text + '_ent');
                document.getElementById('result-text').innerText = `📤 أرسلت: ${text}`;
            }
            if (navigator.vibrate) navigator.vibrate(100);
        }

        // --- إدارة الواجهة (UI) ---
        function renderMainButtons() {
            const grid = document.getElementById('dynamic-buttons');
            grid.innerHTML = '';
            configButtons.forEach(btn => {
                const b = document.createElement('button');
                b.className = 'custom-btn';
                b.style.borderTop = `4px solid ${btn.color || '#3d60cc'}`;
                b.innerHTML = `<span>${btn.name}</span><small style="opacity:0.5">${btn.cmd}</small>`;
                b.onclick = () => {
                    masterSend(btn.cmd);
                    if (btn.useEnter) setTimeout(() => masterSend('enter'), 350);
                };
                grid.appendChild(b);
            });
        }

        function renderAuthStatus() {
    const phone = localStorage.getItem('v_phone');
    const name = localStorage.getItem('v_name');
    const expiry = localStorage.getItem('v_expiry');
    const box = document.getElementById('auth-info');

    if (phone) {
        const d = new Date(isNaN(expiry) ? expiry : parseInt(expiry));
        box.innerHTML = `
            <div style="background: rgba(34, 197, 94, 0.1); padding: 15px; border-radius: 12px; border: 1px solid var(--success);">
                <div style="color: var(--success); font-weight: bold; font-size: 1.1rem;">👤 ${name}</div>
                <div style="font-size: 0.9rem; color: var(--text-dim); margin: 5px 0;">📱 رقم: ${phone}</div>
                <div style="font-size: 0.8rem; color: var(--warning);">⏳ ينتهي في: ${d.toLocaleDateString('ar-EG')}</div>
                <button onclick="logout()" style="width:100%; background:var(--danger); border:none; color:white; padding:10px; border-radius:8px; margin-top:15px; cursor:pointer; font-weight:bold;">تسجيل خروج</button>
            </div>
        `;
    } else {
        box.innerHTML = `
            <div id="auth-tabs" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:15px;">
                <button onclick="showAuthTab('login')" id="tab-login" style="padding:10px; border-radius:8px; border:none; background:var(--primary); color:white;">دخول</button>
                <button onclick="showAuthTab('register')" id="tab-register" style="padding:10px; border-radius:8px; border:none; background:var(--card-bg); color:white;">حساب جديد</button>
            </div>
            <div id="login-form">
                <input type="tel" id="login-phone" placeholder="رقم الموبايل">
                <input type="password" id="login-pass" placeholder="كلمة المرور">
                <button onclick="handleLogin()" class="save-btn" style="margin:0;">دخول 🔑</button>
            </div>
            <div id="register-form" style="display:none;">
                <input type="text" id="reg-name" placeholder="الاسم بالكامل">
                <input type="tel" id="reg-phone" placeholder="رقم الموبايل">
                <input type="password" id="reg-pass" placeholder="كلمة مرور قوية">
                <button onclick="handleRegister()" class="save-btn" style="margin:0; background:var(--success);">إنشاء حساب وتفعيل تجريبي ✅</button>
                <p style="font-size:0.7rem; color:var(--text-dim); margin-top:10px;">* الحساب الجديد يحصل على 7 أيام تجربة مجانية</p>
            </div>
        `;
    }
}

// دالة للتبديل بين التسجيل والدخول
function showAuthTab(type) {
    document.getElementById('login-form').style.display = type === 'login' ? 'block' : 'none';
    document.getElementById('register-form').style.display = type === 'register' ? 'block' : 'none';
    document.getElementById('tab-login').style.background = type === 'login' ? 'var(--primary)' : 'var(--card-bg)';
    document.getElementById('tab-register').style.background = type === 'register' ? 'var(--primary)' : 'var(--card-bg)';
}

        async function handleLogin() {
            const phone = document.getElementById('login-phone').value.trim();
            const pass = document.getElementById('login-pass').value.trim();
            if (!phone || !pass) return alert("اكمل البيانات");

            const res = await fetch(`users.json?t=${Date.now()}`);
            const users = await res.json();
            const user = users.find(u => u.phone === phone && u.password === pass);

            if (user) {
                localStorage.setItem('v_phone', phone);
                localStorage.setItem('v_expiry', user.expiryDate);
                localStorage.setItem('v_name', user.name);
                localStorage.setItem('v_activity', user.activity);
                location.reload();
            } else alert("بيانات غلط!");
        }

        function logout() { if(confirm("خروج؟")) { localStorage.clear(); location.reload(); } }

        function toggleBillPanel() {
            const p = document.getElementById('bill-panel');
            const isHidden = p.style.display === 'none' || p.style.display === '';
            p.style.display = isHidden ? 'block' : 'none';
            if(isHidden) renderSlots();
        }

        function renderSlots() {
            const list = document.getElementById('slots-list');
            list.innerHTML = '';
            slots.forEach((items, i) => {
                const div = document.createElement('div');
                div.className = 'slot-item';
                div.innerHTML = `
                    <div>
                        <b onclick="renameSlot(${i})">✏️ ${slotNames[i]}</b><br>
                        <small style="color:var(--text-dim)">${items.length} كود مخزن</small>
                    </div>
                    <div style="display:flex; gap:5px;">
                        <button onclick="setActiveSlot(${i})" style="background:${activeSlotIndex===i?'var(--danger)':'var(--card-bg)'}; border:1px solid var(--border); color:white; padding:10px; border-radius:10px;">${activeSlotIndex===i?'🔴':'🎤'}</button>
                        <button onclick="sendFullSlot(${i})" style="background:var(--success); border:none; color:white; padding:10px; border-radius:10px;">📤</button>
                        <button onclick="clearSlot(${i})" style="background:none; border:1px solid var(--danger); color:var(--danger); padding:10px; border-radius:10px;">🗑️</button>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        function setActiveSlot(i) { activeSlotIndex = (activeSlotIndex === i) ? null : i; renderSlots(); }
        function clearSlot(i) { if(confirm("تفريغ الفاتورة؟")) { slots[i]=[]; localStorage.setItem('v_slots', JSON.stringify(slots)); renderSlots(); } }
        function renameSlot(i) { const n = prompt("الاسم الجديد:", slotNames[i]); if(n){ slotNames[i]=n; localStorage.setItem('v_slot_names', JSON.stringify(slotNames)); renderSlots(); } }

        async function sendFullSlot(i) {
            if(slots[i].length === 0) return alert("فاضية!");
            if(confirm(`إرسال ${slots[i].length} كود؟`)) {
                for(let code of slots[i]) {
                    masterSend(code + '_ent');
                    await new Promise(r => setTimeout(r, 1000));
                }
                alert("✅ اكتمل الإرسال");
            }
        }

        // --- وظائف عامة ---
        function openSettings() { document.getElementById('settings-modal').style.display='block'; renderButtonsConfig(); renderAuthStatus(); }
        function closeSettings() { document.getElementById('settings-modal').style.display='none'; }
        
        function renderButtonsConfig() {
    const list = document.getElementById('buttons-config-list');
    list.innerHTML = '';
    configButtons.forEach((btn, i) => {
        const d = document.createElement('div');
        d.style = "display:flex; align-items:center; gap:5px; margin-bottom:8px; background:#222; padding:10px; border-radius:10px;";
        d.innerHTML = `
            <input type="text" value="${btn.name}" oninput="configButtons[${i}].name=this.value" style="margin:0; flex:1" placeholder="الاسم">
            <input type="text" value="${btn.cmd}" oninput="configButtons[${i}].cmd=this.value" style="margin:0; flex:1" placeholder="الأمر">
            <input type="color" value="${btn.color}" oninput="configButtons[${i}].color=this.value" style="width:35px; height:40px; padding:2px; border:none; background:none;">
            
            <label style="font-size:0.7rem; display:flex; flex-direction:column; align-items:center; color:var(--text-dim);">
                <input type="checkbox" ${btn.useEnter ? 'checked' : ''} onchange="configButtons[${i}].useEnter=this.checked">
                Enter
            </label>

            <button onclick="configButtons.splice(${i},1);renderButtonsConfig()" style="background:var(--danger); border:none; color:white; border-radius:8px; padding:10px;">X</button>
        `;
        list.appendChild(d);
    });
}
        function addNewButtonRow() { configButtons.push({name:"جديد", cmd:"f1", color:"#3d60cc"}); renderButtonsConfig(); }
        function saveAllAndClose() { localStorage.setItem('userButtons', JSON.stringify(configButtons)); renderMainButtons(); closeSettings(); }

        function openKeyboard() { document.getElementById('keyboard-modal').style.display='block'; setTimeout(()=>document.getElementById('manual-data').focus(), 300); }
        function closeKeyboard() { document.getElementById('keyboard-modal').style.display='none'; }
        function sendManualData() { const v = document.getElementById('manual-data').value; if(v){ masterSend(v+'_ent'); document.getElementById('manual-data').value=''; } }

        async function toggleFlash() {
            try {
                const track = document.querySelector('video').srcObject.getVideoTracks()[0];
                isFlashOn = !isFlashOn;
                await track.applyConstraints({ advanced: [{ torch: isFlashOn }] });
                document.getElementById('flash-toggle').classList.toggle('active');
            } catch(e) { alert("الفلاش غير متاح"); }
        }

       
        // --- بداية التشغيل ---
            window.onload = () => {
            const phone = localStorage.getItem('v_phone');
            if (!phone) {
                // إظهار شاشة الترحيب لو مفيش رقم مسجل
                document.getElementById('welcome-screen').style.display = 'flex';
            } else {
                syncData();
                // تشغيل الكاميرا الخلفية مباشرة عند الفتح
                startSmartScanner("environment"); 
            }
            // استدعاء الدالة بالاسم الصحيح الموجود في كودك فوق
            renderMainButtons();
        };

        // دالة ذكية لتشغيل الكاميرا والتبديل بينها
        async function startSmartScanner(mode) {
    try {
        if (html5Scanner) {
            await html5Scanner.stop();
        }
        html5Scanner = new Html5Qrcode("reader");
        await html5Scanner.start(
            { facingMode: mode }, 
            {
                fps: 25,
                // تعديل: صغرنا الـ qrbox عشان يناسب مساحة الكاميرا الجديدة ويظهر في النص
                qrbox: { width: 200, height: 150 }, 
                // تعديل: غيرنا الـ aspectRatio لـ 1.0 عشان الصورة متبقاش مضغوطة بالعرض
                aspectRatio: 1.0 
            },
            onScanSuccess
        );
    } catch (err) {
        console.error("Camera error", err);
    }
}

        // دالة تبديل الكاميرا (خلفية / أمامية)
        let currentCameraMode = "environment";
        function switchCamera() {
            currentCameraMode = (currentCameraMode === "environment") ? "user" : "environment";
            startSmartScanner(currentCameraMode);
        }

        // دالة إضافية للتأكد من حفظ الفواتير في ذاكرة الموبايل
        function saveBillsToDevice() {
            localStorage.setItem('v_slots', JSON.stringify(slots));
            localStorage.setItem('v_slot_names', JSON.stringify(slotNames));
        }

    </script>
