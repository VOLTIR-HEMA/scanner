<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Just Scan - Pro Edition</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #000; color: white; margin: 0; padding: 0; overflow-x: hidden; }
        .top-bar { display: flex; justify-content: space-around; align-items: center; padding: 8px; background: #1a1a1a; border-bottom: 1px solid #333; flex-wrap: wrap; gap: 5px; }
        .top-bar button { background: #333; color: white; border: 1px solid #555; padding: 6px 10px; border-radius: 6px; font-size: 0.75em; cursor: pointer; }
        .top-bar button.active { background: #ffcc00; color: #000; font-weight: bold; }
        
        #reader { width: 100% !important; max-width: 500px; margin: 5px auto; border: none !important; min-height: 250px; background: #000; }
        #reader button { background: #444 !important; color: white !important; border: 1px solid #666 !important; padding: 8px !important; border-radius: 5px !important; margin: 5px !important; cursor: pointer; }
        #reader select { background: #222 !important; color: white !important; padding: 5px !important; border-radius: 5px !important; border: 1px solid #444; }

        .result-box { margin: 5px 10px; padding: 8px; background: #111; border-radius: 8px; color: #00ff00; font-size: 0.85em; border: 1px solid #222; min-height: 20px; }
        
        #dynamic-buttons { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; padding: 8px; }
        .custom-btn { padding: 12px 2px; border-radius: 6px; border: 1px solid #444; color: white; font-weight: bold; font-size: 0.75em; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; }

        .send-all-btn { background: #28a745; color: white; padding: 12px; width: 90%; margin: 10px auto; border-radius: 10px; display: none; font-weight: bold; border: none; cursor: pointer; }
        
        /* نافذة الكيبورد الجديدة (التصميم اللي طلبته) */
        #keyboard-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 3000; align-items: center; justify-content: center; }
        .keyboard-content { background: #111; border: 2px solid #ff0000; border-radius: 12px; padding: 20px; width: 80%; max-width: 300px; box-shadow: 0 0 20px rgba(255,0,0,0.3); }
        .keyboard-content input { width: 90%; padding: 12px; background: #000; border: 1px solid #444; color: #00ff00; border-radius: 8px; font-size: 1.1em; text-align: center; margin-bottom: 15px; outline: none; }
        .keyboard-content input:focus { border-color: #ff0000; }
        .keyboard-btns { display: flex; gap: 10px; }
        .keyboard-btns button { flex: 1; padding: 10px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }

        #settings-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; overflow-y: auto; }
        .modal-content { background: #222; width: 85%; margin: 20px auto; padding: 15px; border-radius: 15px; text-align: left; }
        .setting-row { background: #333; padding: 10px; margin-bottom: 10px; border-radius: 8px; display: flex; flex-direction: column; border: 1px solid #444; }
        input[type="text"] { padding: 10px; border-radius: 5px; border: 1px solid #555; margin-bottom: 5px; font-size: 0.9em; background: #111; color: #fff; }
    </style>
</head>
<body>

    <div class="top-bar">
        <button onclick="toggleSettings(true)">⚙️</button>
        <button id="flash-btn" onclick="toggleFlash()">🔦</button>
        <button id="full-screen-btn" onclick="toggleFullScreen()">📺 Full</button>
        <button onclick="openKeyboardModal()">⌨️ Keyboard</button>
        <button id="billModeBtn" onclick="toggleBillMode()">📑 Bill: OFF</button>
    </div>

    <div id="reader"></div>
    <div id="result" class="result-box">جاهز للمسح...</div>
    <button id="sendAllBtn" class="send-all-btn" onclick="sendFullBill()">📤 إرسال الفاتورة كاملة (<span id="count">0</span>)</button>
    
    <div id="dynamic-buttons"></div>

    <div id="keyboard-modal">
        <div class="keyboard-content">
            <h4 style="margin: 0 0 15px 0; color: #ff0000;">إدخال يدوي</h4>
            <input type="text" id="manual-input" placeholder="اكتب الكود هنا..." onkeypress="if(event.key==='Enter') submitManualInput()">
            <div class="keyboard-btns">
                <button onclick="submitManualInput()" style="background: #28a745; color: white;">إرسال</button>
                <button onclick="closeKeyboardModal()" style="background: #444; color: white;">إلغاء</button>
            </div>
        </div>
    </div>

    <div id="settings-modal">
        <div class="modal-content">
            <h3 style="margin-top:0; color: #ffcc00;">⚙️ تخصيص الأزرار</h3>
            <div id="settings-list"></div>
            <button onclick="addNewButtonSetting()" style="background:#444; color:white; width:100%; padding:10px; border-radius:8px; margin-top:5px; border: 1px dashed #777;">➕ إضافة زر جديد</button>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button onclick="saveSettings()" style="background:#28a745; color:white; flex:2; padding:15px; border-radius:10px; border:none; font-weight:bold;">حفظ</button>
                <button onclick="toggleSettings(false)" style="background:#555; color:white; flex:1; padding:15px; border-radius:10px; border:none;">إغلاق</button>
            </div>
        </div>
    </div>

    <script>
        const NTFY_URL = 'https://ntfy.sh/ibrahim_pharmacy_2026';
        let isBillMode = false, billItems = [], lastScanTime = 0, isFlashOn = false;
        let buttons = JSON.parse(localStorage.getItem('userButtons')) || [
            { name: "Add", cmd: "f8", useEnter: true, color: "#007bff" },
            { name: "Save", cmd: "f9", useEnter: true, color: "#28a745" },
            { name: "F1", cmd: "f1", useEnter: false, color: "#555" },
            { name: "F2", cmd: "f2", useEnter: false, color: "#555" },
            { name: "Tab", cmd: "tab", useEnter: false, color: "#666" }
        ];

        // صوت التنبيه
        function playBeep() {
            try {
                const context = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = context.createOscillator();
                const gain = context.createGain();
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(800, context.currentTime);
                gain.gain.setValueAtTime(0.1, context.currentTime);
                oscillator.connect(gain);
                gain.connect(context.destination);
                oscillator.start(); oscillator.stop(context.currentTime + 0.1);
            } catch (e) { console.log("Audio Error"); }
        }

        // التحكم في نافذة الكيبورد
        function openKeyboardModal() {
            document.getElementById('keyboard-modal').style.display = 'flex';
            const input = document.getElementById('manual-input');
            input.value = '';
            setTimeout(() => input.focus(), 100);
        }

        function closeKeyboardModal() {
            document.getElementById('keyboard-modal').style.display = 'none';
        }

        function submitManualInput() {
            const val = document.getElementById('manual-input').value;
            if (val && val.trim() !== "") {
                fetch(NTFY_URL, { method: 'POST', body: val.trim() + '_ent' });
                document.getElementById('result').innerText = "تم إرسال يدوياً: " + val;
                playBeep();
                closeKeyboardModal();
            }
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(e => alert("Error"));
                document.getElementById('full-screen-btn').innerText = "📺 Exit";
            } else {
                document.exitFullscreen();
                document.getElementById('full-screen-btn').innerText = "📺 Full";
            }
        }

        function renderButtons() {
            const container = document.getElementById('dynamic-buttons');
            container.innerHTML = '';
            buttons.forEach((btn, index) => {
                const b = document.createElement('button');
                b.className = 'custom-btn';
                b.style.backgroundColor = btn.color || '#444';
                b.innerText = btn.name;
                b.onclick = () => sendCommand(btn.cmd, btn.useEnter);
                container.appendChild(b);
            });
        }

        async function sendCommand(cmd, useEnter) {
            document.getElementById('result').innerText = `جاري إرسال: ${cmd}`;
            try {
                await fetch(NTFY_URL, { method: 'POST', body: cmd });
                if (useEnter) {
                    await new Promise(r => setTimeout(r, 500));
                    await fetch(NTFY_URL, { method: 'POST', body: 'enter' });
                }
                playBeep();
                document.getElementById('result').innerText = `تم الإرسال: ${cmd}`;
            } catch (e) { document.getElementById('result').innerText = "خطأ اتصال!"; }
        }

        function onScanSuccess(text) {
            if (Date.now() - lastScanTime < 2500) return;
            lastScanTime = Date.now();
            playBeep();
            if (isBillMode) {
                billItems.push(text);
                document.getElementById('count').innerText = billItems.length;
            } else {
                fetch(NTFY_URL, { method: 'POST', body: text + '_ent' });
                document.getElementById('result').innerText = "تم مسح: " + text;
            }
        }

        function toggleBillMode() {
            isBillMode = !isBillMode;
            const btn = document.getElementById('billModeBtn'), sendBtn = document.getElementById('sendAllBtn');
            btn.innerText = isBillMode ? "📑 Bill: ON" : "📑 Bill: OFF";
            btn.classList.toggle('active', isBillMode);
            if (isBillMode) { billItems = []; document.getElementById('count').innerText = "0"; sendBtn.style.display = 'none'; }
            else if (billItems.length > 0) { sendBtn.style.display = 'block'; }
        }

        async function sendFullBill() {
            const btn = document.getElementById('sendAllBtn');
            btn.disabled = true;
            for (let i = 0; i < billItems.length; i++) {
                await fetch(NTFY_URL, { method: 'POST', body: billItems[i] + '_ent' });
                playBeep();
                await new Promise(r => setTimeout(r, 1200));
            }
            btn.style.display = 'none'; btn.disabled = false;
            billItems = [];
        }

        async function toggleFlash() {
            try {
                const video = document.querySelector('video');
                const track = video.srcObject.getVideoTracks()[0];
                isFlashOn = !isFlashOn;
                await track.applyConstraints({ advanced: [{ torch: isFlashOn }] });
                document.getElementById('flash-btn').innerText = isFlashOn ? "❌" : "🔦";
            } catch (e) { alert("الفلاش غير مدعوم في هذه الكاميرا"); }
        }

        function toggleSettings(show) { document.getElementById('settings-modal').style.display = show ? 'block' : 'none'; if(show) renderSettingsList(); }
        function renderSettingsList() {
            const list = document.getElementById('settings-list');
            list.innerHTML = '';
            buttons.forEach((btn, index) => {
                const row = document.createElement('div');
                row.className = 'setting-row';
                row.innerHTML = `<input type="text" value="${btn.name}" oninput="updateBtn(${index}, 'name', this.value)">
                                <input type="text" value="${btn.cmd}" oninput="updateBtn(${index}, 'cmd', this.value)">
                                <button onclick="removeBtn(${index})" style="background:#ff4444; color:white; border:none; padding:8px; border-radius:5px; margin-top:5px;">إزالة</button>`;
                list.appendChild(row);
            });
        }
        function updateBtn(i, k, v) { buttons[i][k] = v; }
        function addNewButtonSetting() { buttons.push({ name: "جديد", cmd: "f1", useEnter: false, color: "#555" }); renderSettingsList(); }
        function removeBtn(i) { buttons.splice(i, 1); renderSettingsList(); }
        function saveSettings() { localStorage.setItem('userButtons', JSON.stringify(buttons)); renderButtons(); toggleSettings(false); }

        window.onload = () => {
            const scanner = new Html5QrcodeScanner("reader", { 
                fps: 20, 
                qrbox: { width: 250, height: 150 },
                rememberLastUsedCamera: true,
                aspectRatio: 1.7777778 // توافق أفضل مع شاشات التابلت
            });
            scanner.render(onScanSuccess);
            renderButtons();
        };
    </script>
</body>
</html>
