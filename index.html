<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Pro - Ibrahim</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        #video { width: 100vw; height: 100vh; object-fit: cover; }
        
        /* رصة الزراير الـ 5 اللي فوق */
        .top-bar { position: fixed; top: 10px; width: 100%; display: flex; justify-content: space-evenly; z-index: 999; }
        
        /* رصة الزراير الـ 5 اللي تحت */
        .bottom-bar { position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: space-evenly; z-index: 999; }
        
        .btn { background: rgba(50,50,50,0.7); color: white; border: 1px solid #777; padding: 12px; border-radius: 10px; min-width: 55px; font-weight: bold; cursor: pointer; backdrop-filter: blur(5px); }
        
        /* مود الفاتورة والكيبورد */
        #batch-container { position: fixed; top: 80px; width: 90%; left: 5%; z-index: 1000; display: none; }
        #batch-input { width: 100%; padding: 15px; border-radius: 10px; border: none; font-size: 18px; outline: none; }
        
        /* شاشة التعديل (الترس) */
        #settings-ui { position: fixed; inset: 0; background: #1a1a1a; z-index: 2000; padding: 20px; display: none; overflow-y: auto; }
        .set-row { background: #333; padding: 10px; margin-bottom: 10px; border-radius: 8px; }
        .set-row input { width: 80%; padding: 5px; margin-top: 5px; }
    </style>
</head>
<body>

    <video id="video" autoplay playsinline></video>

    <div class="top-bar">
        <button class="btn" onclick="document.getElementById('settings-ui').style.display='block'">⚙️</button>
        <button class="btn" onclick="toggleFlash()">⚡</button>
        <button class="btn" id="btn-t1" onclick="sendToPC('F5')">+</button>
        <button class="btn" id="btn-t2" onclick="sendToPC('Delete')">🗑️</button>
        <button class="btn" onclick="sendToPC('Enter')">⏎</button>
    </div>

    <div id="batch-container">
        <input type="text" id="batch-input" placeholder="اكتب البيانات هنا...">
    </div>

    <div class="controls bottom-bar">
        <button class="btn" onclick="toggleBatch()">📄</button>
        <button class="
            let lastScanTime = 0;
        const COOLDOWN = 2500;
        let isBillMode = false;
        let billItems = [];
        let track = null;
        let isFlashOn = false;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playBeep(freq = 880) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'sine'; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            osc.start(); osc.stop(audioCtx.currentTime + 0.15);
        }

        function onScanSuccess(decodedText) {
            const now = Date.now();
            if (now - lastScanTime < COOLDOWN) return;
            lastScanTime = now;
            playBeep();
            if (navigator.vibrate) navigator.vibrate(80);

            if (isBillMode) {
                billItems.push(decodedText);
                document.getElementById('count').innerText = billItems.length;
                document.getElementById('sendAllBtn').style.display = 'block';
                document.getElementById('result').innerText = "تمت الإضافة للفاتورة: " + decodedText;
            } else {
                document.getElementById('result').innerText = "تم الإرسال فوراً: " + decodedText;
                fetch('https://ntfy.sh/ibrahim_pharmacy_2026', { method: 'POST', body: decodedText });
            }
        }

        function toggleBillMode() {
            isBillMode = !isBillMode;
            const btn = document.getElementById('billModeBtn');
            if (isBillMode) {
                btn.innerText = "📑 وضع الفاتورة: يجمع الآن";
                btn.classList.add('active');
                playBeep(1200);
            } else {
                btn.innerText = "📑 وضع الفاتورة: مُغلق";
                btn.classList.remove('active');
                billItems = [];
                document.getElementById('sendAllBtn').style.display = 'none';
            }
        }

        async function sendAllItems() {
            const btn = document.getElementById('sendAllBtn');
            btn.disabled = true;
            btn.innerText = "جاري الإرسال بالتتابع...";
            
            for (let i = 0; i < billItems.length; i++) {
                const code = billItems[i];
                document.getElementById('result').innerText = `إرسال صنف ${i+1} من ${billItems.length}...`;
                
                await fetch('https://ntfy.sh/ibrahim_pharmacy_2026', { method: 'POST', body: code });
                
                if (i < billItems.length - 1) {
                    await new Promise(r => setTimeout(r, 2000)); // انتظار ثانيتين بين كل كود
                }
            }
            
            playBeep(1500);
            alert("تم إرسال الفاتورة بالكامل للكمبيوتر ✅");
            billItems = [];
            document.getElementById('count').innerText = "0";
            btn.style.display = 'none';
            btn.disabled = false;
            btn.innerText = "📤 إرسال الفاتورة للكمبيوتر";
            document.getElementById('result').innerText = "جاهز للمسح القادم...";
        }

        let html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 20, qrbox: {width: 280, height: 150} });
        html5QrcodeScanner.render(onScanSuccess);

        async function toggleFlash() {
            const video = document.querySelector('video');
            if (!video || !video.srcObject) return;
            track = video.srcObject.getVideoTracks()[0];
            if (track && track.getCapabilities().torch) {
                isFlashOn = !isFlashOn;
                await track.applyConstraints({ advanced: [{ torch: isFlashOn }] });
                document.getElementById('flash-btn').innerText = isFlashOn ? "❌ إطفاء" : "🔦 كشاف";
            }
        }
    </script>
</body>
</html>
