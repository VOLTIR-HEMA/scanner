<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ibrahim Pro Scanner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #000; color: white; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* Top Bar */
        .top-bar { display: flex; justify-content: space-around; padding: 8px; background: #1a1a1a; border-bottom: 1px solid #333; }
        .top-bar button { background: #333; color: white; border: 1px solid #555; padding: 6px 12px; border-radius: 6px; font-size: 0.75em; }
        .top-bar button.active { background: #ffcc00; color: #000; font-weight: bold; }
        
        /* Scanner Container */
        #reader { width: 100% !important; max-width: 500px; margin: 0 auto; border: none !important; min-height: 250px; background: #111; }
        
        /* Compact Result Box */
        .result-box { margin: 5px 10px; padding: 10px; background: #111; border-radius: 8px; color: #00ff00; font-size: 0.9em; border: 1px solid #222; }

        /* Shortcuts Area */
        #dynamic-buttons { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; padding: 10px; }
        .custom-btn { padding: 12px 16px; border-radius: 10px; border: 1px solid #fff; color: white; font-weight: bold; font-size: 0.85em; min-width: 85px; }
        
        .send-all-btn { background: #28a745; color: white; padding: 15px; width: 90%; margin: 10px auto; border-radius: 10px; display: none; font-weight: bold; border: none; }

        /* Settings Modal */
        #settings-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; overflow-y: auto; }
        .modal-content { background: #222; width: 85%; margin: 20px auto; padding: 20px; border-radius: 15px; text-align: left; }
        .setting-row { background: #333; padding: 10px; margin-bottom: 10px; border-radius: 8px; display: flex; flex-direction: column; gap: 5px; }
        input { padding: 10px; border-radius: 5px; border: none; margin-bottom: 5px; }
        .cam-control { background: #007bff; color: white; padding: 15px; border-radius: 10px; width: 100%; border: none; font-weight: bold; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <button onclick="toggleSettings(true)">⚙️ Settings</button>
        <button id="flash-btn" onclick="toggleFlash()">🔦 Flash</button>
        <button id="billModeBtn" onclick="toggleBillMode()">📑 Bill: OFF</button>
    </div>

    <div id="reader"></div>

    <div id="result" class="result-box">Waiting for Scanner...</div>
    
    <button id="sendAllBtn" class="send-all-btn" onclick="sendFullBill()">📤 Send Bill (<span id="count">0</span>)</button>

    <div id="dynamic-buttons"></div>

    <div id="settings-modal">
        <div class="modal-content">
            <h2 style="color:#007bff">Camera Control</h2>
            <button class="cam-control" onclick="startManualScanner()">📸 Start / Switch Camera</button>
            
            <hr style="border:0.5px solid #444; margin: 20px 0;">
            
            <h3>⚙️ Shortcut Buttons</h3>
            <div id="settings-list"></div>
            <button onclick="addNewButtonSetting()" style="background:#444; color:white; width:100%; padding:10px; border-radius:8px; margin-top:5px; border:1px dashed #777;">➕ Add New Button</button>
            
            <div style="display:flex; gap:10px; margin-top:25px;">
                <button onclick="saveSettings()" style="background:#28a745; color:white; flex:2; padding:15px; border-radius:10px; border:none; font-weight:bold;">Save & Close</button>
                <button onclick="toggleSettings(false)" style="background:#555; color:white; flex:1; padding:15px;
