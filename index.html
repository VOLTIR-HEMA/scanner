<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Just Scan Professional - Ibrahim Edition</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #3d60cc; --bg: #000; --panel: #111; --text: #fff; --success: #28a745; --danger: #ef4444; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background: var(--bg); color: var(--text); margin: 0; padding: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        .top-bar { display: flex; justify-content: space-around; align-items: center; padding: 10px; background: #1a1a1a; border-bottom: 1px solid #333; sticky; top: 0; z-index: 1000; }
        .top-bar button { background: #333; color: white; border: 1px solid #555; padding: 8px 12px; border-radius: 8px; font-size: 0.8em; cursor: pointer; transition: 0.3s; }
        .top-bar button:active { transform: scale(0.9); background: var(--primary); }

        #reader { width: 100% !important; max-width: 500px; margin: 10px auto; border: 2px solid #222 !important; border-radius: 12px; overflow: hidden; background: #000; position: relative; }
        #reader__dashboard_section_csr button { background: var(--primary) !important; color: white !important; border: none !important; padding: 10px 20px !important; border-radius: 8px !important; margin: 10px !important; font-weight: bold !important; text-transform: uppercase; }
        
        .result-box { margin: 10px; padding: 12px; background: var(--panel); border-radius: 10px; color: #00ff00; font-family: monospace; font-size: 0.9em; border: 1px solid #333; min-height: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        
        #dynamic-buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 10px; }
        .custom-btn { padding: 15px 5px; border-radius: 8px; border: 1px solid #444; color: white; font-weight: bold; font-size: 0.8em; text-align: center; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.2s; }
        .custom-btn:active { background: #555 !important; }

        #bill-panel { display: none; background: var(--panel); padding: 15px; border: 1px solid #333; margin: 10px; border-radius: 15px; animation: slideDown 0.3s ease; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .slot-card { background: #1a1a1a; border: 1px solid #333; padding: 12px; border-radius: 10px; margin-bottom: 10px; text-align: right; }
        .slot-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px solid #222; padding-bottom: 5px; }
        .slot-btns { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 5px; }
        .slot-btns button { padding: 8px; border: none; border-radius: 6px; font-weight: bold; color: white; cursor: pointer; }

        #settings-modal, #keyboard-modal, #lock-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 5000; overflow-y: auto; padding-top: 20px; }
        .modal-content { background: #1a1a1a; width: 90%; max-width: 400px; margin: 0 auto; padding: 20px; border-radius: 20px; border: 1px solid #333; box-shadow: 0 0 20px var(--primary); }
        
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; background: #000; color: #0f0; border: 1px solid #333; border-radius: 8px; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0a0a0a; z-index: 4000; display: none; align-items: center; justify-content: center; flex-direction: column; }
    </style>
</head>
<body>

<div id="lock-screen">
    <div class="modal-content" style="text-align: center;">
        <h1 style="color: var(--danger);">⚠️ توقف الاشتراك</h1>
        <p id="lock-msg"></p>
        <a id="wa-link" href="#" class="btn-main" style="background: #25d366; text-decoration: none; display: block;">تواصل مع إبراهيم للتفعيل 💬</a>
    </div>
</div>

<div id="auth-overlay">
    <h1 style="color: var(--primary); margin-bottom: 5px;">Just Scan</h1>
    <p style="color: #666;">نظام الربط السحابي الذكي</p>
    <button onclick="toggleSettings(true)" class="btn-main" style="background: var(--primary); width: 200px;">تسجيل الدخول</button>
</div>

<div class="top-bar">
    <button onclick="toggleSettings(true)">⚙️ الإعدادات</button>
    <button id="flash-btn" onclick="toggleFlash()">🔦 فلاش</button>
    <button onclick="openKeyboardModal()">⌨️ كيبورد</button>
    <button onclick="toggleBillPanel()" style="background: var(--primary) !important;">📑 الفواتير</button>
</div>

<div id="bill-panel">
    <h3 style="margin-top:0;">📋 إدارة الفواتير المؤقتة</h3>
    <div id="slots-container"></div>
</div>

<div id="reader"></div>
<div id="result" class="result-box">في انتظار المسح الضوئي...</div>
<div id="dynamic-buttons"></div>

<div id="settings-modal">
    <div class="modal-content">
        <h3 style="color: var(--primary); text-align: center;">⚙️ الإعدادات والبروفايل</h3>
        <div id="auth-section">
            <div id="logged-in-view" style="display:none;"></div>
            <div id="logged-out-view">
                <input type="text" id="u-name" placeholder="الاسم الكامل">
                <input type="tel" id="u-phone" placeholder="رقم الموبايل">
                <input type="text" id="u-activity" placeholder="نوع النشاط التجاري">
                <input type="password" id="u-pass" placeholder="كلمة المرور">
                <div style="display:flex; gap:10px;">
                    <button onclick="handleAuth('login')" style="flex:1; background:#333; color:white;" class="btn-main">دخول</button>
                    <button onclick="handleAuth('register')" style="flex:1; background:var(--primary); color:white;" class="btn-main">تسجيل</button>
                </div>
            </div>
        </div>
        <hr style="border:0; border-top:1px solid #333; margin:20px 0;">
        <div id="settings-list"></div>
        <button onclick="addNewButtonSetting()" class="btn-main" style="background:#444;">➕ إضافة زر تحكم</button>
        <button onclick="saveSettings()" class="btn-main" style="background:var(--success);">حفظ كل التغييرات</button>
        <button onclick="toggleSettings(false)" class="btn-main" style="background:#222;">إغلاق</button>
    </div>
</div>

<div id="keyboard-modal">
    <div class="modal-content">
        <h4 style="color: var(--primary); margin-top:0;">⌨️ إدخال يدوي مستمر</h4>
        <input type="text" id="manual-input" placeholder="اكتب أو امسح هنا..." onkeypress="if(event.key==='Enter') submitManualInput()">
        <div class="slot-btns">
            <button onclick="submitManualInput()" style="background: var(--success);">إرسال</button>
            <button onclick="masterSend('enter')" style="background: var(--primary);">Enter</button>
            <button onclick="closeKeyboardModal()" style="background: #444;">إغلاق</button>
        </div>
    </div>
</div>

<script>
    const SERVER_URL = 'https://round-resonance-b6f1.voltir-f.workers.dev';
    let lastScanTime = 0, isFlashOn = false, activeSlot = null, html5QrCode = null;

    let slotsData = JSON.parse(localStorage.getItem('v_slots')) || Array(10).fill().map(() => []);
    let slotsNames = JSON.parse(localStorage.getItem('v_slots_names')) || Array(10).fill().map((_, i) => `فاتورة ${i + 1}`);
    let buttons = JSON.parse(localStorage.getItem('userButtons')) || [
        { name: "جديد", cmd: "f8", useEnter: true, color: "#3d60cc" },
        { name: "حفظ", cmd: "f9", useEnter: true, color: "#28a745" },
        { name: "حذف", cmd: "f12", useEnter: false, color: "#ef4444" }
    ];

    async function handleAuth(action) {
        const phone = document.getElementById('u-phone').value, pass = document.getElementById('u-pass').value;
        const name = document.getElementById('u-name').value, activity = document.getElementById('u-activity').value;
        try {
            const res = await fetch(SERVER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action, phone, password: pass, name, activity, fingerprint: navigator.userAgent })
            });
            const data = await res.json();
            if (res.ok) {
                localStorage.setItem('v_phone', phone);
                localStorage.setItem('v_pass', pass);
                localStorage.setItem('v_name', data.name);
                localStorage.setItem('v_expiry', data.expiryDate);
                location.reload();
            } else alert(data.error);
        } catch (e) { alert("خطأ في الاتصال بالسيرفر"); }
    }

    function updateAuthUI() {
        const phone = localStorage.getItem('v_phone'), name = localStorage.getItem('v_name');
        const expiry = localStorage.getItem('v_expiry'), view = document.getElementById('logged-in-view');
        if (phone) {
            document.getElementById('logged-out-view').style.display = 'none';
            view.style.display = 'block';
            let days = Math.ceil((expiry - Date.now()) / 86400000);
            view.innerHTML = `<div style="text-align:right; font-size:0.9em; line-height:1.6;">
                <p>👤 التاجر: ${name}</p>
                <p>⏳ الصلاحية: <span style="color:${days>3?'#0f0':'#f00'}">${days} يوم</span></p>
                <button onclick="userLogout()" style="background:#500; color:#fff; border:none; padding:8px; border-radius:5px; width:100%;">تسجيل خروج</button>
            </div>`;
        }
    }

    function masterSend(text) {
        const phone = localStorage.getItem('v_phone');
        if (!phone) return;
        // إرسال عبر ntfy للربط مع الكمبيوتر
        fetch(`https://ntfy.sh/voltir_${phone}`, { method: 'POST', body: text });
    }

    function onScanSuccess(decodedText) {
        if (Date.now() - lastScanTime < 1500) return;
        lastScanTime = Date.now();
        
        // اهتزاز خفيف عند المسح
        if (navigator.vibrate) navigator.vibrate(50);

        if (activeSlot !== null) {
            if (slotsData[activeSlot].length >= 20) { alert("الفاتورة ممتلئة!"); return; }
            slotsData[activeSlot].push(decodedText);
            localStorage.setItem('v_slots', JSON.stringify(slotsData));
            renderSlots();
            document.getElementById('result').innerText = `تمت الإضافة للفاتورة: ${decodedText}`;
        } else {
            masterSend(decodedText + '_ent');
            document.getElementById('result').innerText = `تم الإرسال المباشر: ${decodedText}`;
        }
    }

    // --- تشغيل الكاميرا الخلفية تلقائياً وبدون تدخل ---
    function startCameraDirectly() {
        if (!localStorage.getItem('v_phone')) return;
        
        html5QrCode = new Html5Qrcode("reader");
        const config = { fps: 20, qrbox: { width: 250, height: 180 } };
        
        // إجبار الكاميرا الخلفية باستخدام facingMode
        html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
        .catch(err => {
            console.log("fallback to scanner render");
            // لو فشل الـ direct start، نستخدم الـ Scanner العادي كخطة بديلة
            const scanner = new Html5QrcodeScanner("reader", { fps: 20, qrbox: 250 });
            scanner.render(onScanSuccess);
        });
    }

    window.onload = () => {
        if (!localStorage.getItem('v_phone')) {
            document.getElementById('auth-overlay').style.display = 'flex';
        } else {
            startCameraDirectly();
            checkExpiry();
        }
        renderButtons();
        updateAuthUI();
    };

    function checkExpiry() {
        const expiry = localStorage.getItem('v_expiry');
        if (expiry && Date.now() > expiry) {
            if (html5QrCode) html5QrCode.stop();
            document.getElementById('lock-screen').style.display = 'flex';
            document.getElementById('lock-msg').innerText = `انتهى اشتراكك يا ${localStorage.getItem('v_name')}`;
            document.getElementById('wa-link').href = `https://wa.me/201147534998?text=تجديد_${localStorage.getItem('v_phone')}`;
        }
    }

    function renderButtons() {
        const container = document.getElementById('dynamic-buttons');
        container.innerHTML = '';
        buttons.forEach((btn, index) => {
            const b = document.createElement('button');
            b.className = 'custom-btn';
            b.style.backgroundColor = btn.color || '#333';
            b.innerHTML = `<span>${btn.name}</span><small style="font-size:0.6em; opacity:0.7;">${btn.cmd}</small>`;
            b.onclick = () => {
                masterSend(btn.cmd);
                if (btn.useEnter) setTimeout(() => masterSend('enter'), 350);
            };
            container.appendChild(b);
        });
    }

    function renderSlots() {
        const container = document.getElementById('slots-container');
        if (!container) return;
        container.innerHTML = '';
        slotsData.forEach((items, index) => {
            const div = document.createElement('div');
            div.className = 'slot-card';
            if(activeSlot === index) div.style.borderColor = 'var(--primary)';
            div.innerHTML = `
                <div class="slot-header">
                    <strong>${slotsNames[index]}</strong>
                    <span>(${items.length}) صنف</span>
                </div>
                <div class="slot-btns">
                    <button onclick="activateSlot(${index})" style="background:${activeSlot===index?'var(--danger)':'#444'}">
                        ${activeSlot===index?'إيقاف':'تسجيل'}
                    </button>
                    <button onclick="sendSlot(${index})" style="background:var(--success)">إرسال</button>
                    <button onclick="clearSlot(${index})" style="background:#600">مسح</button>
                </div>`;
            container.appendChild(div);
        });
    }

    function activateSlot(i) { activeSlot = (activeSlot === i) ? null : i; renderSlots(); }
    
    async function sendSlot(index) {
        const items = slotsData[index];
        if (!items.length) return;
        for (let item of items) {
            masterSend(item + '_ent');
            await new Promise(r => setTimeout(r, 800));
        }
        alert("تم إرسال الفاتورة بنجاح");
    }

    function clearSlot(index) { if(confirm("حذف محتوى الفاتورة؟")) { slotsData[index]=[]; localStorage.setItem('v_slots', JSON.stringify(slotsData)); renderSlots(); } }
    function toggleBillPanel() { const p = document.getElementById('bill-panel'); p.style.display = p.style.display === 'none' ? 'block' : 'none'; if(p.style.display==='block') renderSlots(); }
    function toggleSettings(s) { document.getElementById('settings-modal').style.display = s ? 'block' : 'none'; if(s) renderSettingsList(); }
    function openKeyboardModal() { document.getElementById('keyboard-modal').style.display = 'block'; document.getElementById('manual-input').focus(); }
    function closeKeyboardModal() { document.getElementById('keyboard-modal').style.display = 'none'; }
    function submitManualInput() { const i = document.getElementById('manual-input'); if(i.value) { masterSend(i.value + '_ent'); i.value=''; } }
    
    function renderSettingsList() {
        const list = document.getElementById('settings-list'); list.innerHTML = '';
        buttons.forEach((btn, index) => {
            const row = document.createElement('div');
            row.style = "background:#222; padding:10px; margin-bottom:5px; border-radius:8px;";
            row.innerHTML = `<input type="text" value="${btn.name}" oninput="buttons[${index}].name=this.value" style="width:30%; margin:0">
                             <input type="text" value="${btn.cmd}" oninput="buttons[${index}].cmd=this.value" style="width:30%; margin:0">
                             <input type="color" value="${btn.color}" oninput="buttons[${index}].color=this.value" style="width:15%; height:40px; padding:2px; margin:0">
                             <button onclick="buttons.splice(${index},1);renderSettingsList()" style="background:red; color:white; border:none; padding:10px; border-radius:5px;">X</button>`;
            list.appendChild(row);
        });
    }
    function addNewButtonSetting() { buttons.push({name:"جديد", cmd:"f1", useEnter:true, color:"#3d60cc"}); renderSettingsList(); }
    function saveSettings() { localStorage.setItem('userButtons', JSON.stringify(buttons)); renderButtons(); toggleSettings(false); }
    function userLogout() { if(confirm("خروج؟")) { localStorage.clear(); location.reload(); } }
    
    async function toggleFlash() {
        try {
            const video = document.querySelector('video');
            const track = video.srcObject.getVideoTracks()[0];
            isFlashOn = !isFlashOn;
            await track.applyConstraints({ advanced: [{ torch: isFlashOn }] });
        } catch (e) { alert("الفلاش غير متاح في هذا الوضع"); }
    }
</script>
</body>
</html>
