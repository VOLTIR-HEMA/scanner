<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ibrahim Scanner Pro</title>

    <style>
        body { font-family: sans-serif; text-align: center; background: #000; color: white; margin: 0; padding: 0; overflow-x: hidden; }
        .top-bar { display: flex; justify-content: space-around; align-items: center; background: #1a1a1a; padding: 5px; border-bottom: 1px solid #333; }
        .top-bar button { background: #333; color: white; border: 1px solid #555; padding: 6px 10px; border-radius: 6px; font-size: 0.75em; }
        .top-bar button.active { background: #ffcc00; color: #000; font-weight: bold; }
        #reader { width: 100%; max-width: 400px; margin: 5px auto; border-radius: 10px; overflow: hidden; border: 1px solid #28a745; height: 180px !important; }
        .result-box { margin: 5px 10px; padding: 5px; background: #111; border-radius: 5px; color: #00ff00; font-size: 0.85em; border: 1px solid #333; min-height: 20px; }
        #dynamic-buttons { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; padding: 5px; }
        .custom-btn { padding: 8px 12px; border-radius: 6px; border: 1px solid #fff; color: white; font-weight: bold; font-size: 0.8em; min-width: 70px; }
        .send-all-btn { background: #28a745; color: white; padding: 10px; width: 90%; margin: 5px auto; border-radius: 8px; display: none; font-weight: bold; border: none; }
        #settings-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; overflow-y: auto; }
        .modal-content { background: #222; width: 85%; margin: 15px auto; padding: 15px; border-radius: 12px; text-align: left; }
        .setting-row { background: #333; padding: 10px; margin-bottom: 8px; border-radius: 8px; display: flex; flex-direction: column; gap: 5px; }
        input { padding: 8px; border-radius: 4px; border: none; }
    </style>
</head>
<body>

    <div class="top-bar">
        <button onclick="toggleSettings(true)">⚙️ Settings</button>
        <button id="flash-btn" onclick="toggleFlash()">🔦 Flash</button>
        <button id="billModeBtn" onclick="toggleBillMode()">📑 Bill: OFF</button>
    </div>

    <div id="reader"></div>

    <div id="result" class="result-box">Ready...</div>
    
    <button id="sendAllBtn" class="send-all-btn" onclick="sendFullBill()">📤 Send Full Bill (<span id="count">0</span>)</button>

    <div id="dynamic-buttons"></div>

    <div id="settings-modal">
        <div class="modal-content">
            <h3>⚙️ Button Config</h3>
            <div id="settings-list"></div>
            <button onclick="addNewButtonSetting()" style="background:#007bff; color:white; width:100%; padding:10px; border-radius:8px; margin-top:5px; border:none;">➕ Add New Button</button>
            <div style="display:flex; gap:10px; margin-top:15px;">
                <button onclick="saveSettings()" style="background:#28a745; color:white; flex:2; padding:12px; border-radius:8px; border:none; font-weight:bold;">Save</button>
                <button onclick="toggleSettings(false)" style="background:#555; color:white; flex:1; padding:12px; border-radius:8px; border:none;">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        let buttons = JSON.parse(localStorage.getItem('userButtons')) || [
            { name: "Add", cmd: "f8", useEnter: true, color: "#007bff" },
            { name: "Save", cmd: "f9", useEnter: true, color: "#28a745" }
        ];

        let isBillMode = false;
        let billItems = [];
        let lastScanTime = 0;
        let isFlashOn = false;
        let html5QrCode = null;

        function renderButtons() {
            const container = document.getElementById('dynamic-buttons');
            container.innerHTML = '';
            buttons.forEach((btn, index) => {
                const b = document.createElement('button');
                b.className = 'custom-btn';
                b.style.backgroundColor = btn.color || '#444';
                b.innerText = btn.name;
                b.onclick = () => sendCommand(btn.cmd, btn.useEnter);
                container.appendChild(b);
            });
        }

            const res = document.getElementById('result');
            res.innerText = `Sent: ${cmd}`;
            await fetch('https://ntfy.sh/ibrahim_pharmacy_2026', { method: 'POST', body: cmd });

                await new Promise(r => setTimeout(r, 800));
                await fetch('https://ntfy.sh/ibrahim_pharmacy_2026', { method: 'POST', body: 'enter' });
            }
        }
