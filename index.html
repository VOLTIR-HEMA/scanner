<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ibrahim Scanner Pro</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #000; color: white; margin: 0; padding: 0; overflow-x: hidden; }
        .top-bar { display: flex; justify-content: space-around; padding: 8px; background: #1a1a1a; border-bottom: 1px solid #333; }
        .top-bar button { background: #333; color: white; border: 1px solid #555; padding: 8px 12px; border-radius: 8px; font-size: 0.8em; }
        
        /* الكاميرا تظهر هنا فوراً */
        #reader { width: 100% !important; max-width: 500px; margin: 0 auto; border: none !important; min-height: 280px; background: #111; }
        
        /* إخفاء أزرار التحكم الأصلية للمكتبة في الصفحة الرئيسية */
        #reader__dashboard { display: none !important; }

        .result-box { margin: 5px 10px; padding: 10px; background: #111; border-radius: 8px; color: #00ff00; font-size: 0.9em; border: 1px solid #222; }
        #dynamic-buttons { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; padding: 10px; }
        .custom-btn { padding: 12px 16px; border-radius: 10px; border: 1px solid #fff; color: white; font-weight: bold; min-width: 85px; }
        
        #settings-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; overflow-y: auto; }
        .modal-content { background: #222; width: 85%; margin: 20px auto; padding: 20px; border-radius: 15px; text-align: left; }
        .setting-row { background: #333; padding: 10px; margin-bottom: 10px; border-radius: 8px; display: flex; flex-direction: column; }
        input { padding: 10px; border-radius: 5px; border: none; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <button onclick="toggleSettings(true)">⚙️ Settings</button>
        <button id="flash-btn" onclick="toggleFlash()">🔦 Flash</button>
        <button id="billModeBtn" onclick="toggleBillMode()">📑 Bill: OFF</button>
    </div>

    <div id="reader"></div>

    <div id="result" class="result-box">Initializing Scanner...</div>
    
    <div id="dynamic-buttons"></div>

    <div id="settings-modal">
        <div class="modal-content">
            <h2 style="color:#007bff; margin-top:0;">Camera Controls</h2>
            <div id="camera-management" style="background:#111; padding:10px; border-radius:10px; margin-bottom:20px;">
                <p style="font-size:0.8em; color:#888;">Switch camera or re-scan if needed:</p>
                <div id="settings-scanner-ui"></div>
            </div>

            <hr style="border:0.5px solid #444; margin: 15px 0;">
            <h3>⚙️ Buttons Config</h3>
            <div id="settings-list"></div>
            <button onclick="addNewButtonSetting()" style="background:#444; color:white; width:100%; padding:10px; border-radius:8px; border:1px dashed #777;">➕ Add New Button</button>
            
            <div style="display:flex; gap:10px; margin-top:25px;">
                <button onclick="saveSettings()" style="background:#28a745; color:white; flex:2; padding:15px; border-radius:10px; border:none; font-weight:bold;">Save & Close</button>
                <button onclick="toggleSettings(false)" style="background:#555; color:white; flex:1; padding:15px; border-radius:10px; border:none;">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        let buttons = JSON.parse(localStorage.getItem('userButtons')) || [
            { name: "Add", cmd: "f8", useEnter: true, color: "#007bff" },
            { name: "Save", cmd: "f9", useEnter: true, color: "#28a745" }
        ];

        let isBillMode = false;
        let lastScanTime = 0;
        let isFlashOn = false;
        let mainScanner = null;

        function renderButtons() {
            const container = document.getElementById('dynamic-buttons');
            container.innerHTML = '';
            buttons.forEach((btn, index) => {
                const b = document.createElement('button');
                b.className = 'custom-btn';
                b.style.backgroundColor = btn.color || '#444';
                b.innerText = btn.name;
                b.onclick = () => sendCommand(btn.cmd, btn.useEnter);
                container.appendChild(b);
            });
        }

        async function sendCommand(cmd, useEnter) {
            document.getElementById('result').innerText = `Sent: ${cmd}`;
            await fetch('https://ntfy.sh/ibrahim_pharmacy_2026', { method: 'POST', body: cmd });
            if (useEnter) {
                await new Promise(r => setTimeout(r, 600));
                await fetch('https://ntfy.sh/ibrahim_pharmacy_2026', { method: 'POST', body: 'enter' });
            }
        }

        function onScanSuccess(text) {
            if (Date.now() - lastScanTime < 2500) return;
            lastScanTime = Date.now();
            document.getElementById('result').innerText = "Scanned: " + text;
            // إرسال مع علامة _ent ليقوم البايثون بضغط انتر تلقائي في الوضع العادي
            fetch('https://ntfy.sh/ibrahim_pharmacy_2026', { method: 'POST', body: text + '_ent' });
        }

        function toggleSettings(show) { 
            document.getElementById('settings-modal').style.display = show ? 'block' : 'none'; 
            if(show) {
                renderSettingsList();
                // إظهار لوحة التحكم في الكاميرا داخل الإعدادات فقط
                document.getElementById('reader__dashboard').style.display = 'block';
                document.getElementById('camera-management').appendChild(document.getElementById('reader__dashboard'));
            } else {
                // إخفاء اللوحة عند الخروج
                document.getElementById('reader__dashboard').style.display = 'none !important';
            }
        }

        function renderSettingsList() {
            const list = document.getElementById('settings-list');
            list.innerHTML = '';
            buttons.forEach((btn, index) => {
                list.innerHTML += `<div class="setting-row">
                    <input type="text" value="${btn.name}" oninput="updateBtn(${index}, 'name', this.value)">
                    <input type="text" value="${btn.cmd}" oninput="updateBtn(${index}, 'cmd', this.value)">
                    <label style="font-size:0.8em;"><input type="checkbox" ${btn.useEnter ? 'checked' : ''} onchange="updateBtn(${index}, 'useEnter', this.checked)"> + Enter Key?</label>
                    <button onclick="removeBtn(${index})" style="background:red; color:white; border:none; padding:5px; border-radius:5px; margin-top:5px;">Remove</button>
                </div>`;
            });
        }
        function updateBtn(i, k, v) { buttons[i][k] = v; }
        function addNewButtonSetting() { buttons.push({ name: "New", cmd: "f1", useEnter: false }); renderSettingsList(); }
        function removeBtn(i) { buttons.splice(i, 1); renderSettingsList(); }
        function saveSettings() { localStorage.setItem('userButtons', JSON.stringify(buttons)); renderButtons(); toggleSettings(false); }

        window.onload = () => {
            renderButtons();
            // تشغيل الكاميرا في الصفحة الرئيسية تلقائياً
            mainScanner = new Html5QrcodeScanner("reader", { fps: 20, qrbox: 250 });
            mainScanner.render(onScanSuccess);
            document.getElementById('result').innerText = "Scanner Ready ✅";
        };
    </script>
</body>
</html>
