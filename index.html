<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>just scan</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #000; color: white; margin: 0; padding: 10px; }
        #reader { width: 100%; max-width: 500px; margin: auto; border-radius: 15px; border: 2px solid #28a745; overflow: hidden; background: #111; }
        .result-box { margin-top: 20px; padding: 15px; background: #1e1e1e; border-radius: 10px; color: #00ff00; font-size: 1.3em; font-weight: bold; }
    </style>
</head>
<body>
    <h3 style="margin-bottom: 15px;">سكانر الصيدلية 🚀</h3>
    <div id="reader"></div>
    <div id="result" class="result-box">في انتظار الدواء...</div>

    <script>
        // نغمة "بيب" قوية ومسموعة
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playBeep() {
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.type = 'square'; // صوت خشن وواضح
            oscillator.frequency.setValueAtTime(1200, audioCtx.currentTime); 
            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime); // رفع الصوت
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.15);
        }

        let lastScanTime = 0;
        const COOLDOWN = 3000; // 3 ثواني انتظار بين كل علبة والتانية

        function onScanSuccess(decodedText) {
            const now = Date.now();
            // لو المسحة دي حصلت في أقل من 3 ثواني من اللي قبلها.. طنشها
            if (now - lastScanTime < COOLDOWN) return;

            lastScanTime = now; // سجل وقت المسحة دي
            playBeep();
            if (navigator.vibrate) navigator.vibrate(100);

            document.getElementById('result').innerText = "تم الإرسال: " + decodedText;
            
            // الإرسال للكمبيوتر
            fetch('https://ntfy.sh/ibrahim_pharmacy_2026', { method: 'POST', body: decodedText });
        }

        // نفس إعدادات الكاميرا اللي اشتغلت معاك أول مرة بالظبط
        let html5QrcodeScanner = new Html5QrcodeScanner(
            "reader", { fps: 20, qrbox: {width: 300, height: 150} }
        );
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
