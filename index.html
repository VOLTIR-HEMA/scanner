<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Just Scan Pro - Ibrahim Edition</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #000; color: white; margin: 0; padding: 0; overflow: hidden; }
        
        /* البار العلوي - 6 أزرار متساوية */
        .top-bar { 
            display: grid; 
            grid-template-columns: repeat(6, 1fr); 
            gap: 2px; 
            padding: 5px; 
            background: #1a1a1a; 
            border-bottom: 1px solid #333; 
        }
        .top-bar button { 
            background: #333; color: white; border: 1px solid #444; 
            padding: 10px 0; border-radius: 4px; font-size: 0.65em; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .top-bar button.active { background: #ffcc00; color: #000; font-weight: bold; border-color: #fff; }

        /* منطقة الكاميرا */
        #reader { width: 100% !important; max-width: 500px; margin: 0 auto; background: #000; min-height: 300px; border-bottom: 1px solid #222; }
        
        .result-box { margin: 10px; padding: 12px; background: #111; border-radius: 8px; color: #00ff00; font-size: 0.9em; border: 1px solid #222; min-height: 25px; }
        
        #dynamic-buttons { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; padding: 10px; }
        .custom-btn { padding: 15px 2px; border-radius: 8px; border: 1px solid #444; color: white; font-weight: bold; font-size: 0.8em; cursor: pointer; }

        .send-all-btn { background: #28a745 !important; color: white; padding: 15px; width: 90%; margin: 10px auto; border-radius: 10px; display: none; font-weight: bold; border: none; font-size: 1.1em; }
        
        /* الإعدادات */
        #settings-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; overflow-y: auto; }
        .modal-content { background: #222; width: 90%; margin: 20px auto; padding: 15px; border-radius: 15px; text-align: left; }
        .setting-row { background: #333; padding: 10px; margin-bottom: 10px; border-radius: 8px; display: flex; flex-direction: column; }
        input[type="text"] { padding: 10px; border-radius: 5px; border: 1px solid #555; background: #111; color: #fff; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <button onclick="toggleSettings(true)">⚙️<br>ضبط</button>
        <button onclick="openKeyboard()">⌨️<br>كيبورد</button>
        <button onclick="toggleFullScreen()">📺<br>شاشة</button>
        <button id="flash-btn" onclick="toggleFlash()">🔦<br>فلاش</button>
        <button onclick="switchCamera()">🔄<br>كاميرا</button>
        <button id="billModeBtn" onclick="toggleBillMode()">📑<br>فاتورة</button>
    </div>

    <div id="reader"></div>
    <div id="result" class="result-box">جاهز يا إبراهيم...</div>
    
    <button id="sendAllBtn" class="send-all-btn" onclick="sendFullBill()">📤 إرسال الفاتورة (<span id="count">0</span>)</button>
    
    <div id="dynamic-buttons"></div>

    <div id="settings-modal">
        <div class="modal-content">
            <h3 style="color: #ffcc00; margin-top:0;">⚙️ إعدادات الأزرار</h3>
            <div id="settings-list"></div>
            <button onclick="addNewButtonSetting()" style="background:#444; color:white; width:100%; padding:10px; border-radius:8px; border: 1px dashed #777;">➕ إضافة زر</button>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button onclick="saveSettings()" style="background:#28a745; color:white; flex:2; padding:15px; border-radius:10px; border:none; font-weight:bold;">حفظ</button>
                <button onclick="toggleSettings(false)" style="background:#555; color:white; flex:1; padding:15px; border-radius:10px; border:none;">إغلاق</button>
            </div>
        </div>
    </div>

    <script>
        let buttons = JSON.parse(localStorage.getItem('userButtons')) || [
            { name: "Add", cmd: "f8", useEnter: true, color: "#007bff" },
            { name: "Save", cmd: "f9", useEnter: true, color: "#28a745" },
            { name: "F1", cmd: "f1", useEnter: false, color: "#555" },
            { name: "Tab", cmd: "tab", useEnter: false, color: "#666" },
            { name: "Del", cmd: "delete", useEnter: false, color: "#cc0000" }
        ];

        let isBillMode = false, billItems = [], lastScanTime = 0, isFlashOn = false, html5QrCode, currentCameraId;
        const NTFY_URL = 'https://ntfy.sh/ibrahim_pharmacy_2026';

        function openKeyboard() {
            let text = prompt("أدخل النص المراد إرساله:");
            if (text) {
                fetch(NTFY_URL, { method: 'POST', body: text + '_ent' });
                document.getElementById('result').innerText = "تم إرسال: " + text;
            }
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        }

        function renderButtons() {
            const container = document.getElementById('dynamic-buttons');
            container.innerHTML = '';
            buttons.forEach((btn, index) => {
                const b = document.createElement('button');
                b.className = 'custom-btn';
                b.style.backgroundColor = btn.color || '#444';
                b.innerText = btn.name;
                b.onclick = () => sendCommand(btn.cmd, btn.useEnter);
                container.appendChild(b);
            });
        }

        async function sendCommand(cmd, useEnter) {
            try {
                await fetch(NTFY_URL, { method: 'POST', body: cmd });
                if (useEnter) {
                    await new Promise(r => setTimeout(r, 300));
                    await fetch(NTFY_URL, { method: 'POST', body: 'enter' });
                }
                document.getElementById('result').innerText = "تم إرسال أمر: " + cmd;
            } catch (e) { alert("خطأ في الشبكة"); }
        }

        function onScanSuccess(text) {
            if (Date.now() - lastScanTime < 2000) return;
            lastScanTime = Date.now();
            
            if (isBillMode) {
                billItems.push(text);
                document.getElementById('count').innerText = billItems.length;
                document.getElementById('result').innerText = "📦 تمت الإضافة: " + text;
                document.getElementById('sendAllBtn').style.display = 'block';
            } else {
                fetch(NTFY_URL, { method: 'POST', body: text + '_ent' });
                document.getElementById('result').innerText = "✅ تم الإرسال: " + text;
            }
        }

        function toggleBillMode() {
            isBillMode = !isBillMode;
            const btn = document.getElementById('billModeBtn');
            btn.classList.toggle('active', isBillMode);
            if (!isBillMode) {
                billItems = [];
                document.getElementById('sendAllBtn').style.display = 'none';
                document.getElementById('count').innerText = "0";
            }
            document.getElementById('result').innerText = isBillMode ? "وضع الفاتورة: مفعّل" : "وضع الفاتورة: معطل";
        }

        async function sendFullBill() {
            const btn = document.getElementById('sendAllBtn');
            btn.disabled = true;
            for (let i = 0; i < billItems.length; i++) {
                document.getElementById('result').innerText = `جاري إرسال ${i+1}/${billItems.length}...`;
                await fetch(NTFY_URL, { method: 'POST', body: billItems[i] + '_ent' });
                await new Promise(r => setTimeout(r, 1200));
            }
            btn.style.display = 'none'; btn.disabled = false;
            billItems = [];
            document.getElementById('result').innerText = "تم إرسال الفاتورة بنجاح!";
        }

        async function switchCamera() {
            const devices = await Html5Qrcode.getCameras();
            if (devices && devices.length > 1) {
                let newId = devices.find(d => d.id !== currentCameraId).id;
                startScanner(newId);
            }
        }

        async function toggleFlash() {
            try {
                const track = html5QrCode.getRunningTrack();
                isFlashOn = !isFlashOn;
                await track.applyConstraints({ advanced: [{ torch: isFlashOn }] });
                document.getElementById('flash-btn').classList.toggle('active', isFlashOn);
            } catch (e) { alert("الفلاش غير مدعوم أو الكاميرا مغلقة"); }
        }

        function startScanner(cameraId) {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    initScanner(cameraId);
                });
            } else {
                initScanner(cameraId);
            }
        }

        function initScanner(cameraId) {
            currentCameraId = cameraId;
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start(cameraId, { fps: 15, qrbox: { width: 250, height: 150 } }, onScanSuccess);
        }

        function toggleSettings(show) { 
            document.getElementById('settings-modal').style.display = show ? 'block' : 'none'; 
            if(show) renderSettingsList(); 
        }

        function renderSettingsList() {
            const list = document.getElementById('settings-list');
            list.innerHTML = '';
            buttons.forEach((btn, index) => {
                const row = document.createElement('div');
                row.className = 'setting-row';
                row.innerHTML = `
                    <input type="text" value="${btn.name}" oninput="buttons[${index}].name=this.value">
                    <input type="text" value="${btn.cmd}" oninput="buttons[${index}].cmd=this.value">
                    <label style="font-size:0.8em;"><input type="checkbox" ${btn.useEnter ? 'checked' : ''} onchange="buttons[${index}].useEnter=this.checked"> إرسال Enter؟</label>
                    <button onclick="buttons.splice(${index},1); renderSettingsList()" style="background:red; color:white; border:none; margin-top:5px; padding:5px;">حذف</button>
                `;
                list.appendChild(row);
            });
        }

        function addNewButtonSetting() { buttons.push({ name: "جديد", cmd: "f1", useEnter: false }); renderSettingsList(); }
        function saveSettings() { localStorage.setItem('userButtons', JSON.stringify(buttons)); renderButtons(); toggleSettings(false); }

        window.onload = () => {
            Html5Qrcode.getCameras().then(devices => {
                if (devices && devices.length > 0) {
                    // البدء بالكاميرا الخلفية تلقائياً
                    let backCam = devices.find(d => d.label.toLowerCase().includes('back')) || devices[0];
                    startScanner(backCam.id);
                }
            });
            renderButtons();
        };
    </script>
</body>
</html>
