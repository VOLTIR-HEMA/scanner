<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>سكانر إبراهيم Pro</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #000; color: white; margin: 0; padding: 10px; }
        #reader { width: 100%; max-width: 500px; margin: auto; border-radius: 15px; border: 2px solid #28a745; overflow: hidden; }
        
        /* منطقة الزراير الديناميكية */
        #dynamic-buttons { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin: 15px 0; }
        .custom-btn { padding: 10px 15px; border-radius: 8px; border: 1px solid #fff; color: white; font-weight: bold; cursor: pointer; min-width: 80px; }
        
        .controls { margin: 15px 0; }
        button { cursor: pointer; }
        .result-box { margin-top: 15px; padding: 15px; background: #1e1e1e; border-radius: 10px; color: #00ff00; min-height: 40px; }
        
        /* نافذة الإعدادات */
        #settings-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; overflow-y: auto; padding-top: 20px; }
        .modal-content { background: #222; width: 90%; margin: auto; padding: 20px; border-radius: 15px; text-align: right; }
        .setting-row { border-bottom: 1px solid #444; padding: 10px 0; display: flex; flex-direction: column; gap: 5px; }
        input[type="text"] { padding: 8px; border-radius: 5px; border: none; }
        .save-close-btn { background: #28a745; color: white; padding: 10px 20px; border-radius: 10px; margin-top: 20px; width: 100%; }
        
        #config-btn { background: #666; color: white; padding: 5px 10px; border-radius: 5px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h3>سكانر صيدلية إبراهيم 🚀</h3>
    
    <button id="config-btn" onclick="toggleSettings(true)">⚙️ الإعدادات</button>
    
    <div style="position: relative;">
        <button id="flash-btn" onclick="toggleFlash()" style="position: absolute; top: 5px; right: 5px; z-index: 10; background:rgba(0,0,0,0.5); color:white; border:1px solid #fff; padding:5px; border-radius:5px;">🔦</button>
        <div id="reader"></div>
    </div>

    <div id="dynamic-buttons"></div>

    <div class="controls">
        <button id="billModeBtn" style="background:#555; color:white; padding:10px;" onclick="toggleBillMode()">📑 وضع الفاتورة: مُغلق</button>
    </div>

    <div id="result" class="result-box">جاهز...</div>

    <div id="settings-modal">
        <div class="modal-content">
            <h4>إدارة الأزرار المختصرة</h4>
            <div id="settings-list"></div>
            <button onclick="addNewButtonSetting()" style="background:#007bff; color:white; width:100%; padding:10px; margin-top:10px;">➕ إضافة زر جديد</button>
            <button class="save-close-btn" onclick="saveSettings()">💾 حفظ وإغلاق</button>
        </div>
    </div>

    <script>
        let buttons = JSON.parse(localStorage.getItem('userButtons')) || [
            { name: "إضافة", cmd: "f8", useEnter: true, color: "#007bff" },
            { name: "حفظ", cmd: "f9", useEnter: true, color: "#28a745" }
        ];

        function renderButtons() {
            const container = document.getElementById('dynamic-buttons');
            container.innerHTML = '';
            buttons.forEach((btn, index) => {
                const b = document.createElement('button');
                b.className = 'custom-btn';
                b.style.backgroundColor = btn.color || '#444';
                b.innerText = btn.name;
                b.onclick = () => sendCommand(btn.cmd, btn.useEnter);
                container.appendChild(b);
            });
        }

        async function sendCommand(cmd, useEnter) {
            const res = document.getElementById('result');
            res.innerText = `إرسال أمر: ${cmd}...`;
            await fetch('https://ntfy.sh/ibrahim_pharmacy_2026', { method: 'POST', body: cmd });
            
            if (useEnter) {
                await new Promise(r => setTimeout(r, 1000));
                res.innerText = "إرسال: Enter...";
                await fetch('https://ntfy.sh/ibrahim_pharmacy_2026', { method: 'POST', body: 'enter' });
            }
            res.innerText = "تم التنفيذ ✅";
        }

        function toggleSettings(show) {
            document.getElementById('settings-modal').style.display = show ? 'block' : 'none';
            if (show) renderSettingsList();
        }

        function renderSettingsList() {
            const list = document.getElementById('settings-list');
            list.innerHTML = '';
            buttons.forEach((btn, index) => {
                list.innerHTML += `
                    <div class="setting-row">
                        <input type="text" placeholder="اسم الزر (مثلاً: إضافة)" value="${btn.name}" onchange="updateBtn(${index}, 'name', this.value)">
                        <input type="text" placeholder="الأمر (مثلاً: f8 أو tab)" value="${btn.cmd}" onchange="updateBtn(${index}, 'cmd', this.value)">
                        <label><input type="checkbox" ${btn.useEnter ? 'checked' : ''} onchange="updateBtn(${index}, 'useEnter', this.checked)"> ضغط Enter بعده؟</label>
                        <button onclick="removeBtn(${index})" style="background:red; color:white; border:none; padding:5px; margin-top:5px;">حذف الزر</button>
                    </div>
                `;
            });
        }

        function updateBtn(index, key, value) { buttons[index][key] = value; }
        function addNewButtonSetting() { buttons.push({ name: "جديد", cmd: "f1", useEnter: false, color: "#444" }); renderSettingsList(); }
        function removeBtn(index) { buttons.splice(index, 1); renderSettingsList(); }
        
        function saveSettings() {
            localStorage.setItem('userButtons', JSON.stringify(buttons));
            renderButtons();
            toggleSettings(false);
        }

        // --- كود السكانر الأساسي (بدون تغيير) ---
        let lastScanTime = 0;
        function onScanSuccess(decodedText) {
            if (Date.now() - lastScanTime < 2500) return;
            lastScanTime = Date.now();
            document.getElementById('result').innerText = "تم المسح: " + decodedText;
            fetch('https://ntfy.sh/ibrahim_pharmacy_2026', { method: 'POST', body: decodedText });
        }
        let html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        html5QrcodeScanner.render(onScanSuccess);
        renderButtons();
    </script>
</body>
</html>
