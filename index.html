<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Just Scan Pro - 2026</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --main-bg: #000; --accent: #ffcc00; --btn-bg: #333; }
        body { font-family: sans-serif; text-align: center; background: var(--main-bg); color: white; margin: 0; padding: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        /* الشريط العلوي */
        .top-bar { display: flex; justify-content: space-around; align-items: center; padding: 5px; background: #1a1a1a; border-bottom: 1px solid #333; flex-wrap: wrap; gap: 4px; }
        .top-bar button { background: var(--btn-bg); color: white; border: 1px solid #555; padding: 5px 8px; border-radius: 6px; font-size: 0.7em; cursor: pointer; }
        .top-bar button.active { background: var(--accent); color: #000; font-weight: bold; }

        /* حاوية السكانر والزراير */
        #main-layout { display: flex; flex-direction: column; flex-grow: 1; overflow: hidden; position: relative; }
        
        #reader { width: 100% !important; margin: 0 auto; background: #000; flex-grow: 1; }
        #reader video { object-fit: cover !important; }

        /* وضع اللاندسكيب (الأفقي) */
        @media (orientation: landscape) {
            #main-layout { flex-direction: row; }
            #reader { width: 60% !important; height: 100% !important; }
            #dynamic-buttons { 
                grid-template-columns: repeat(2, 1fr) !important; 
                width: 35%; height: 100%; overflow-y: auto; padding: 10px; 
            }
            .top-bar { padding: 2px; }
        }

        .result-box { padding: 5px; background: #111; color: #00ff00; font-size: 0.8em; border-top: 1px solid #222; }
        
        #dynamic-buttons { 
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; padding: 8px; background: #000;
        }
        .custom-btn { padding: 12px 2px; border-radius: 6px; border: 1px solid #fff; color: white; font-weight: bold; font-size: 0.7em; text-align: center; cursor: pointer; }

        /* مودال الإعدادات */
        #settings-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 3000; overflow-y: auto; }
        .modal-content { background: #222; width: 90%; margin: 10px auto; padding: 15px; border-radius: 15px; text-align: left; }
        .setting-row { background: #333; padding: 10px; margin-bottom: 8px; border-radius: 8px; display: flex; flex-direction: column; gap: 5px; }
        input, select { padding: 10px; border-radius: 5px; border: none; font-size: 1em; }
        
        .hidden-input { position: absolute; opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div class="top-bar">
        <button onclick="toggleSettings(true)">⚙️ Settings</button>
        <button id="flash-btn" onclick="toggleFlash()">🔦 Flash</button>
        <button id="billModeBtn" onclick="toggleBillMode()">📑 Bill: OFF</button>
        <button onclick="focusHiddenInput()">⌨️ Keyboard</button>
        <button onclick="toggleFullScreen()">🖥️ Full</button>
    </div>

    <input type="text" id="hidden-keyboard" class="hidden-input" onkeypress="handleKeyboard(event)">

    <div id="main-layout">
        <div id="reader"></div>
        <div id="dynamic-buttons"></div>
    </div>

    <div id="result" class="result-box">Ready...</div>
    <button id="sendAllBtn" style="display:none; background:#28a745; color:white; padding:10px; width:100%; border:none;" onclick="sendFullBill()">📤 Send Bill (<span id="count">0</span>)</button>

    <div id="settings-modal">
        <div class="modal-content">
            <h3>⚙️ App Settings</h3>
            
            <div class="setting-row">
                <label>🔔 Sound & Vibrate</label>
                <div style="display:flex; gap:10px; align-items:center;">
                    <input type="checkbox" id="sound-toggle" onchange="updatePref('soundOn', this.checked)"> Play Sound
                    <input type="range" id="volume-control" min="0" max="1" step="0.1" onchange="updatePref('volume', this.value)">
                </div>
                <label><input type="checkbox" id="vibrate-toggle" onchange="updatePref('vibrateOn', this.checked)"> Enable Vibrate</label>
            </div>

            <hr style="border:0.5px solid #444">
            <h4>🔘 Custom Buttons</h4>
            <div id="settings-list"></div>
            <button onclick="addNewButtonSetting()" style="background:#444; color:white; width:100%; padding:10px; border-radius:8px; margin-bottom:10px;">➕ Add Button</button>
            
            <div style="display:flex; gap:10px;">
                <button onclick="saveSettings()" style="background:#28a745; color:white; flex:2; padding:15px; border-radius:10px; border:none; font-weight:bold;">SAVE</button>
                <button onclick="toggleSettings(false)" style="background:#555; color:white; flex:1; padding:15px; border-radius:10px; border:none;">CLOSE</button>
            </div>
        </div>
    </div>
