<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Just Scan Pro - Ibrahim</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #000; color: white; margin: 0; padding: 0; overflow: hidden; }
        .top-bar { display: flex; justify-content: space-around; align-items: center; padding: 10px; background: #1a1a1a; border-bottom: 2px solid #333; }
        .top-bar button { background: #333; color: white; border: 1px solid #555; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 0.8em; }
        
        #reader { width: 100% !important; max-width: 500px; margin: auto; background: #000; }
        /* منع أي قلب للصورة برمجياً وبالـ CSS للتأكيد */
        video { transform: scaleX(1) !important; -webkit-transform: scaleX(1) !important; }

        .result-box { margin: 10px; padding: 10px; background: #111; color: #00ff00; border: 1px solid #222; border-radius: 10px; font-size: 0.9em; min-height: 20px; }
        
        #dynamic-buttons { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; padding: 10px; }
        .custom-btn { padding: 15px 2px; border-radius: 8px; border: 1px solid #444; color: white; font-weight: bold; font-size: 0.7em; cursor: pointer; }

        #keyboard-modal { display: none; position: fixed; top: 10px; left: 0; width: 100%; z-index: 3000; justify-content: center; }
        .keyboard-content { background: #111; border: 2px solid #ff0000; border-radius: 15px; padding: 20px; width: 85%; max-width: 350px; box-shadow: 0 5px 30px rgba(255,0,0,0.6); }
        .keyboard-content input { width: 90%; padding: 15px; background: #000; border: 1px solid #444; color: #00ff00; border-radius: 10px; font-size: 1.2em; text-align: center; outline: none; margin-bottom: 15px; }
        .keyboard-btns { display: flex; gap: 10px; }
        .keyboard-btns button { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; color: white; }
    </style>
</head>
<body>

    <div class="top-bar">
        <button id="flash-btn" onclick="toggleFlash()">🔦 Flash</button>
        <button onclick="openKeyboardModal()">⌨️ Keyboard</button>
        <button onclick="location.reload()">🔄 Refresh</button>
    </div>

    <div id="reader"></div>
    <div id="result" class="result-box">في انتظار الكاميرا...</div>
    <div id="dynamic-buttons"></div>

    <div id="keyboard-modal">
        <div class="keyboard-content">
            <h4 style="margin: 0 0 10px 0; color: #ff0000;">إدخال يدوي مباشر</h4>
            <input type="text" id="manual-input" placeholder="اكتب الكود..." onkeypress="if(event.key==='Enter') submitManualInput()">
            <div class="keyboard-btns">
                <button onclick="submitManualInput()" style="background: #28a745;">إرسال</button>
                <button onclick="closeKeyboardModal()" style="background: #444;">إغلاق</button>
            </div>
        </div>
    </div>

    <script>
        const NTFY_URL = 'https://ntfy.sh/ibrahim_pharmacy_2026';
        let html5QrCode;
        let isFlashOn = false;
        let lastScanTime = 0;

        function doVibrate(ms = 100) { if (navigator.vibrate) navigator.vibrate(ms); }

        // وظائف الكيبورد
        function openKeyboardModal() {
            document.getElementById('keyboard-modal').style.display = 'flex';
            setTimeout(() => document.getElementById('manual-input').focus(), 300);
        }
        function closeKeyboardModal() { document.getElementById('keyboard-modal').style.display = 'none'; }

        async function submitManualInput() {
            const input = document.getElementById('manual-input');
            const val = input.value.trim();
            if (val !== "") {
                try {
                    await fetch(NTFY_URL, { method: 'POST', body: val + '_ent' });
                    document.getElementById('result').innerText = "يدوي: " + val;
                    doVibrate(50);
                    input.value = '';
                    input.focus();
                } catch(e) { console.error("Error sending"); }
            }
        }

        function onScanSuccess(decodedText) {
            if (Date.now() - lastScanTime < 2500) return;
            lastScanTime = Date.now();
            doVibrate(100);
            fetch(NTFY_URL, { method: 'POST', body: decodedText + '_ent' });
            document.getElementById('result').innerText = "تم المسح: " + decodedText;
        }

        // تشغيل الكاميرا بإعدادات تمنع الانعكاس
        window.onload = () => {
            html5QrCode = new Html5Qrcode("reader");
            const config = { 
                fps: 20, 
                qrbox: { width: 280, height: 160 },
                disableFlip: true // أهم سطر لمنع الكاميرا من قلب الصورة سيلفي
            };

            // البدء بالكاميرا الخلفية تلقائياً لو أمكن
            html5QrCode.start(
                { facingMode: "environment" }, 
                config, 
                onScanSuccess
            ).catch(err => {
                // لو فشل (زي التابلت اللي فيه كاميرا واحدة) يفتح المتاحة
                html5QrCode.start({ facingMode: "user" }, config, onScanSuccess);
            });

            renderButtons();
        };

        // الفلاش المطور
        async function toggleFlash() {
            try {
                isFlashOn = !isFlashOn;
                await html5QrCode.applyVideoConstraints({
                    advanced: [{ torch: isFlashOn }]
                });
                document.getElementById('flash-btn').innerText = isFlashOn ? "❌ OFF" : "🔦 Flash";
            } catch (e) {
                alert("الفلاش غير متاح حالياً أو الكاميرا لم تعمل بعد");
                isFlashOn = !isFlashOn;
            }
        }

        function renderButtons() {
            const container = document.getElementById('dynamic-buttons');
            const buttons = JSON.parse(localStorage.getItem('userButtons')) || [
                { name: "Add", cmd: "f8" },
                { name: "Save", cmd: "f9" },
                { name: "Tab", cmd: "tab" }
            ];
            container.innerHTML = '';
            buttons.forEach(btn => {
                const b = document.createElement('button');
                b.className = 'custom-btn';
                b.style.background = '#333';
                b.innerText = btn.name;
                b.onclick = async () => {
                    await fetch(NTFY_URL, { method: 'POST', body: btn.cmd });
                    doVibrate(50);
                };
                container.appendChild(b);
            });
        }
    </script>
</body>
</html>
