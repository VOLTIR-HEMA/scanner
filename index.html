<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Just Scan - Clean Build</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; background: #000; color: white; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* البار العلوي - 6 أزرار */
        .top-bar { 
            display: grid; 
            grid-template-columns: repeat(6, 1fr); 
            gap: 4px; 
            padding: 8px; 
            background: #111; 
            border-bottom: 2px solid #333;
        }
        .top-bar button { 
            background: #222; color: #ccc; border: 1px solid #444; 
            padding: 10px 0; border-radius: 6px; font-size: 11px; cursor: pointer;
        }
        .top-bar button.active { background: #ffcc00; color: #000; font-weight: bold; }

        /* منطقة الكاميرا - ثابتة */
        #reader { width: 100%; max-width: 500px; margin: 0 auto; min-height: 280px; background: #000; }
        
        .result-box { margin: 10px; padding: 10px; background: #111; border-radius: 8px; color: #0f0; border: 1px solid #222; font-size: 14px; min-height: 20px; }
        
        /* الأزرار المخصصة تحت */
        #dynamic-buttons { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; padding: 10px; }
        .custom-btn { padding: 15px 2px; border-radius: 8px; border: 1px solid #444; color: white; font-weight: bold; font-size: 12px; cursor: pointer; background: #333; }

        .send-all-btn { background: #28a745; color: white; padding: 15px; width: 92%; margin: 10px auto; border-radius: 10px; display: none; font-weight: bold; border: none; }
        
        /* الإعدادات */
        #settings-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; }
        .modal-content { background: #1a1a1a; width: 85%; margin: 30px auto; padding: 20px; border-radius: 15px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <button onclick="location.reload()">🔄<br>تحديث</button>
        <button onclick="toggleSettings(true)">⚙️<br>ضبط</button>
        <button onclick="openKeyboard()">⌨️<br>كيبورد</button>
        <button id="flash-btn" onclick="toggleFlash()">🔦<br>فلاش</button>
        <button onclick="switchCamera()">🔄<br>كاميرا</button>
        <button id="billModeBtn" onclick="toggleBillMode()">📑<br>فاتورة</button>
    </div>

    <div id="reader"></div>
    <div id="result" class="result-box">جاهز يا إبراهيم...</div>
    
    <button id="sendAllBtn" class="send-all-btn" onclick="sendFullBill()">📤 إرسال الفاتورة (<span id="count">0</span>)</button>
    
    <div id="dynamic-buttons"></div>

    <div id="settings-modal">
        <div class="modal-content">
            <h3 style="color: #ffcc00;">⚙️ الإعدادات</h3>
            <p style="font-size: 12px;">سيتم تفعيل تخصيص الأزرار في الخطوة القادمة بعد التأكد من عمل الكاميرا.</p>
            <button onclick="toggleSettings(false)" style="background:#555; color:white; width:100%; padding:15px; border-radius:10px; border:none;">إغلاق</button>
        </div>
    </div>

    <script>
        let isBillMode = false, billItems = [], lastScanTime = 0, isFlashOn = false, html5QrCode, currentCameraId;
        const NTFY_URL = 'https://ntfy.sh/ibrahim_pharmacy_2026';

        // الأزرار الافتراضية
        const defaultButtons = [
            { name: "Add", cmd: "f8", useEnter: true },
            { name: "Save", cmd: "f9", useEnter: true },
            { name: "Tab", cmd: "tab", useEnter: false },
            { name: "F1", cmd: "f1", useEnter: false },
            { name: "Del", cmd: "delete", useEnter: false }
        ];

        function renderButtons() {
            const container = document.getElementById('dynamic-buttons');
            container.innerHTML = '';
            defaultButtons.forEach(btn => {
                const b = document.createElement('button');
                b.className = 'custom-btn';
                b.innerText = btn.name;
                b.onclick = () => sendCommand(btn.cmd, btn.useEnter);
                container.appendChild(b);
            });
        }

        async function sendCommand(cmd, useEnter) {
            fetch(NTFY_URL, { method: 'POST', body: cmd });
            if (useEnter) {
                setTimeout(() => fetch(NTFY_URL, { method: 'POST', body: 'enter' }), 400);
            }
            document.getElementById('result').innerText = "تم إرسال: " + cmd;
        }

        function onScanSuccess(text) {
            if (Date.now() - lastScanTime < 2500) return;
            lastScanTime = Date.now();
            
            if (isBillMode) {
                billItems.push(text);
                document.getElementById('count').innerText = billItems.length;
                document.getElementById('sendAllBtn').style.display = 'block';
                document.getElementById('result').innerText = "📦 مضاف للفاتورة: " + text;
            } else {
                fetch(NTFY_URL, { method: 'POST', body: text + '_ent' });
                document.getElementById('result').innerText = "✅ تم الإرسال: " + text;
            }
        }

        function toggleBillMode() {
            isBillMode = !isBillMode;
            document.getElementById('billModeBtn').classList.toggle('active', isBillMode);
            if (!isBillMode) {
                billItems = [];
                document.getElementById('sendAllBtn').style.display = 'none';
            }
        }

        async function sendFullBill() {
            const btn = document.getElementById('sendAllBtn');
            btn.disabled = true;
            for (let item of billItems) {
                await fetch(NTFY_URL, { method: 'POST', body: item + '_ent' });
                await new Promise(r => setTimeout(r, 1200));
            }
            btn.style.display = 'none'; btn.disabled = false;
            billItems = [];
            document.getElementById('result').innerText = "تم إرسال الفاتورة!";
        }

        function openKeyboard() {
            let t = prompt("أدخل نص:");
            if(t) fetch(NTFY_URL, { method: 'POST', body: t + '_ent' });
        }

        async function switchCamera() {
            const devices = await Html5Qrcode.getCameras();
            if (devices.length > 1) {
                let nextId = devices.find(d => d.id !== currentCameraId).id;
                startScanner(nextId);
            }
        }

        async function toggleFlash() {
            try {
                const track = html5QrCode.getRunningTrack();
                isFlashOn = !isFlashOn;
                await track.applyConstraints({ advanced: [{ torch: isFlashOn }] });
            } catch (e) { alert("الفلاش غير متاح حالياً"); }
        }

        function startScanner(id) {
            if (html5QrCode) {
                html5QrCode.stop().then(() => initScanner(id));
            } else {
                initScanner(id);
            }
        }

        function initScanner(id) {
            currentCameraId = id;
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start(id, { fps: 10, qrbox: 200 }, onScanSuccess);
        }

        function toggleSettings(s) { document.getElementById('settings-modal').style.display = s ? 'block' : 'none'; }

        window.onload = () => {
            Html5Qrcode.getCameras().then(devices => {
                if (devices.length > 0) startScanner(devices[devices.length - 1].id);
            }).catch(() => { document.getElementById('result').innerText = "خطأ: برجاء تفعيل إذن الكاميرا"; });
            renderButtons();
        };
    </script>
</body>
</html>
